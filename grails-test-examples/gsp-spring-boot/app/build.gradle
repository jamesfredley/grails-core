buildscript {
    repositories {
        // mavenLocal()
        maven { url 'https://repo.grails.org/grails/core/' }
        maven {
            name = 'ASF Snapshot repo'
            url = 'https://repository.apache.org/content/groups/snapshots'
        }
    }
    dependencies {
        classpath platform("org.apache.grails:grails-gradle-bom:$projectVersion")
        classpath 'org.apache.grails:grails-gradle-plugins'
    }
}

plugins {
    id 'java'
    id 'war'
    id 'org.springframework.boot'
    id 'io.spring.dependency-management'
    id "groovy"
}

apply plugin: 'org.apache.grails.gradle.grails-gsp'

repositories {
    mavenCentral()
    maven {
        name = 'ASF Snapshot repo'
        url = 'https://repository.apache.org/content/groups/snapshots'
    }
    maven { url 'https://repo.grails.org/grails/core/' }
}

jar {
    processResources.exclude('**/*.gsp')
}

compileGroovyPages {
    source = project.file("${project.projectDir}/src/main/resources/templates")
}

dependencies {
    implementation platform(project(':grails-bom'))
    implementation project(':grails-gsp-spring-boot')

    implementation 'org.hibernate.validator:hibernate-validator' // validation

    implementation project(':grails-web-jsp')

    implementation 'org.apache.tomcat.embed:tomcat-embed-jasper' // jsp
    implementation 'org.apache.tomcat.embed:tomcat-embed-el'
}