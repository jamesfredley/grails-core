buildscript {
    repositories {
        // mavenLocal()
        maven { url = "https://repo.grails.org/grails/core" }
        maven { url = 'https://repository.apache.org/content/repositories/snapshots' }
    }
    dependencies {
        classpath "org.apache.grails:grails-gradle-plugins:${project['grails-gradle-plugins.version']}"
        classpath "com.bertramlabs.plugins:asset-pipeline-gradle:${project['asset-pipeline-gradle.version']}"
    }
}

version "0.1"
group "issue11102"

apply plugin: "asset-pipeline"
apply plugin: "org.apache.grails.gradle.grails-web"

// The grails-gsp Gradle plugin is not needed for running the functional tests.
// It is applied as a smoke test to check that compiling gsp
// for production does not fail during build task.
apply plugin: 'org.apache.grails.gradle.grails-gsp'

dependencies {
    implementation platform(project(':grails-bom'))

    implementation "org.springframework.boot:spring-boot-starter-logging"
    implementation "org.springframework.boot:spring-boot-autoconfigure"
    implementation "org.apache.grails:grails-core"
    implementation "org.springframework.boot:spring-boot-starter-actuator"
    implementation "org.springframework.boot:spring-boot-starter-tomcat"
    implementation "org.apache.grails.web:grails-web-boot"
    implementation "org.apache.grails:grails-logging"
    implementation "org.apache.grails:grails-rest-transforms"
    implementation "org.apache.grails:grails-databinding"
    implementation "org.apache.grails:grails-i18n"
    implementation "org.apache.grails:grails-services"
    implementation "org.apache.grails:grails-url-mappings"
    implementation "org.apache.grails:grails-interceptors"
    implementation "org.apache.grails:grails-cache"
    implementation "org.apache.grails:grails-async"
    implementation "org.apache.grails:grails-scaffolding"
    implementation "org.apache.grails:grails-events"
    implementation "org.apache.grails:grails-gsp"
    console "org.apache.grails:grails-console"
    profile "org.grails.profiles:web"
    runtimeOnly "com.h2database:h2"
    runtimeOnly "org.apache.tomcat:tomcat-jdbc"
    runtimeOnly "com.bertramlabs.plugins:asset-pipeline-grails"

    testImplementation "org.apache.grails:grails-testing-support-web"
    testImplementation "org.apache.grails:grails-testing-support-datamapping"

    testImplementation "io.micronaut:micronaut-http-client:$micronautVersion"
    testImplementation "io.micronaut.serde:micronaut-serde-jackson:$micronautSerdeJacksonVersion"

    integrationTestImplementation testFixtures("org.apache.grails:grails-geb")
}

tasks.named('assetCompile') {
    // No need to compile assets in functional tests
    enabled = false
}

bootRun {
    jvmArgs('-Dspring.output.ansi.enabled=always')
    String springProfilesActive = 'spring.profiles.active'
    systemProperty springProfilesActive, System.getProperty(springProfilesActive)
}

apply {
    from rootProject.layout.projectDirectory.file('gradle/functional-test-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/java-config.gradle')
}