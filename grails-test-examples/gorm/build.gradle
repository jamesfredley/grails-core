version = '0.1'
group = 'gorm'

apply plugin: 'org.apache.grails.gradle.grails-web'

dependencies {
    implementation platform(project(':grails-bom'))

    implementation 'org.springframework.boot:spring-boot-starter-logging'
    implementation 'org.springframework.boot:spring-boot-starter-actuator'
    implementation 'org.springframework.boot:spring-boot-autoconfigure'
    implementation 'org.springframework.boot:spring-boot-starter-tomcat'
    implementation 'org.apache.grails:grails-dependencies'
    implementation 'org.apache.grails:grails-web-boot'

    implementation 'org.apache.grails:grails-data-hibernate5'
    runtimeOnly "org.hibernate:hibernate-ehcache:$hibernate5Version", {
        // exclude javax variant of hibernate-core
        exclude group: 'org.hibernate', module: 'hibernate-core'
    }
    runtimeOnly "org.jboss.spec.javax.transaction:jboss-transaction-api_1.3_spec:$jbossTransactionApiVersion", {
        // required for hibernate-ehcache to work with javax variant of hibernate-core excluded
    }
    implementation 'org.apache.grails:grails-cache'

    runtimeOnly 'org.apache.grails:grails-scaffolding'
    runtimeOnly 'org.apache.grails:grails-fields'
    runtimeOnly 'org.apache.tomcat:tomcat-jdbc'

    testImplementation 'org.apache.grails:grails-testing-support-web'
    testImplementation 'org.apache.grails:grails-testing-support-datamapping'

    console 'org.apache.grails:grails-console'

    integrationTestImplementation testFixtures('org.apache.grails:grails-geb')
}

apply {
    from rootProject.layout.projectDirectory.file('gradle/functional-test-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/java-config.gradle')
}