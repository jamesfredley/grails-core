// Standalone Spring Boot demo that embeds GORM-GraphQL without a full
// Grails application; exercises the schema generator core library directly.

plugins {
    id 'groovy'
    id 'org.apache.grails.buildsrc.properties'
    id 'org.springframework.boot'
    id 'org.apache.grails.buildsrc.compile'
}

version = projectVersion
group = 'examples'

dependencies {

    implementation platform(project(':grails-bom'))

    implementation 'org.springframework.boot:spring-boot-starter'
    implementation 'org.springframework.boot:spring-boot-starter-web'

    implementation 'org.springframework.boot:spring-boot-hibernate'

    implementation 'org.apache.grails:grails-data-hibernate5-spring-boot'
    implementation 'org.apache.grails.data:grails-data-hibernate5-core'
    implementation 'org.apache.grails.data:grails-datamapping-core'
    implementation "org.hibernate:hibernate-core-jakarta:$hibernate5Version"
    implementation("org.hibernate:hibernate-ehcache:$hibernate5Version") {
        // Exclude javax variant of hibernate-core
        exclude group: 'org.hibernate', module: 'hibernate-core'
    }
    implementation 'jakarta.transaction:jakarta.transaction-api'
    implementation 'jakarta.persistence:jakarta.persistence-api'

    // The GraphQL schema generator (core library only - no Grails plugin needed here).
    implementation 'org.apache.grails.data:grails-data-graphql-core'
    implementation 'com.github.javaparser:javaparser-core'
    implementation 'com.graphql-java:graphql-java'

    runtimeOnly 'com.h2database:h2'
    runtimeOnly 'org.apache.tomcat:tomcat-jdbc'

    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.spockframework:spock-core'
    // Required for @Autowired injection in Spock specs (e.g. AuthorIntegrationTests)
    testImplementation 'org.spockframework:spock-spring'

    // Define the JUnit platform launcher so unit tests can be discovered, per
    // https://docs.gradle.org/8.3/userguide/upgrading_version_8.html#test_framework_implementation_dependencies
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

apply {
    from rootProject.layout.projectDirectory.file('gradle/functional-test-config.gradle')
}
