---
grails:
    profile: rest-api
    codegen:
        defaultPackage: example
info:
    app:
        name: '@info.app.name@'
        version: '@info.app.version@'
        grailsVersion: '@info.app.grailsVersion@'
spring:
    main:
        allow-circular-references: true
---
grails:
    mime:
        types:
            json:
              - application/json
              - text/json   
            hal:
              - application/hal+json
              - application/hal+xml  
            xml:
              - text/xml
              - application/xml                                 
            atom: application/atom+xml
            css: text/css
            csv: text/csv
            js: text/javascript
            rss: application/rss+xml
            text: text/plain
            all: '*/*'            
---
grails:
    mongodb:
        url: mongodb://${docker.mongodb.hostname:localhost}:${docker.mongodb.port:27017}/mydb
