apply plugin: 'groovy'
apply plugin: 'org.springframework.boot'

dependencies {

    implementation platform(project(':grails-bom'))

    implementation 'org.apache.grails:grails-data-mongodb-spring-boot'
    implementation 'org.apache.groovy:groovy'
    implementation 'org.springframework.boot:spring-boot-starter-web'
    testImplementation project(':grails-testing-support-mongodb')

    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.spockframework:spock-core'
}

apply {
    from rootProject.layout.projectDirectory.file('gradle/java-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/functional-test-config.gradle')
}
