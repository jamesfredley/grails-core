buildscript {
    repositories {
        // mavenLocal()
        maven { url = "https://repo.grails.org/grails/core" }
        maven { url = 'https://repository.apache.org/content/repositories/snapshots' }
    }
    dependencies {
        classpath "org.apache.grails:grails-gradle-plugins:${project['grails-gradle-plugins.version']}"
    }
}

version "0.1-SNAPSHOT"
group "com.example.grails.plugins"

apply plugin: "java-library"
apply plugin: "org.apache.grails.gradle.grails-plugin"
apply plugin: "org.apache.grails.gradle.grails-gsp"

dependencies {
    implementation platform(project(':grails-bom'))

    api 'org.springframework.boot:spring-boot-starter-logging'
    api "org.springframework.boot:spring-boot-starter-actuator"
    api "org.springframework.boot:spring-boot-autoconfigure"
    api "org.springframework.boot:spring-boot-starter-tomcat"

    api "org.apache.grails.web:grails-web-boot"
    api "org.apache.grails:grails-dependencies"
    api "jakarta.servlet:jakarta.servlet-api"

    implementation "org.grails.plugins:spring-security-core:$springSecurityCoreVersion", {
        exclude group: 'org.grails', module: 'grails-datastore-core' // TODO: remove when spring security is updated
        exclude group: 'org.grails', module: 'grails-datastore-gorm' // TODO: remove when spring security is updated
        exclude group: 'org.grails.plugins', module: 'async' // TODO: remove when spring security is updated
        exclude group: 'org.grails', module: 'grails-web-common' // TODO: remove when spring security is updated
        exclude group: 'org.grails', module: 'grails-web-url-mappings' // TODO: remove when spring security is updated
        exclude group: 'org.grails', module: 'grails-events-transform' // TODO: remove when spring security is updated
        exclude group: 'org.grails', module: 'grails-plugin-mimetypes' // TODO: remove when spring security is updated
    }
    implementation 'org.apache.grails.data:grails-datastore-core' // TODO: Remove when spring security is updated
    implementation 'org.apache.grails.data:grails-datamapping-core' // TODO: Remove when spring security is updated
    implementation 'org.apache.grails.events:grails-events-transforms' // TODO: Remove when spring security is updated
    implementation 'org.apache.grails:grails-async' // TODO: Remove when spring security is updated
    implementation 'org.apache.grails.web:grails-web-common' // TODO: Remove when spring security is updated
    implementation 'org.apache.grails.web:grails-web-url-mappings' // TODO: Remove spring security is published published

    console "org.apache.grails:grails-console"
}

apply {
    from rootProject.layout.projectDirectory.file('gradle/functional-test-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/java-config.gradle')
}