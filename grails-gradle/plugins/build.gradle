group "org.apache.grails"
version project.projectVersion

ext.isReleaseVersion = !version.endsWith("-SNAPSHOT")
ext."signing.keyId" = project.findProperty("signing.keyId") ?: System.getenv('SIGNING_KEY')
ext."signing.password" = project.findProperty("signing.password") ?: System.getenv('SIGNING_PASSPHRASE')
ext."signing.secretKeyRingFile" = project.findProperty("signing.secretKeyRingFile") ?: "${System.properties['user.home']}${File.separator}.gnupg${File.separator}secring.gpg"

ext.pomInfo = {
    delegate.url 'https://github.com/apache/grails-core'

    delegate.licenses {
        delegate.license {
            delegate.name 'The Apache Software License, Version 2.0'
            delegate.url 'https://www.apache.org/licenses/LICENSE-2.0.txt'
            delegate.distribution 'repo'
        }
    }

    delegate.scm {
        delegate.url "scm:git@github.com:apache/grails-core.git"
        delegate.connection "scm:git@github.com:apache/grails-core.git"
        delegate.developerConnection "scm:git@github.com:apache/grails-core.git"
    }

    delegate.developers {
        delegate.developer {
            delegate.id 'graemerocher'
            delegate.name 'Graeme Rocher'
        }
        delegate.developer {
            delegate.id 'jeffscottbrown'
            delegate.name 'Jeff Brown'
        }
        delegate.developer {
            delegate.id 'puneetbehl'
            delegate.name 'Puneet Behl'
        }
    }
}

apply plugin: 'idea'
apply plugin: 'java-gradle-plugin'
apply plugin: 'groovy'
apply plugin: 'maven-publish'

if (isReleaseVersion) {
    apply plugin: "io.github.gradle-nexus.publish-plugin"
    apply plugin: 'signing'
}

dependencies {
    implementation platform(project(":grails-gradle-bom"))

    // compile grails-gradle-plugin with the Groovy version provided by Gradle
    // to ensure build compatibility with Gradle, currently Groovy 3.0.x
    // see: https://docs.gradle.org/current/userguide/compatibility.html#groovy
    compileOnly "org.codehaus.groovy:groovy:$GroovySystem.version"

    //TODO
//    implementation 'org.apache.grails.bootstrap:grails-bootstrap', {
//        exclude group: 'org.apache.groovy'
//        exclude group: 'org.spockframework'
//    }

    //TODO
//    implementation project(':grails-shell-cli'), {
//        exclude group: 'org.apache.groovy'
//        exclude group: 'org.spockframework'
//    }

    implementation project(':grails-gradle-model'), {
        exclude group: 'org.apache.groovy'
        exclude group: 'org.spockframework'
    }

    implementation "io.github.gradle-nexus:publish-plugin"
    implementation "org.springframework.boot:spring-boot-gradle-plugin"
    implementation "org.springframework.boot:spring-boot-loader-tools"
    implementation "io.spring.gradle:dependency-management-plugin"
}

gradlePlugin {
    plugins {
        grailsCore {
            displayName = "Grails Core Gradle Plugin"
            description = 'The main Grails gradle plugin implementation'
            id = 'org.apache.grails.gradle.grails-app'
            implementationClass = 'org.grails.gradle.plugin.core.GrailsGradlePlugin'
        }
        grailsDoc {
            displayName = "Grails Doc Gradle Plugin"
            description = 'Adds Grails doc publishing support'
            id = 'org.apache.grails.gradle.grails-docs'
            implementationClass = 'org.grails.gradle.plugin.doc.GrailsDocGradlePlugin'
        }
        grailsGsp {
            displayName = "Grails GSP Gradle Plugin"
            description = 'A plugin that adds support for compiling Groovy Server Pages (GSP)'
            id = 'org.apache.grails.gradle.grails-gsp'
            implementationClass = 'org.grails.gradle.plugin.views.gsp.GroovyPagePlugin'
        }
        grailsGson {
            displayName = "Grails GSON Gradle Plugin"
            description = 'A plugin that adds support for compiling Groovy Json Views (GSON)'
            id = 'org.apache.grails.gradle.grails-gson'
            implementationClass = 'org.grails.gradle.plugin.views.json.GrailsGsonViewsPlugin'
        }
        grailsMarkup {
            displayName = "Grails Markup Gradle Plugin"
            description = 'A plugin that adds support for compiling Markup Views'
            id = 'org.apache.grails.gradle.grails-markup'
            implementationClass = 'org.grails.gradle.plugin.views.markup.GrailsMarkupViewsPlugin'
        }
        grailsPlugin {
            displayName = "Grails-Plugin Gradle Plugin"
            description = 'A Gradle plugin for Grails plugins'
            id = 'org.apache.grails.gradle.grails-plugin'
            implementationClass = 'org.grails.gradle.plugin.core.GrailsPluginGradlePlugin'
        }
        grailsProfile {
            displayName = "Grails Profile Gradle Plugin"
            description = 'A plugin that is capable of compiling a Grails profile into a JAR file for distribution'
            id = 'org.apache.grails.gradle.grails-profile'
            implementationClass = 'org.grails.gradle.plugin.profiles.GrailsProfileGradlePlugin'
        }
        grailsWeb {
            displayName = "Grails Web Gradle Plugin"
            description = 'Adds web specific extensions'
            id = 'org.apache.grails.gradle.grails-web'
            implementationClass = 'org.grails.gradle.plugin.web.GrailsWebGradlePlugin'
        }
        grailsPublish {
            displayName = "Grails Publish Gradle Plugin"
            description = 'A plugin to assist in publishing Grails related artifacts'
            id = 'org.apache.grails.gradle.grails-publish'
            implementationClass = 'org.grails.gradle.plugin.publishing.GrailsPublishGradlePlugin'
        }
        grailsProfilePublish {
            displayName = "Grails Profile Publish Plugin"
            description = 'A plugin for publishing profiles'
            id = 'org.apache.grails.gradle.grails-publish-profile'
            implementationClass = 'org.grails.gradle.plugin.profiles.GrailsProfilePublishGradlePlugin'
        }
    }
}

tasks.withType(Copy) {
    configure {
        duplicatesStrategy = DuplicatesStrategy.INCLUDE
    }
}

if (isReleaseVersion) {
    afterEvaluate {
        signing {
            required { isReleaseVersion && gradle.taskGraph.hasTask("publish") }
            Publication[] publications = new Publication[publishing.publications.size()]
            publishing.publications.findAll().toArray(publications)
            sign(publications)
        }
    }

    tasks.withType(Sign) {
        onlyIf { isReleaseVersion }
    }
}

tasks.withType(io.github.gradlenexus.publishplugin.InitializeNexusStagingRepository).configureEach {
    shouldRunAfter(tasks.withType(Sign))
}

if (isReleaseVersion) {
    nexusPublishing {
        repositories {
            sonatype {
                def ossUser = System.getenv("SONATYPE_USERNAME") ?: project.hasProperty("sonatypeOssUsername") ? project.sonatypeOssUsername : ''
                def ossPass = System.getenv("SONATYPE_PASSWORD") ?: project.hasProperty("sonatypeOssPassword") ? project.sonatypeOssPassword : ''
                def ossStagingProfileId = System.getenv("SONATYPE_STAGING_PROFILE_ID") ?: project.hasProperty("sonatypeOssStagingProfileId") ? project.sonatypeOssStagingProfileId : ''
                nexusUrl = uri("https://s01.oss.sonatype.org/service/local/")
                username = ossUser
                password = ossPass
                stagingProfileId = ossStagingProfileId
            }
        }
    }
}

publishing {
    if (!isReleaseVersion) {
        repositories {
            maven {
                credentials {
                    def u = System.getenv("MAVEN_PUBLISH_USERNAME") ?: ''
                    def p = System.getenv("MAVEN_PUBLISH_PASSWORD") ?: ''
                    username = u
                    password = p
                }
                url System.getenv("MAVEN_PUBLISH_URL") ?: 'https://repository.apache.org/content/repositories/snapshots'
            }
        }
    }

    // publishAllPublicationsToTestCaseMavenRepoRepository
    repositories {
        maven {
            name = "TestCaseMavenRepo"
            url = layout.buildDirectory.dir('local-maven')
        }
    }

    publications {
        pluginMaven(MavenPublication) {
            pom {
                name = "Grails Gradle Plugin"
                description = "A Gradle plugin for Grails which provides a bunch of useful plugins"

                url = 'https://github.com/apache/grails-core'

                licenses {
                    license {
                        name = 'The Apache Software License, Version 2.0'
                        url = 'https://www.apache.org/licenses/LICENSE-2.0.txt'
                        distribution = 'repo'
                    }
                }

                scm {
                    url = "scm:git@github.com:apache/grails-core.git"
                    connection = "scm:git@github.com:apache/grails-core.git"
                    developerConnection = "scm:git@github.com:apache/grails-core.git"
                }

                developers {
                    developer {
                        id = 'graemerocher'
                        name = 'Graeme Rocher'
                    }
                    developer {
                        id = 'jeffscottbrown'
                        name = 'Jeff Brown'
                    }
                    developer {
                        id = 'puneetbehl'
                        name = 'Puneet Behl'
                    }
                }
            }
        }
    }
}

project.afterEvaluate {
    project.publishing.publications.each { MavenPublication publication ->
        if (publication.name != "pluginMaven") {
            publication.pom.withXml {
                def xml = asNode()
                xml.children().last() + pomInfo
            }
        }
    }
}

apply {
    from rootProject.layout.projectDirectory.file('gradle/docs-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/java-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/e2eTest.gradle')
}