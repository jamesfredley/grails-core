plugins {
    id 'groovy'
    id 'java-library'
    id 'project-report'
    id 'maven-publish'
}

version = projectVersion
group = 'org.apache.grails.gradle'

dependencies {
    implementation platform(project(':grails-gradle-bom'))

    // compile grails-gradle-model with the Groovy version provided by Gradle
    // to ensure build compatibility with Gradle, currently Groovy 3.0.x
    // when used by grails-gradle-plugin
    // see: https://docs.gradle.org/current/userguide/compatibility.html#groovy
    compileOnly 'org.codehaus.groovy:groovy'
    compileOnly 'org.codehaus.groovy:groovy-xml'

    testImplementation 'org.codehaus.groovy:groovy-test-junit5'
    testImplementation 'org.junit.jupiter:junit-jupiter-api'
    testImplementation 'org.junit.platform:junit-platform-runner'

    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine'

    implementation 'org.springframework:spring-context'
    implementation 'org.springframework.boot:spring-boot-autoconfigure' // required for org.springframework.boot.env.YamlPropertySourceLoader

    compileOnly 'jline:jline' // for profile compilation

    api 'org.yaml:snakeyaml'

    // Logging
    api 'org.slf4j:slf4j-api'
    api 'org.slf4j:jcl-over-slf4j'

    // Testing
    testImplementation 'org.codehaus.groovy:groovy'
    testImplementation 'org.codehaus.groovy:groovy-xml'
    testImplementation 'org.slf4j:slf4j-simple'
    testImplementation('org.spockframework:spock-core') { transitive = false }
    // Required by Spock's Mocking
    testRuntimeOnly 'net.bytebuddy:byte-buddy'
    testImplementation 'org.objenesis:objenesis'
}

apply {
    from rootProject.layout.projectDirectory.file('gradle/docs-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/java-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/test-config.gradle')
    //TODO: from rootProject.layout.projectDirectory.file('gradle/publish-config.gradle')
}

publishing {
    if (!isReleaseVersion) {
        repositories {
            maven {
                credentials {
                    def u = System.getenv("MAVEN_PUBLISH_USERNAME") ?: ''
                    def p = System.getenv("MAVEN_PUBLISH_PASSWORD") ?: ''
                    username = u
                    password = p
                }
                url System.getenv("MAVEN_PUBLISH_URL") ?: 'https://repository.apache.org/content/repositories/snapshots'
            }
        }
    }

    publications {
        maven(MavenPublication) {
            groupId = project.group
            artifactId = project.name
            
            from components.java

            pom {
                name = "Grails Gradle Model"
                description = "Classes to support the Grails Gradle Plugins"

                url = 'https://github.com/apache/grails-core'

                licenses {
                    license {
                        name = 'The Apache Software License, Version 2.0'
                        url = 'https://www.apache.org/licenses/LICENSE-2.0.txt'
                        distribution = 'repo'
                    }
                }

                scm {
                    url = "scm:git@github.com:apache/grails-core.git"
                    connection = "scm:git@github.com:apache/grails-core.git"
                    developerConnection = "scm:git@github.com:apache/grails-core.git"
                }

                developers {
                    developer {
                        id = 'graemerocher'
                        name = 'Graeme Rocher'
                    }
                }
            }
        }
    }
}