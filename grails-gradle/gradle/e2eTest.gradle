def e2eTest = sourceSets.create('e2eTest')
def e2eTestTask = tasks.register('e2eTest', Test)
e2eTestTask.configure { Test it ->
    it.onlyIf {
        if(project.hasProperty('onlyFunctionalTests')) {
            return false
        }

        if (project.hasProperty('onlyMongodbTests')) {
            return false
        }

        if (project.hasProperty('onlyHibernate5Tests')) {
            return false
        }

        if(project.hasProperty('skipTests')) {
            return false
        }

        true
    }
    it.group = 'verification'
    it.testClassesDirs = sourceSets.e2eTest.output.classesDirs
    it.classpath = sourceSets.e2eTest.runtimeClasspath
    it.useJUnitPlatform()
    it.systemProperty('localMavenPath', rootProject.layout.buildDirectory.dir('local-maven').get().asFile.absolutePath)
    it.systemProperty('grailsGradlePluginVersion', project.version)
    it.systemProperty('groovyVersion', e2eGroovyVersion)

    it.testLogging {
        exceptionFormat = 'full'
        events 'passed', 'skipped', 'failed', 'standardOut', 'standardError'
    }
    it.beforeTest { descriptor -> logger.quiet ' -- $descriptor' }

    it.dependsOn 'publishAllPublicationsToTestCaseMavenRepoRepository', ':grails-gradle-bom:publishAllPublicationsToTestCaseMavenRepoRepository'
}

tasks.named('check').configure {
    dependsOn e2eTestTask
}

gradlePlugin {
    testSourceSets e2eTest
}

dependencies {
    // Note: must use a groovy 3 compatible version of Spock
    e2eTestImplementation "org.spockframework:spock-core:${gradleBomDependencyVersions['gradle-spock.version']}", {
        exclude group: 'org.apache.groovy'
    }
    e2eTestImplementation 'commons-io:commons-io:2.18.0'
    e2eTestImplementation gradleTestKit()
    e2eTestRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}