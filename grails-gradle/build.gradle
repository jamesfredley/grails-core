Properties props = new Properties()
file('../gradle.properties').withInputStream {
    props.load(it)
}

allprojects {
    repositories {
        // mavenLocal()
        mavenCentral()
        gradlePluginPortal()
    }

    props.forEach { k, v -> project.ext.set(k as String, v) }

    apply from: rootProject.layout.projectDirectory.file('../dependencies.gradle')
}

ext {
    buildInstant = java.util.Optional.ofNullable(System.getenv("SOURCE_DATE_EPOCH"))
            .map(Long::parseLong)
            .map(Instant::ofEpochSecond)
            .orElseGet(Instant::now)
    formattedBuildDate = DateTimeFormatter.ISO_INSTANT.format(buildInstant)
    buildDate = (buildInstant as Instant).atZone(ZoneOffset.UTC) // for reproducible builds

    isReleaseVersion = Boolean.parseBoolean(System.getenv('GRAILS_PUBLISH_RELEASE'))
    ext.'signing.keyId' = project.findProperty('signing.keyId') ?: System.getenv('SIGNING_KEY')
    ext.'signing.password' = project.findProperty('signing.password') ?: System.getenv('SIGNING_PASSPHRASE')
    ext.'signing.secretKeyRingFile' = project.findProperty('signing.secretKeyRingFile') ?: "${System.properties['user.home']}${File.separator}.gnupg${File.separator}secring.gpg"
    isCiBuild = System.getenv().get('CI') as Boolean
    configuredTestParallel = findProperty('maxTestParallel') as Integer ?: (isCiBuild ? 3 : Runtime.runtime.availableProcessors() * 3/4 as int ?: 1)
}
if (isReleaseVersion) {
    apply plugin: 'io.github.gradle-nexus.publish-plugin'
    apply plugin: 'signing'

    nexusPublishing {
        repositories {
            sonatype {
                nexusUrl = uri('https://s01.oss.sonatype.org/service/local/')
                username = System.getenv('SONATYPE_USERNAME') ?: project.findProperty('sonatypeOssUsername')
                password = System.getenv('SONATYPE_PASSWORD') ?: project.findProperty('sonatypeOssPassword')
                stagingProfileId = System.getenv('SONATYPE_STAGING_PROFILE_ID') ?: project.findProperty('sonatypeOssStagingProfileId')
            }
        }
    }

    afterEvaluate {
        signing {
            required { isReleaseVersion && gradle.taskGraph.hasTask('publish') }
            Publication[] publications = new Publication[publishing.publications.size()]
            publishing.publications.findAll().toArray(publications)
            sign(publications)
        }
    }

    tasks.withType(Sign) {
        onlyIf { isReleaseVersion }
    }

    tasks.withType(io.github.gradlenexus.publishplugin.InitializeNexusStagingRepository).configureEach {
        shouldRunAfter(tasks.withType(Sign))
    }
}

