import java.time.Instant
import java.time.LocalDate
import java.time.ZoneOffset
import java.time.format.DateTimeFormatter

plugins {
    id 'org.apache.grails.buildsrc.properties'
    id 'org.apache.grails.buildsrc.dependency-validator'
}

allprojects {
    apply from: rootProject.layout.projectDirectory.file('../dependencies.gradle')
}

ext {
    buildInstant = java.util.Optional.ofNullable(System.getenv("SOURCE_DATE_EPOCH"))
            .filter(s -> !s.isEmpty())
            .map(Long::parseLong)
            .map(Instant::ofEpochSecond)
            .orElseGet(Instant::now)
    formattedBuildDate = System.getenv("SOURCE_DATE_EPOCH") ?
            DateTimeFormatter.ISO_INSTANT.format(buildInstant) :
            DateTimeFormatter.ISO_DATE.format(LocalDate.ofInstant(buildInstant as Instant, ZoneOffset.UTC))
    buildDate = (buildInstant as Instant).atZone(ZoneOffset.UTC) // for reproducible builds

    isReleaseVersion = Boolean.parseBoolean(System.getenv('GRAILS_PUBLISH_RELEASE'))
    isCiBuild = System.getenv().containsKey('CI')
    // Set DO_NOT_CACHE_TESTS=1 to force test tasks to re-run on every invocation without
    // needing --rerun-tasks. Useful for repeatedly running the same test command while
    // chasing flaky tests across runs.
    doNotCacheTests = System.getenv('DO_NOT_CACHE_TESTS')?.toBoolean()
    configuredTestParallel = findProperty('maxTestParallel') as Integer ?: (isCiBuild ? 3 : Runtime.runtime.availableProcessors() * 3/4 as int ?: 1)
}

apply {
    from layout.projectDirectory.file('gradle/publish-root-config.gradle')
}
