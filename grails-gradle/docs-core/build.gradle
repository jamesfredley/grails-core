plugins {
    id 'groovy'
    id 'java-library'
    id 'maven-publish'
}

version = projectVersion
group = 'org.apache.grails'

configurations {
    // Required to keep Gradle classes off the test compile classpath.
    gradleConf.extendsFrom compileClasspath
}

dependencies {
    implementation platform(project(':grails-gradle-bom'))

    gradleConf gradleApi()

    // grails-docs classes are used in Gradle builds,
    // so we must compile with Groovy 3 until Gradle upgrades to Groovy 4.
    compileOnly "org.codehaus.groovy:groovy"
    compileOnly "org.codehaus.groovy:groovy-ant"

    api "org.apache.commons:commons-text"
    api "org.slf4j:jcl-over-slf4j"
    api "org.apache.ant:ant"
    api "org.grails:grails-gdoc-engine"
    api "org.yaml:snakeyaml"

    api "org.asciidoctor:asciidoctorj"
    implementation "org.xhtmlrenderer:flying-saucer-pdf-openpdf"

    runtimeOnly "org.slf4j:slf4j-api"

    api "org.jsoup:jsoup"
    testImplementation("org.spockframework:spock-core") { transitive = false }

    testImplementation 'org.codehaus.groovy:groovy-test-junit5'
    testImplementation 'org.junit.jupiter:junit-jupiter-api'
    testImplementation 'org.junit.platform:junit-platform-runner'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine'
}

sourceSets {
    main {
        compileClasspath = configurations.gradleConf
    }
}

tasks.register("docFilesJar", Jar) {
    description = 'Package up files used for generating documentation.'
    archiveVersion = null
    archiveFileName = "grails-doc-files.jar"
    from "src/main/template"
}

tasks.named('jar', Jar).configure { Jar it ->
    it.from docFilesJar
}

jar.dependsOn docFilesJar

apply {
    from rootProject.layout.projectDirectory.file('gradle/docs-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/java-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/test-config.gradle')
}


publishing {
    if (!isReleaseVersion) {
        repositories {
            maven {
                credentials {
                    username = System.getenv("MAVEN_PUBLISH_USERNAME") ?: ''
                    password = System.getenv("MAVEN_PUBLISH_PASSWORD") ?: ''
                }
                url = System.getenv("MAVEN_PUBLISH_URL") ?: 'https://repository.apache.org/content/repositories/snapshots'
            }
        }
    }

    publications {
        maven(MavenPublication) {
            from components.java

            pom {
                name = "Grails Gradle Plugin"
                description = "A Gradle plugin for Grails which provides a bunch of useful plugins"

                url = 'https://github.com/apache/grails-core'

                licenses {
                    license {
                        name = 'The Apache Software License, Version 2.0'
                        url = 'https://www.apache.org/licenses/LICENSE-2.0.txt'
                        distribution = 'repo'
                    }
                }

                scm {
                    url = "scm:git@github.com:apache/grails-core.git"
                    connection = "scm:git@github.com:apache/grails-core.git"
                    developerConnection = "scm:git@github.com:apache/grails-core.git"
                }

                developers {
                    developer {
                        id = 'graemerocher'
                        name = 'Graeme Rocher'
                    }
                    developer {
                        id = 'jeffscottbrown'
                        name = 'Jeff Brown'
                    }
                    developer {
                        id = 'puneetbehl'
                        name = 'Puneet Behl'
                    }
                }
            }
        }
    }
}