// see https://github.com/dependabot/dependabot-core/issues/1618
// This file allows dependabot to update the gradle dependencies

// This file provides the 'grails-gradle-bom' dependencies, while /dependencies.gradle provides the 'grails-bom' dependencies
// These files are split to facilitate separation of build vs application dependencies.  These are the build dependencies.
ext {
    bomDependencyVersions = [
            'ant.version'                        : '1.10.15',
            'asciidoctorj.version'               : '3.0.0',
            'asset-pipeline-gradle.version'      : '5.0.8',
            'byte-buddy.version'                 : '1.15.5',
            'commons-text.version'               : '1.12.0',
            'directory-watcher.version'          : '0.18.0',
            'flying-saucer-pdf-openpdf.version'  : '9.4.0',
            'grails-gdoc-engine.version'         : '1.0.1',
            'jansi.version'                      : '1.18',
            'javaparser-core.version'            : '3.26.2',
            'jline.version'                      : '2.14.6',
            'jna.version'                        : '5.16.0',
            'jquery.version'                     : '3.7.1',
            'jsoup.version'                      : '1.18.3',
            'objenesis.version'                  : '3.4',
            'profiles.version'                   : '10.0.2',
            'gradle-spock.version'               : '2.3-groovy-3.0',
            'gradle-nexus-publish-plugin.version': '2.0.0',
            'spring-boot.version'                : '3.4.2',
            'springloaded.version'               : '1.2.8.RELEASE',
    ]

    // Note: the name of the dependency must be the prefix of the property name so properties in the pom are resolved correctly
    bomPlatformDependencies = [
            'spring-boot-bom' : "org.springframework.boot:spring-boot-dependencies:${bomDependencyVersions['spring-boot.version']}",
            'gradle-spock-bom': "org.spockframework:spock-bom:${bomDependencyVersions['gradle-spock.version']}",
    ]

    // Note: the name of the dependency must be the prefix of the property name so properties in the pom are resolved correctly
    bomDependencies = [
            'ant'                        : "org.apache.ant:ant:${bomDependencyVersions['ant.version']}",
            'ant-junit'                  : "org.apache.ant:ant-junit:${bomDependencyVersions['ant.version']}",
            'asciidoctorj'               : "org.asciidoctor:asciidoctorj:${bomDependencyVersions['asciidoctorj.version']}",
            'asset-pipeline-gradle'      : "com.bertramlabs.plugins:asset-pipeline-gradle:${bomDependencyVersions['asset-pipeline-gradle.version']}",
            'byte-buddy'                 : "net.bytebuddy:byte-buddy:${bomDependencyVersions['byte-buddy.version']}",
            'commons-text'               : "org.apache.commons:commons-text:${bomDependencyVersions['commons-text.version']}",
            'directory-watcher'          : "io.methvin:directory-watcher:${bomDependencyVersions['directory-watcher.version']}",
            'flying-saucer-pdf-openpdf'  : "org.xhtmlrenderer:flying-saucer-pdf-openpdf:${bomDependencyVersions['flying-saucer-pdf-openpdf.version']}",
            'grails-gdoc-engine'         : "org.grails:grails-gdoc-engine:${bomDependencyVersions['grails-gdoc-engine.version']}",
            'jansi'                      : "org.fusesource.jansi:jansi:${bomDependencyVersions['jansi.version']}",
            'javaparser-core'            : "com.github.javaparser:javaparser-core:${bomDependencyVersions['javaparser-core.version']}",
            'jline'                      : "jline:jline:${bomDependencyVersions['jline.version']}",
            'jna'                        : "net.java.dev.jna:jna:${bomDependencyVersions['jna.version']}",
            'jsoup'                      : "org.jsoup:jsoup:${bomDependencyVersions['jsoup.version']}",
            'objenesis'                  : "org.objenesis:objenesis:${bomDependencyVersions['objenesis.version']}",
            'gradle-nexus-publish-plugin': "io.github.gradle-nexus:publish-plugin:${bomDependencyVersions['gradle-nexus-publish-plugin.version']}",
            'spring-boot-cli'            : "org.springframework.boot:spring-boot-cli:${bomDependencyVersions['spring-boot.version']}",
            'spring-boot-gradle'         : "org.springframework.boot:spring-boot-gradle-plugin:${bomDependencyVersions['spring-boot.version']}",
            'springloaded'               : "org.springframework:springloaded:${bomDependencyVersions['springloaded.version']}",
    ]
}
