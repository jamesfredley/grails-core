plugins {
    id 'groovy'
    id 'java-library'
    id 'maven-publish'
}

version = projectVersion
group = 'org.apache.grails'

dependencies {
    implementation platform(project(':grails-gradle-bom'))

    implementation "org.apache.groovy:groovy:${bomDependencyVersions['groovy.version']}"

    // spock is leaking from the grails-gradle-bom through grails-gradle-model
    implementation project(':grails-gradle-model'), {
        exclude group: 'org.spockframework'
    }

    implementation gradleApi()

    implementation 'io.github.gradle-nexus:publish-plugin'
    implementation 'org.springframework.boot:spring-boot-gradle-plugin'
}

publishing {
    if (!isReleaseVersion) {
        repositories {
            maven {
                credentials {
                    username = System.getenv('MAVEN_PUBLISH_USERNAME')
                    password = System.getenv('MAVEN_PUBLISH_PASSWORD')
                }
                url = System.getenv('MAVEN_PUBLISH_URL') ?: 'https://repository.apache.org/content/repositories/snapshots'
            }
        }
    }

    // used for e2e testing
    // publishAllPublicationsToTestCaseMavenRepoRepository
    repositories {
        maven {
            name = 'TestCaseMavenRepo'
            url = rootProject.layout.buildDirectory.dir('local-maven')
        }
    }

    publications {
        maven(MavenPublication) {
            from components.java

            pom {
                name = 'Grails Gradle Tasks'
                description = 'A Gradle tasks for Grails gradle plugins'

                url = 'https://github.com/apache/grails-core'

                licenses {
                    license {
                        name = 'The Apache Software License, Version 2.0'
                        url = 'https://www.apache.org/licenses/LICENSE-2.0.txt'
                        distribution = 'repo'
                    }
                }

                scm {
                    url = 'scm:git@github.com:apache/grails-core.git'
                    connection = 'scm:git@github.com:apache/grails-core.git'
                    developerConnection = 'scm:git@github.com:apache/grails-core.git'
                }

                developers {
                    developer {
                        id = 'graemerocher'
                        name = 'Graeme Rocher'
                    }
                    developer {
                        id = 'jeffscottbrown'
                        name = 'Jeff Brown'
                    }
                    developer {
                        id = 'puneetbehl'
                        name = 'Puneet Behl'
                    }
                }
            }
        }
    }
}

apply {
    from rootProject.layout.projectDirectory.file('gradle/java-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/docs-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/test-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/checksum-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/signing-config.gradle')
}