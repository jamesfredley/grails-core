import io.spring.gradle.dependencymanagement.org.apache.maven.model.io.xpp3.MavenXpp3Reader

// Copyright 2024 the original author or authors.
buildscript {
    apply from: rootProject.layout.projectDirectory.file('dependencies.gradle')
}

plugins {
    id 'java-platform'
    id 'maven-publish'
}

version = projectVersion
group = 'org.apache.grails'

javaPlatform {
    allowDependencies()
}

ext {
    isReleaseBuild = System.getenv('GRAILS_PUBLISH_RELEASE') == 'true'
    isPublishedExternal = System.getenv().containsKey('NEXUS_PUBLISH_STAGING_PROFILE_ID')
}

dependencies {
    api platform(gradleBomPlatformDependencies['spring-boot-bom']), {
        exclude group: 'org.apache.groovy'
        exclude group: 'org.spockframework'
        exclude group: 'com.fasterxml.jackson'
    }

    api platform(bomPlatformDependencies['groovy-bom'])
    api platform(bomPlatformDependencies['spock-bom'])
    api platform(bomPlatformDependencies['jackson-bom'])

    constraints {
        for (def entry : gradleBomDependencies.entrySet()) {
            api entry.value
        }
        for (def entry : bomDependencies.entrySet()) {
            api entry.value
        }

        for (Project subproject : rootProject.subprojects) {
            if (subproject.path == project.path || subproject.name in testProjects || subproject.name == 'grails-doc') {
                continue // ignore self & test projects
            }

            api project(":${subproject.path}")
        }

        // TODO: since we're duplicating the bom instead of inheriting we have to add the grails-gradle projects
        api "org.apache.grails:grails-gradle-plugins:${projectVersion}"
        api "org.apache.grails.gradle:grails-gradle-model:${projectVersion}"
        api "org.apache.grails:grails-docs-core:${projectVersion}"
    }
}


configurations.register('bomDependencies').configure {
    it.canBeResolved = true
    it.transitive = true
    it.extendsFrom(configurations.named('api').get())
}

String resolveMavenPomVersion(String dynamicVersion, Map properties, int maxIterations = 10) {
    def dynamicPattern = ~/\$\{([^}]+)\}/
    String expandedVersion = dynamicVersion

    int iterations = 0
    while ((expandedVersion =~ dynamicPattern).find() && iterations < maxIterations) {
        expandedVersion = expandedVersion.replaceAll(dynamicPattern) { String fullMatch, String propName ->
            String replacement = properties[propName] as String
            return replacement ? replacement : fullMatch
        }
        iterations++
    }

    if ((expandedVersion =~ dynamicPattern).find()) {
        logger.warn("Reached max iterations while resolving properties in: ${dynamicVersion}")
    }

    expandedVersion
}

//TODO: This really should be a gradle task that we export so others can use.
tasks.register('extractConstraints') {
    dependsOn(gradle.includedBuild('grails-gradle').task(':grails-gradle-bom:generatePomFileForMavenPublication'))
    doLast {
        def conf = configurations.detachedConfiguration()
        conf.transitive(true)

        Map<String, Tuple4<String, String, String, String>> bomConstraints = [:]
        Configuration apiConfiguration = configurations.named('api').get()

        // Explicit constraints
        apiConfiguration.getAllDependencyConstraints().all { constraint ->
            bomConstraints.put("${module.group}:${module.name}" as String,
                    new Tuple4<>(
                            constraint.module.group,
                            constraint.module.name,
                            constraint.version,
                            "grails-bom"
                    )
            )
        }

        // Build an exclusion list so parsing the pom we can exclude any dependencies as they are matched
        Map<String, List<Tuple2<String, String>>> allExclusions = [:].withDefault{ [] }
        configurations.api.allDependencies.each { dep ->
            if (dep instanceof org.gradle.api.artifacts.ModuleDependency) {
                String coordinates = "${dep.group}:${dep.name}" as String

                dep.excludeRules.each { exclusion ->
                    Tuple2<String, String> exclude = new Tuple2<>(exclusion.group, exclusion.module)
                    allExclusions.get(coordinates).add(exclude)
                }
            }
        }

        // Find inherited libraries via platform() usage
        configurations.bomDependencies.incoming.resolutionResult.allDependencies.each { ResolvedDependencyResult dep ->
            // Any non-constraint via api dependency should *always* be a platform dependency, so expand each of those
            String bomGroup = dep.requested.group
            String bomName = dep.requested.module
            String bomVersion = dep.requested.version

            String bomCoordinates = "${bomGroup}:${bomName}" as String
            List<Tuple2<String, String>> excluded = allExclusions.get(bomCoordinates)

            // fetc hthe BOM as a pom file so it can be expanded
            def bomDependency = dependencies.create("${bomGroup}:${bomName}:${bomVersion}@pom") // TODO Blows up on
            def bomConf = configurations.detachedConfiguration(bomDependency)
            File bomPomFile = bomConf.singleFile

            def reader = new MavenXpp3Reader()
            def model = reader.read(new FileReader(bomPomFile))

            if (model.dependencyManagement && model.dependencyManagement.dependencies) {
                model.dependencyManagement.dependencies.each { depItem ->

                    String coordinates = "${depItem.groupId}:${depItem.artifactId}" as String
                    if(!bomConstraints.containsKey(coordinates)) {
                        boolean isExcluded = excluded.any {
                            if(it.v1 && it.v2) {
                                return coordinates == "${it.v1}:${it.v2}" as String
                            }

                            if(it.v1 && !it.v2) {
                                return depItem.groupId == it.v1
                            }

                            if(!it.v1 && it.v2) {
                                return depItem.artifactId == it.v2
                            }

                            false
                        }
                        if(!isExcluded) {
                            String version = resolveMavenPomVersion(depItem.version, model.properties)
                            bomConstraints.put(coordinates, new Tuple4<>(depItem.groupId, depItem.artifactId, version, bomName))
                        }
                    }
                }
            } else {
                // Do not allow us to include boms that are invalid
                throw new GradleException("BOM ${bomGroup}:${bomName}:${bomVersion} has no dependencyManagement section.")
            }
        }
        ext.bomConstraints = bomConstraints
    }
}

tasks.register('validateNoSnapshotDependencies') {
    doLast {
        configurations.each { config ->
            config.allDependencies.each { dep ->
                if (dep.version && dep.version.contains('-SNAPSHOT')) {
                    throw new GradleException("Releases cannot have a snapshot dependency: ${dep.group}:${dep.name} (${dep.version})")
                }
            }
        }
    }
}

if (ext.isReleaseBuild && ext.isPublishedExternal) {
    tasks.named('generateMetadataFileForMavenPublication').configure {
        dependsOn(tasks.named('validateNoSnapshotDependencies'))
    }
    tasks.named('generatePomFileForMavenPublication').configure {
        dependsOn(tasks.named('validateNoSnapshotDependencies'))
    }
}

Closure determinePossibleKey = { Map.Entry<String, String> found, Map versions ->
    //TODO: this isn't the correct way to do this, but with project mergers it may not matter
    String possibleKey = found.key.toString()
            .replace('grails-datamapping', 'grails-data')
            .replace('grails-datastore', 'grails-data')
            .replace('grails-testing-support-datamapping', 'grails-data')
            .replace('grails-gsp', 'gsp')
            .replace('grails-web-gsp', 'gsp')
            .replace('grails-web-taglib', 'gsp')
            .replace('scaffolding', 'gsp')
            .replace('fields', 'gsp')
            .replace('grails-testing-support-views-gson', 'gsp')
            .replace('grails-testing-support-web', 'gsp')
            .replace('views-markup', 'gsp')
            .replace('views-gson', 'gsp')
    while (possibleKey != null) {
        String propertyName = "${possibleKey}.version" as String
        if (versions.containsKey(propertyName)) {
            return propertyName
        }

        int lastIndex = possibleKey.lastIndexOf('-')
        possibleKey = lastIndex > 0 ? possibleKey.substring(0, lastIndex) : null
    }
}

Closure determinePropertyName = { String groupId, String artifactId, String version, boolean isBom ->
    Map<String, String> toSearch = isBom ? bomPlatformDependencies : bomDependencies
    Map<String, String> toSearchGradle = isBom ? gradleBomPlatformDependencies : gradleBomDependencies

    Map.Entry<String, String> found = toSearch.entrySet().find { "$groupId:$artifactId:$version" as String == it.value as String }
    if(!found) {
        found = toSearchGradle.entrySet().find { "$groupId:$artifactId:$version" as String == it.value as String }
        if(!found) {
            return null
        }
    }

    Map<String, String> versions = bomDependencyVersions

    //TODO: this isn't the correct way to do this, but with project mergers it may not matter
    String propertyName = determinePossibleKey(found, versions)
    if(!propertyName) {
        propertyName = determinePossibleKey(found, gradleBomDependencyVersions)
    }

    if(propertyName) {
        return propertyName
    }

    throw new GradleException("Could not determine artifact property key for $groupId:$artifactId:$version")
}

ext {
    pomDescription = "Grails BOM (Bill of Materials) for managing dependency versions used by Grails Projects"
    pomCustomization = { ->
        def root = asNode()

        def propertiesNode = root.properties ? root.properties[0] : root.appendNode('properties')

        def depMgmt = root.dependencyManagement?.getAt(0)
        def deps = depMgmt?.dependencies?.getAt(0)
        if (deps) {
            Map<String, String> pomProperties = [:]
            deps.dependency.each { dep ->
                String groupId = dep.groupId.text().trim()
                String artifactId = dep.artifactId.text().trim()
                boolean isBom = dep.scope.text().trim() == 'import'

                String inlineVersion = dep.version.text().trim()
                if (inlineVersion == 'null') {
                    inlineVersion = null
                }

                if (inlineVersion) {
                    String propertyName = determinePropertyName(groupId, artifactId, inlineVersion, isBom)
                    if (propertyName) {
                        // Replace the version in the pom with a property reference
                        String propertyReference = "\${${propertyName}}"
                        dep.version[0].value = propertyReference

                        // Add an entry in the <properties> node with the actual version number
                        pomProperties.put(propertyName, inlineVersion)
                    }
                } else if (!inlineVersion) {
                    throw new GradleException("Dependency $groupId:$artifactId does not have a version.")
                }
            }

            for (Map.Entry<String, String> property : pomProperties.entrySet()) {
                propertiesNode.appendNode(property.key, property.value)
            }
        }
    }
}

apply {
    from rootProject.layout.projectDirectory.file('gradle/publish-config.gradle')
}