/**
 * Root project configuration for unused code detection across all Grails modules
 */

// Master task to run unused code detection across all modules
task detectUnusedCodeAll {
    group = 'verification'
    description = 'Run unused code detection across all Grails modules'
    
    doLast {
        logger.lifecycle("Starting unused code detection across all Grails modules...")
        
        def reportDir = file("${project.reporting.baseDir}/unused-code-all")
        reportDir.mkdirs()
        
        def summaryReport = file("${reportDir}/grails-unused-code-summary.html")
        def detailedReport = file("${reportDir}/grails-unused-code-detailed.txt")
        
        def moduleResults = [:]
        def totalDeadFiles = 0
        def totalModulesAnalyzed = 0
        
        // Analyze each subproject
        subprojects.each { subproject ->
            if (subproject.name.startsWith('grails-')) {
                totalModulesAnalyzed++
                logger.lifecycle("Analyzing module: ${subproject.name}")
                
                try {
                    def moduleReportDir = file("${subproject.reporting.baseDir}/unused-code")
                    def moduleDeadFilesReport = file("${moduleReportDir}/dead-files-report.txt")
                    
                    def moduleResult = [
                        name: subproject.name,
                        deadFiles: [],
                        analysisCompleted: false
                    ]
                    
                    if (moduleDeadFilesReport.exists()) {
                        def content = moduleDeadFilesReport.text
                        def deadFileCount = content.count('- ') 
                        moduleResult.deadFiles = content.findAll(/(?m)^- (.+)$/) { match, file -> file }
                        moduleResult.analysisCompleted = true
                        totalDeadFiles += moduleResult.deadFiles.size()
                    }
                    
                    moduleResults[subproject.name] = moduleResult
                    
                } catch (Exception e) {
                    logger.warn("Error analyzing module ${subproject.name}: ${e.message}")
                    moduleResults[subproject.name] = [
                        name: subproject.name,
                        deadFiles: [],
                        analysisCompleted: false,
                        error: e.message
                    ]
                }
            }
        }
        
        // Generate detailed text report
        detailedReport.withWriter { writer ->
            writer.println("Grails Unused Code Detection - Detailed Report")
            writer.println("Generated: ${new Date()}")
            writer.println("=" * 80)
            writer.println()
            
            writer.println("SUMMARY:")
            writer.println("- Total modules analyzed: ${totalModulesAnalyzed}")
            writer.println("- Total potentially dead files: ${totalDeadFiles}")
            writer.println()
            
            writer.println("MODULE ANALYSIS RESULTS:")
            writer.println("-" * 50)
            
            moduleResults.each { moduleName, result ->
                writer.println()
                writer.println("Module: ${result.name}")
                writer.println("Analysis completed: ${result.analysisCompleted}")
                
                if (result.error) {
                    writer.println("Error: ${result.error}")
                } else if (result.deadFiles.size() > 0) {
                    writer.println("Dead files found: ${result.deadFiles.size()}")
                    result.deadFiles.each { file ->
                        writer.println("  - ${file}")
                    }
                } else {
                    writer.println("No dead files detected")
                }
                writer.println("-" * 30)
            }
            
            writer.println()
            writer.println("RECOMMENDATIONS:")
            writer.println("1. Review each module's detailed reports for specific unused code elements")
            writer.println("2. Verify dead files can be safely removed before deletion") 
            writer.println("3. Run CodeNarc analysis on individual modules for detailed unused code detection")
            writer.println("4. Consider refactoring modules with high numbers of dead files")
        }
        
        // Generate HTML summary report
        summaryReport.withWriter { writer ->
            writer.println("""
<!DOCTYPE html>
<html>
<head>
    <title>Grails Unused Code Analysis - Summary Report</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .header { background-color: #1976d2; color: white; padding: 15px; border-radius: 5px; }
        .summary { background-color: #fff3e0; padding: 15px; border-radius: 5px; margin: 20px 0; }
        .module { background-color: #f5f5f5; padding: 10px; margin: 10px 0; border-left: 4px solid #2196f3; }
        .module.has-issues { border-left-color: #ff9800; }
        .module.error { border-left-color: #f44336; }
        .dead-files { margin-left: 20px; font-family: monospace; font-size: 0.9em; }
        .metrics { display: flex; gap: 20px; margin: 20px 0; }
        .metric { background-color: #e3f2fd; padding: 15px; border-radius: 5px; text-align: center; flex: 1; }
        .metric-value { font-size: 24px; font-weight: bold; color: #1976d2; }
        .metric-label { font-size: 14px; color: #666; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔍 Grails Unused Code Analysis</h1>
        <p>Comprehensive analysis of unused code and dead files across all Grails modules</p>
        <p><strong>Generated:</strong> ${new Date()}</p>
    </div>
    
    <div class="metrics">
        <div class="metric">
            <div class="metric-value">${totalModulesAnalyzed}</div>
            <div class="metric-label">Modules Analyzed</div>
        </div>
        <div class="metric">
            <div class="metric-value">${totalDeadFiles}</div>
            <div class="metric-label">Dead Files Found</div>
        </div>
        <div class="metric">
            <div class="metric-value">${moduleResults.count { it.value.analysisCompleted }}</div>
            <div class="metric-label">Successful Analyses</div>
        </div>
    </div>
    
    <div class="summary">
        <h2>📊 Analysis Summary</h2>
        <p>This report provides an overview of unused code detection across all Grails framework modules.</p>
        <p><strong>Total dead files detected:</strong> ${totalDeadFiles} files across ${totalModulesAnalyzed} modules</p>
    </div>
    
    <h2>📋 Module Results</h2>
            """)
            
            moduleResults.each { moduleName, result ->
                def moduleClass = result.error ? 'error' : (result.deadFiles.size() > 0 ? 'has-issues' : 'module')
                writer.println("""
    <div class="module ${moduleClass}">
        <h3>${result.name}</h3>
                """)
                
                if (result.error) {
                    writer.println("<p><strong>❌ Error:</strong> ${result.error}</p>")
                } else if (result.analysisCompleted) {
                    if (result.deadFiles.size() > 0) {
                        writer.println("<p><strong>⚠️ Dead files found:</strong> ${result.deadFiles.size()}</p>")
                        writer.println('<div class="dead-files">')
                        result.deadFiles.each { file ->
                            writer.println("<div>• ${file}</div>")
                        }
                        writer.println('</div>')
                    } else {
                        writer.println("<p><strong>✅ Status:</strong> No dead files detected</p>")
                    }
                } else {
                    writer.println("<p><strong>ℹ️ Status:</strong> Analysis not completed (run detectDeadFiles task on this module)</p>")
                }
                
                writer.println("    </div>")
            }
            
            writer.println("""
    <div class="summary">
        <h2>🎯 Next Steps</h2>
        <ol>
            <li><strong>Review Individual Modules:</strong> Check modules with dead files for removal opportunities</li>
            <li><strong>Run CodeNarc:</strong> Execute <code>gradle codenarcMain</code> on specific modules for detailed analysis</li>
            <li><strong>Verify Before Deletion:</strong> Ensure identified dead files are truly unused before removing them</li>
            <li><strong>Update Dependencies:</strong> Remove unused imports and dependencies after cleanup</li>
        </ol>
        
        <h3>📁 Generated Files</h3>
        <ul>
            <li><code>${reportDir}/grails-unused-code-summary.html</code> - This overview report</li>
            <li><code>${reportDir}/grails-unused-code-detailed.txt</code> - Detailed text report</li>
            <li>Individual module reports in each project's <code>build/reports/unused-code/</code> directory</li>
        </ul>
    </div>
</body>
</html>
            """)
        }
        
        logger.lifecycle("=" * 60)
        logger.lifecycle("GRAILS UNUSED CODE DETECTION COMPLETED")
        logger.lifecycle("=" * 60)
        logger.lifecycle("📊 Summary:")
        logger.lifecycle("   - Modules analyzed: ${totalModulesAnalyzed}")
        logger.lifecycle("   - Dead files found: ${totalDeadFiles}")
        logger.lifecycle("   - Successful analyses: ${moduleResults.count { it.value.analysisCompleted }}")
        logger.lifecycle("")
        logger.lifecycle("📋 Reports generated:")
        logger.lifecycle("   - Summary (HTML): ${summaryReport.absolutePath}")
        logger.lifecycle("   - Detailed (TXT): ${detailedReport.absolutePath}")
        logger.lifecycle("")
        logger.lifecycle("🎯 Next: Review the reports and run 'gradle codenarcMain' on specific modules")
    }
}

// Task to run unused code analysis on specific Grails modules
task detectUnusedCodeGrailsModules {
    group = 'verification'
    description = 'Run unused code detection on key Grails framework modules'
    
    doLast {
        def targetModules = [
            'grails-core',
            'grails-web-common', 
            'grails-web-core',
            'grails-databinding',
            'grails-validation',
            'grails-gsp',
            'grails-spring'
        ]
        
        logger.lifecycle("Running unused code detection on key Grails modules...")
        
        targetModules.each { moduleName ->
            def subproject = project.findProject(":${moduleName}")
            if (subproject) {
                logger.lifecycle("Analyzing ${moduleName}...")
                try {
                    // Apply the unused code detection configuration
                    subproject.apply from: rootProject.file('gradle/unused-code-detection.gradle')
                    
                    // Execute the analysis
                    subproject.tasks.findByName('detectDeadFiles')?.execute()
                    logger.lifecycle("✅ ${moduleName} analysis completed")
                } catch (Exception e) {
                    logger.warn("⚠️ Error analyzing ${moduleName}: ${e.message}")
                }
            } else {
                logger.warn("⚠️ Module ${moduleName} not found")
            }
        }
        
        logger.lifecycle("Key module analysis completed. Run 'detectUnusedCodeAll' for full report.")
    }
}