tasks.register('installToHomeDist', Copy).configure { Copy it ->
    it.inputs.files(tasks.named('jar').map { jar -> jar.outputs.files })
    it.inputs.files(tasks.named('sourcesJar').map { jar -> jar.outputs.files })
    it.inputs.files(tasks.named('javadocJar').map { jar -> jar.outputs.files })
    it.outputs.dir(distInstallDir)
    it.from layout.buildDirectory.dir('libs')
    it.into distInstallDir
}

tasks.withType(PublishToMavenLocal).configureEach {
    dependsOn('installToHomeDist')
    doLast {
        copy {
            from distInstallDir
            into homeDistDir
            includeEmptyDirs = false
        }
    }
}