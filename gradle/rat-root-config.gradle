apply plugin: 'org.nosphere.apache.rat'

tasks.named('rat') {
    excludes = [
            '.asf.yaml', // ASF metadata for github integration excluded from src zip
            '**/build/**', // Gradle generated build directories
            '**/.gradle/**', '**/wrapper/**', 'gradlew*',  // gradle wrapper files excluded from src zip
            '**/*.html', // html files are only in test
            '**/resources/*', // exclude test artifacts
            'out/**', '*.ipr', '**/*.iml', '*.iws', '.idea/**', // Intellij generated files
            'src/*', // exclude build artifacts
            'LICENSE',
            'NOTICE',
            '**/.sdkmanrc', // tool selection files aren't code
            '**/*.png', '**/*.svg', '**/*.ico', '**/*.eps', '**/*.icns', '**/*.jpg', '**/*.jpeg', '**/*.gif', // Image files
            '**/*.db', // H2 database test files
            '**/*.gitkeep', // Empty Gitkeep file
            'grails-scaffolding/src/main/templates/scaffolding/*.gsp', // template files that people are expected to use in the end application
            'grails-fields/grails-app/views/layouts/_fields/*.gsp', // template files that people are expected to use in the end application
            'grails-fields/grails-app/views/templates/_fields/*.gsp', // template files that people are expected to use in the end application
            'grails-geb/src/main/templates/*.groovy', // template files that people are expected to use in the end application
            'grails-test-suite-uber/test/test-projects/plugin-build-settings/plugins/hibernate-1.2-SNAPSHOT/**/*', // exclude example test data for test cases
            'bin/**', // scripts generated during build for grails-shell-cli
    ]
}