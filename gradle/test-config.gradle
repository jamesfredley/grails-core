dependencies {
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

tasks.named('compileTestGroovy', GroovyCompile) {
    groovyOptions.forkOptions.jvmArgs = ['-Xmx768m']
}

tasks.withType(Test).configureEach {
    onlyIf {
        if (project.hasProperty('skipDatastoreTests')) {
            return false
        }

        if (project.hasProperty('onlyMongodbTests')) {
            return false
        }

        if (project.hasProperty('onlyHibernate5Tests')) {
            return false
        }

        true
    }

    useJUnitPlatform()
    testLogging {
        events 'passed', 'skipped', 'failed'
        exceptionFormat = 'full'
    }
    if (isCiBuild) {
        maxParallelForks = 2
        jvmArgs = ['-server', '-Xmx1024M']
        forkEvery = 20
        afterSuite {
            System.out.print('.')
            System.out.flush()
        }
    } else {
        maxParallelForks = 4
        forkEvery = 100
        jvmArgs = ['-server', '-Xmx2048M']
    }
    if (System.getProperty('debug.tests')) {
        jvmArgs '-Xmx2g', '-Xdebug', '-Xnoagent', '-Djava.compiler=NONE',
                '-Xrunjdwp:transport=dt_socket,server=y,suspend=y,address=5005'
    }
}