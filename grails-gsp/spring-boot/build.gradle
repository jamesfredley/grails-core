plugins {
    id 'java-library'
}

version = projectVersion
group = 'org.apache.grails'

apply plugin: 'org.apache.grails.gradle.grails-plugin'

ext {
    pomTitle = 'GSP Spring Boot Plugin'
    pomDescription = 'Provides GSP for Spring Boot Applications'
    pomDevelopers = ['graemerocher': 'Graeme Rocher', lhotari: 'Lari Hotari', codeconsole: 'Scott Murphy Heiberg']
}

dependencies {
    implementation platform(project(':grails-bom'))
    api project(':grails-layout')
    api project(':grails-taglib')
    api project(':grails-gsp-core')
    api project(':grails-web-gsp')
    api project(':grails-web-gsp-taglib')
    api project(':grails-web-jsp')
}

apply {
    // java-configuration must be applied first since tasks are now lazy registered
    from rootProject.layout.projectDirectory.file('gradle/java-config.gradle')
    //TODO: no docs until this is a publish project (its docs likely will need to be handled differently)
    // from rootProject.layout.projectDirectory.file('gradle/docs-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/test-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/grails-extension-gradle-config.gradle')
}