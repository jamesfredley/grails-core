plugins {
    id 'org.apache.grails.buildsrc.properties'
    id 'org.apache.grails.buildsrc.compile'
    id 'org.apache.grails.gradle.grails-plugin'
}

version = projectVersion
group = 'org.apache.grails'

ext {
    pomTitle = 'GSP Spring Boot Plugin'
    pomDescription = 'Provides GSP for Spring Boot Applications'
}

dependencies {
    implementation platform(project(':grails-bom'))
    api project(':grails-sitemesh3')
    // Spring Boot 4 modularized spring-boot-autoconfigure into domain-specific modules.
    // WebMvc auto-configuration classes (e.g., WebMvcAutoConfiguration) moved to spring-boot-webmvc.
    api 'org.springframework.boot:spring-boot-webmvc'
}

apply {
    //TODO: no docs until this is a publish project (its docs likely will need to be handled differently)
    // from rootProject.layout.projectDirectory.file('gradle/docs-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/test-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/grails-extension-gradle-config.gradle')
}
