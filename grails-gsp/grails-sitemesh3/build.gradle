plugins {
    id 'project-report'
    id 'org.apache.grails.buildsrc.properties'
    id 'org.apache.grails.buildsrc.dependency-validator'
    id 'org.apache.grails.gradle.grails-plugin'
    id 'org.apache.grails.buildsrc.compile'
    // TODO: id 'org.apache.grails.buildsrc.publish'
    id 'org.apache.grails.buildsrc.sbom'
    id 'org.apache.grails.gradle.grails-code-style'
}

version = projectVersion
group = 'org.apache.grails'

ext {
    pomTitle = 'SiteMesh 3 Grails Plugin'
    pomDescription = 'SiteMesh is a web-page layout and decoration framework and web- application integration framework to aid in creating sites consisting of many pages for which a consistent look/feel, navigation and layout scheme is required.'
}

dependencies {

    astImplementation platform(project(':grails-bom'))

    implementation platform(project(':grails-bom'))
    api "org.sitemesh:spring-boot-starter-sitemesh"
    api "org.sitemesh:spring-webmvc-sitemesh"
    api project(':grails-web-gsp-taglib')
    api project(':grails-web-gsp')
    api project(':grails-web-common')
    api project(':grails-gsp')
    api project(':grails-core')

    implementation 'org.apache.groovy:groovy'

    compileOnly 'jakarta.servlet:jakarta.servlet-api'

    testImplementation 'jakarta.servlet:jakarta.servlet-api'
    testImplementation 'org.spockframework:spock-core'
    testImplementation 'org.springframework:spring-test'
    testImplementation project(':grails-testing-support-web')
    testImplementation 'org.objenesis:objenesis'
    testRuntimeOnly 'net.bytebuddy:byte-buddy'
    testRuntimeOnly 'org.slf4j:slf4j-nop'
}

apply {
    from rootProject.layout.projectDirectory.file('gradle/docs-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/test-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/grails-extension-gradle-config.gradle')
}