plugins {
    id 'groovy'
    id 'project-report'
    id 'java-library'
}

version = project.projectVersion
group = 'org.apache.grails.views'

ext {
    pomTitle = 'Groovy Server Pages (GSP)'
    pomDescription = 'Groovy Server Pages (GSP) - A server-side view rendering technology based on Groovy'
    pomDevelopers = ['graemerocher': 'Graeme Rocher']
    testForked = true
}

dependencies {

    implementation platform(project(':grails-bom'))
    api project(':grails-web-jsp')

//    api project(':grails-taglib'), { // GrailsTagLibClass
