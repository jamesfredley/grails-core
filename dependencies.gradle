// see https://github.com/dependabot/dependabot-core/issues/1618
// This file allows dependabot to update the gradle dependencies

// This file provides the 'grails-bom' dependencies, while grails-gradle/dependencies.gradle provides the 'grails-gradle-bom' dependencies
// These files are split to facilitate separation of build vs application dependencies. These are the application dependencies.
ext {
    gradleBomDependencyVersions = [
            'ant.version'                   : '1.10.17',
            'asciidoctor-gradle-jvm.version': '4.0.5',
            'asciidoctorj.version'          : '3.0.0',
            'asset-pipeline-gradle.version' : '5.1.0-M4',
            'byte-buddy.version'            : '1.18.8',
            'commons-text.version'          : '1.15.0',
            'directory-watcher.version'     : '0.19.1',
            'gradle-groovy.version'         : '4.0.32',
            'gradle-spock.version'          : '2.3-groovy-4.0',
            'grails-publish-plugin.version' : '1.0.0-M1',
            'jansi.version'                 : '2.4.2',
            'javaparser-core.version'       : '3.28.0',
            'jline.version'                 : '3.30.6',
            'jline2.version'                : '2.14.6',
