plugins {
    id 'groovy'
    id 'java-library'
    id 'org.apache.grails.buildsrc.properties'
    id 'org.apache.grails.buildsrc.dependency-validator'
    id 'org.apache.grails.buildsrc.compile'
    id 'org.apache.grails.gradle.grails-code-style'
}

version = projectVersion
group = 'org.apache.grails'

ext {
    pomTitle = 'Grails Http Client Testing Support'
    pomDescription =
            'Fluent HTTP client testing support for Grails integration and functional tests, ' +
            'reducing boilerplate for request execution and response verification'
}

dependencies {

    implementation platform(project(':grails-bom'))
    implementation project(':grails-testing-support-core')
    implementation 'org.apache.groovy:groovy'
    implementation 'org.apache.groovy:groovy-json'
    implementation 'org.apache.groovy:groovy-xml'
    implementation "org.opentest4j:opentest4j:$openTest4jVersion" // AssertionFailedError
    implementation 'org.springframework:spring-beans' // @Value

    testImplementation "io.github.cjstehno.ersatz:ersatz:$ersatzVersion"
    testImplementation "io.github.cjstehno.ersatz:ersatz-groovy:$ersatzVersion"
    testImplementation 'org.spockframework:spock-core'

    testRuntimeOnly 'org.slf4j:slf4j-nop' // Remove annoying warning
}

apply {
    from rootProject.layout.projectDirectory.file('gradle/test-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/docs-config.gradle')
}
