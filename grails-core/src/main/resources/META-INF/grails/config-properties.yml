categories:
  - name: "Core Properties"
    properties:
      - key: "grails.profile"
        description: "The active Grails application profile (e.g., web, rest-api, plugin)."
        default: "Set by project template"
      - key: "grails.codegen.defaultPackage"
        description: "The default package used when generating artefacts with grails create-* commands."
        default: "Set by project template"
      - key: "grails.serverURL"
        description: "The server URL used to generate absolute links (e.g., https://my.app.com) and used by redirects."
        default: "_(derived from request)_"
      - key: "grails.enable.native2ascii"
        description: "Whether to perform native2ascii conversion of i18n properties files."
        default: "`true`"
      - key: "grails.bootstrap.skip"
        description: "Whether to skip execution of BootStrap.groovy classes on startup."
        default: "`false`"
      - key: "grails.spring.bean.packages"
        description: "List of packages to scan for Spring beans."
        default: "`[]`"
      - key: "grails.spring.disable.aspectj.autoweaving"
        description: "Whether to disable AspectJ auto-weaving."
        default: "`false`"
      - key: "grails.spring.placeholder.prefix"
        description: "The prefix for property placeholder resolution."
        default: "`${`"
      - key: "grails.spring.transactionManagement.proxies"
        description: "Whether to enable Spring proxy-based transaction management since @Transactional uses an AST transform and proxies are typically redundant."
        default: "`false`"
      - key: "grails.plugin.includes"
        description: "List of plugin names to include in the plugin manager (all others excluded)."
        default: "`[]` _(all plugins)_"
      - key: "grails.plugin.excludes"
        description: "List of plugin names to exclude from the plugin manager."
        default: "`[]`"
  - name: "Web & Controllers"
    properties:
      - key: "grails.controllers.defaultScope"
        description: "The default scope for controllers (singleton, prototype, session)."
        default: "`singleton`"
      - key: "grails.controllers.upload.location"
        description: "The directory for temporary file uploads."
        default: "`System.getProperty('java.io.tmpdir')`"
      - key: "grails.controllers.upload.maxFileSize"
        description: "Maximum file size for uploads (in bytes)."
        default: "`1048576` (1 MB)"
      - key: "grails.controllers.upload.maxRequestSize"
        description: "Maximum request size for multipart uploads (in bytes)."
        default: "`10485760` (10 MB)"
      - key: "grails.controllers.upload.fileSizeThreshold"
        description: "File size threshold (in bytes) above which uploads are written to disk."
        default: "`0`"
      - key: "grails.web.url.converter"
        description: "The URL token converter strategy, use hyphenated for hyphen-separated URLs."
        default: "`camelCase`"
      - key: "grails.web.linkGenerator.useCache"
        description: "Whether to cache links generated by the link generator."
        default: "`true`"
      - key: "grails.web.servlet.path"
        description: "The path the Grails dispatcher servlet is mapped to."
        default: "`/+++*+++`"
      - key: "grails.filter.encoding"
        description: "The character encoding for the Grails character encoding filter."
        default: "`UTF-8`"
      - key: "grails.filter.forceEncoding"
        description: "Whether to force the encoding filter to set the encoding on the response."
        default: "`true`"
      - key: "grails.exceptionresolver.logRequestParameters"
        description: "Whether to log request parameters in exception stack traces."
        default: "`true`"
      - key: "grails.exceptionresolver.params.exclude"
        description: "List of parameter names to mask (replace with [*****]) in exception stack traces, typically used for password and creditCard."
        default: "`[]`"
      - key: "grails.logging.stackTraceFiltererClass"
        description: "Fully qualified class name of a custom StackTraceFilterer implementation."
        default: "`org.grails.exceptions.reporting.DefaultStackTraceFilterer`"
  - name: "CORS"
    properties:
      - key: "grails.cors.enabled"
        description: "Whether CORS support is enabled."
        default: "`false`"
      - key: "grails.cors.filter"
        description: "Whether CORS is handled via a servlet filter (true) or an interceptor (false)."
        default: "`true`"
      - key: "grails.cors.allowedOrigins"
        description: "List of allowed origins (e.g., http://localhost:5000), only applies when grails.cors.enabled is true."
        default: "`['*']`"
      - key: "grails.cors.allowedMethods"
        description: "List of allowed HTTP methods."
        default: "`['*']`"
      - key: "grails.cors.allowedHeaders"
        description: "List of allowed request headers."
        default: "`['*']`"
      - key: "grails.cors.exposedHeaders"
        description: "List of response headers to expose to the client."
        default: "`[]`"
      - key: "grails.cors.maxAge"
        description: "How long (in seconds) the preflight response can be cached."
        default: "`1800`"
      - key: "grails.cors.allowCredentials"
        description: "Whether credentials (cookies, authorization headers) are supported."
        default: "`false`"
      - key: "grails.cors.mappings"
        description: "Map of URL patterns to per-path CORS configuration where defining any mapping disables the global /** mapping."
        default: "`{}` _(global `/**` mapping)_"
  - name: "Views & GSP"
    properties:
      - key: "grails.views.default.codec"
        description: "The default encoding codec for GSP output where html reduces XSS risk and options are none, html, base64."
        default: "`none`"
      - key: "grails.views.gsp.encoding"
        description: "The file encoding for GSP source files."
        default: "`UTF-8`"
      - key: "grails.views.gsp.htmlcodec"
        description: "The HTML codec for GSP output (xml or html)."
        default: "`xml`"
      - key: "grails.views.gsp.codecs.expression"
        description: "The codec applied to GSP ${} expressions."
        default: "`html`"
      - key: "grails.views.gsp.codecs.scriptlet"
        description: "The codec applied to GSP <% %> scriptlet output."
        default: "`html`"
      - key: "grails.views.gsp.codecs.taglib"
        description: "The codec applied to tag library output."
        default: "`none`"
      - key: "grails.views.gsp.codecs.staticparts"
        description: "The codec applied to static HTML parts of GSP pages."
        default: "`none`"
      - key: "grails.views.gsp.layout.preprocess"
        description: "Whether GSP layout preprocessing is enabled, where disabling allows Grails to parse rendered HTML but slows rendering."
        default: "`true`"
      - key: "grails.views.enable.jsessionid"
        description: "Whether to include the jsessionid in rendered links."
        default: "`false`"
      - key: "grails.views.filteringCodecForContentType"
        description: "Map of content types to encoding codecs."
        default: "`{}`"
      - key: "grails.gsp.disable.caching.resources"
        description: "Whether to disable GSP resource caching."
        default: "`false`"
      - key: "grails.gsp.enable.reload"
        description: "Whether to enable GSP reloading in production."
        default: "`false`"
      - key: "grails.gsp.view.dir"
        description: "Custom directory for GSP view resolution."
        default: "`grails-app/views`"
  - name: "Content Negotiation & MIME Types"
    properties:
      - key: "grails.mime.types"
        description: "Map of MIME type names to content type strings used for content negotiation."
        default: "_(see web profile `application.yml`)_"
      - key: "grails.mime.file.extensions"
        description: "Whether to use the file extension to determine the MIME type in content negotiation."
        default: "`true`"
      - key: "grails.mime.use.accept.header"
        description: "Whether to use the Accept header for content negotiation."
        default: "`true`"
      - key: "grails.mime.disable.accept.header.userAgents"
        description: "List of user agent substrings (e.g., Gecko, WebKit) for which Accept header processing is disabled."
        default: "`[]`"
      - key: "grails.mime.disable.accept.header.userAgentsXhr"
        description: "When true, XHR requests also respect the grails.mime.disable.accept.header.userAgents setting, while by default XHR requests ignore user agent filtering."
        default: "`false`"
      - key: "grails.converters.encoding"
        description: "The character encoding for converter output (JSON or XML)."
        default: "`UTF-8`"
  - name: "Data Binding"
    properties:
      - key: "grails.databinding.trimStrings"
        description: "Whether to trim whitespace from String values during data binding."
        default: "`true`"
      - key: "grails.databinding.convertEmptyStringsToNull"
        description: "Whether empty String values are converted to null during data binding."
        default: "`true`"
      - key: "grails.databinding.autoGrowCollectionLimit"
        description: "The maximum size to which indexed collections can auto-grow during data binding."
        default: "`256`"
      - key: "grails.databinding.dateFormats"
        description: "List of date format strings used to parse date values during data binding."
        default: "`[\"yyyy-MM-dd HH:mm:ss.S\", \"yyyy-MM-dd'T'HH:mm:ss'Z'\", \"yyyy-MM-dd HH:mm:ss.S z\", \"yyyy-MM-dd'T'HH:mm:ssX\"]`"
      - key: "grails.databinding.dateParsingLenient"
        description: "Whether date parsing is lenient (accepting invalid dates like Feb 30)."
        default: "`false`"
  - name: "Internationalization"
    properties:
      - key: "grails.i18n.cache.seconds"
        description: "How long (in seconds) to cache resolved message bundles with -1 to cache indefinitely and 0 to disable caching."
        default: "`-1`"
      - key: "grails.i18n.filecache.seconds"
        description: "How long (in seconds) to cache the message bundle file lookup with -1 to cache indefinitely."
        default: "`-1`"
  - name: "Static Resources"
    properties:
      - key: "grails.resources.enabled"
        description: "Whether serving static files from src/main/resources/public is enabled."
        default: "`true`"
      - key: "grails.resources.pattern"
        description: "The URL path pattern for serving static resources."
        default: "`/static/**`"
      - key: "grails.resources.cachePeriod"
        description: "The cache period (in seconds) for static resource HTTP responses."
        default: "`0` _(no caching)_"
  - name: "URL Mappings"
    properties:
      - key: "grails.urlmapping.cache.maxsize"
        description: "The maximum size of the URL mapping cache."
        default: "`1000`"
  - name: "Scaffolding"
    properties:
      - key: "grails.scaffolding.templates.domainSuffix"
        description: "The suffix appended to domain class names when generating scaffolding templates."
        default: "`\"\"`"
  - name: "Development & Reloading"
    properties:
      - key: "grails.reload.includes"
        description: "List of fully qualified class names to include in development reloading, when set only these classes are reloaded."
        default: "`[]` _(all project classes)_"
      - key: "grails.reload.excludes"
        description: "List of fully qualified class names to exclude from development reloading."
        default: "`[]`"
  - name: "Events"
    properties:
      - key: "grails.events.spring"
        description: "Whether to bridge GORM/Grails events to the Spring ApplicationEventPublisher, allowing EventListener methods to receive domain events."
        default: "`true`"
  - name: "JSON & Converters"
    properties:
      - key: "grails.json.legacy.builder"
        description: "Whether to use the legacy JSON builder."
        default: "`false`"
      - key: "grails.converters.json.domain.include.class"
        description: "Whether to include the class property when marshalling domain objects to JSON."
        default: "`false`"
      - key: "grails.converters.xml.domain.include.class"
        description: "Whether to include the class attribute when marshalling domain objects to XML."
        default: "`false`"
  - name: "GORM"
    properties:
      - key: "grails.gorm.failOnError"
        description: "When true, save() throws ValidationException on validation failure instead of returning null and can also be a list of package names to apply selectively."
        default: "`false`"
      - key: "grails.gorm.autoFlush"
        description: "Whether to automatically flush the Hibernate session between queries."
        default: "`false`"
      - key: "grails.gorm.flushMode"
        description: "The default Hibernate flush mode (AUTO, COMMIT, MANUAL)."
        default: "`AUTO`"
      - key: "grails.gorm.markDirty"
        description: "Whether to mark a domain instance as dirty on an explicit save() call."
        default: "`true`"
      - key: "grails.gorm.autowire"
        description: "Whether to autowire Spring beans into domain class instances."
        default: "`true`"
      - key: "grails.gorm.default.mapping"
        description: "A closure applied as the default mapping block for all domain classes."
        default: "`{}`"
      - key: "grails.gorm.default.constraints"
        description: "A closure applied as the default constraints for all domain classes."
        default: "`{}`"
      - key: "grails.gorm.custom.types"
        description: "Map of custom GORM types."
        default: "`{}`"
      - key: "grails.gorm.reactor.events"
        description: "Whether to translate GORM events into Reactor events, which is disabled by default for performance."
        default: "`false`"
      - key: "grails.gorm.events.autoTimestampInsertOverwrite"
        description: "Whether auto-timestamp (dateCreated) overwrites a user-provided value on insert."
        default: "`true`"
      - key: "grails.gorm.multiTenancy.mode"
        description: "The multi-tenancy mode: DISCRIMINATOR, DATABASE, SCHEMA, or NONE."
        default: "`NONE`"
      - key: "grails.gorm.multiTenancy.tenantResolverClass"
        description: "Fully qualified class name of the TenantResolver implementation."
        default: "_(required when mode is not NONE)_"
  - name: "DataSource"
    properties:
      - key: "dataSource.driverClassName"
        description: "The JDBC driver class name."
        default: "`org.h2.Driver`"
      - key: "dataSource.username"
        description: "The database username."
        default: "`sa`"
      - key: "dataSource.password"
        description: "The database password."
        default: "`''`"
      - key: "dataSource.url"
        description: "The JDBC connection URL."
        default: "`jdbc:h2:mem:devDb` (dev)"
      - key: "dataSource.dbCreate"
        description: "The schema generation strategy: create-drop, create, update, validate, or none, use none in production with a migration tool."
        default: "`create-drop` (dev), `none` (prod)"
      - key: "dataSource.pooled"
        description: "Whether to use a connection pool."
        default: "`true`"
      - key: "dataSource.logSql"
        description: "Whether to log SQL statements to stdout."
        default: "`false`"
      - key: "dataSource.formatSql"
        description: "Whether to format logged SQL for readability."
        default: "`false`"
      - key: "dataSource.dialect"
        description: "The Hibernate dialect class name or class."
        default: "_(auto-detected from driver)_"
      - key: "dataSource.readOnly"
        description: "Whether the DataSource is read-only (calls setReadOnly(true) on connections)."
        default: "`false`"
      - key: "dataSource.transactional"
        description: "For additional datasources, whether to include in the chained transaction manager."
        default: "`true`"
      - key: "dataSource.persistenceInterceptor"
        description: "For additional datasources, whether to wire up the persistence interceptor (the default datasource is always wired)."
        default: "`false`"
      - key: "dataSource.jmxExport"
        description: "Whether to register JMX MBeans for the DataSource."
        default: "`true`"
      - key: "dataSource.type"
        description: "The connection pool implementation class when multiple are on the classpath."
        default: "`com.zaxxer.hikari.HikariDataSource`"
  - name: "Hibernate"
    properties:
      - key: "hibernate.cache.queries"
        description: "Whether to cache Hibernate queries."
        default: "`false`"
      - key: "hibernate.cache.use_second_level_cache"
        description: "Whether to enable Hibernate's second-level cache."
        default: "`false`"
      - key: "hibernate.cache.use_query_cache"
        description: "Whether to enable Hibernate's query cache."
        default: "`false`"
  - name: "Database Migration Plugin"
    properties:
      - key: "grails.plugin.databasemigration.updateOnStart"
        description: "Whether to automatically apply pending migrations on application startup."
        default: "`false`"
      - key: "grails.plugin.databasemigration.updateAllOnStart"
        description: "Whether to apply migrations for all datasources on startup (overrides per-datasource updateOnStart)."
        default: "`false`"
      - key: "grails.plugin.databasemigration.updateOnStartFileName"
        description: "The changelog filename to use when applying migrations on startup."
        default: "`changelog.groovy` (default ds), `changelog-<name>.groovy` (named ds)"
      - key: "grails.plugin.databasemigration.dropOnStart"
        description: "Whether to drop and recreate the schema before applying migrations on startup."
        default: "`false`"
      - key: "grails.plugin.databasemigration.updateOnStartContexts"
        description: "List of Liquibase contexts to apply during startup migration."
        default: "`[]` _(all contexts)_"
      - key: "grails.plugin.databasemigration.updateOnStartLabels"
        description: "List of Liquibase labels to apply during startup migration."
        default: "`[]` _(all labels)_"
      - key: "grails.plugin.databasemigration.updateOnStartDefaultSchema"
        description: "The default schema to use when applying migrations on startup."
        default: "_(database default schema)_"
      - key: "grails.plugin.databasemigration.databaseChangeLogTableName"
        description: "Custom name for the Liquibase changelog tracking table."
        default: "`DATABASECHANGELOG`"
      - key: "grails.plugin.databasemigration.databaseChangeLogLockTableName"
        description: "Custom name for the Liquibase lock table."
        default: "`DATABASECHANGELOGLOCK`"
      - key: "grails.plugin.databasemigration.changelogLocation"
        description: "The directory containing migration changelog files."
        default: "`grails-app/migrations`"
      - key: "grails.plugin.databasemigration.changelogFileName"
        description: "The default changelog filename for CLI commands."
        default: "`changelog.groovy` (default ds), `changelog-<name>.groovy` (named ds)"
      - key: "grails.plugin.databasemigration.contexts"
        description: "List of Liquibase contexts for CLI commands."
        default: "`[]` _(all contexts)_"
      - key: "grails.plugin.databasemigration.excludeObjects"
        description: "Comma-separated list of database object names to exclude from dbm-gorm-diff and dbm-generate-changelog output, cannot be combined with includeObjects."
        default: "`''`"
      - key: "grails.plugin.databasemigration.includeObjects"
        description: "Comma-separated list of database object names to include in diff and changelog output (all others excluded), cannot be combined with excludeObjects."
        default: "`''`"
      - key: "grails.plugin.databasemigration.skipUpdateOnStartMainClasses"
        description: "List of main class names that should skip auto-migration on startup (e.g., CLI command runners)."
        default: "`['grails.ui.command.GrailsApplicationContextCommandRunner']`"
  - name: "Cache Plugin"
    properties:
      - key: "grails.cache.enabled"
        description: "Whether the cache plugin is enabled."
        default: "`true`"
      - key: "grails.cache.cleanAtStartup"
        description: "Whether to clear all caches on application startup."
        default: "`false`"
      - key: "grails.cache.cacheManager"
        description: "Fully qualified class name of the CacheManager implementation."
        default: "`grails.plugin.cache.GrailsConcurrentMapCacheManager`"
      - key: "grails.cache.clearAtStartup"
        description: "Alias for cleanAtStartup (both are supported)."
        default: "`false`"
      - key: "grails.cache.ehcache.ehcacheXmlLocation"
        description: "Classpath location of the ehcache.xml configuration file."
        default: "`classpath:ehcache.xml`"
      - key: "grails.cache.ehcache.lockTimeout"
        description: "Timeout (in milliseconds) for cache lock acquisition."
        default: "`200`"
  - name: "Asset Pipeline Plugin"
    properties:
      - key: "grails.assets.mapping"
        description: "The URL path segment for serving assets (e.g., /assets/*) and must be one level deep where foo is valid and foo/bar is not."
        default: "`assets`"
      - key: "grails.assets.bundle"
        description: "Whether assets are bundled in development mode where false loads individual files for easier debugging."
        default: "`false`"
      - key: "grails.assets.url"
        description: "Base URL for assets, useful for CDN integration (e.g., https://cdn.example.com/) and can also be a Closure accepting HttpServletRequest for dynamic URL generation in application.groovy."
        default: "_(derived from request)_"
      - key: "grails.assets.storagePath"
        description: "Directory path to copy compiled assets on application startup (e.g., for CDN upload)."
        default: "_(none)_"
      - key: "grails.assets.useManifest"
        description: "Whether to use the manifest.properties file for asset resolution in production."
        default: "`true`"
      - key: "grails.assets.skipNotFound"
        description: "If true, missing assets pass through to the next filter instead of returning 404."
        default: "`false`"
      - key: "grails.assets.allowDebugParam"
        description: "If true, allows ?_debugAssets=y query parameter to force non-bundled mode in production for debugging."
        default: "`false`"
      - key: "grails.assets.cacheLocation"
        description: "Directory for caching compiled assets during development."
        default: "`build/assetCache`"
      - key: "grails.assets.minifyJs"
        description: "Whether to minify JavaScript using Google Closure Compiler."
        default: "`true`"
      - key: "grails.assets.minifyCss"
        description: "Whether to minify CSS."
        default: "`true`"
      - key: "grails.assets.enableSourceMaps"
        description: "Whether to generate source maps for minified JavaScript files (.js.map)."
        default: "`true`"
      - key: "grails.assets.enableDigests"
        description: "Whether to generate digest or fingerprinted filenames (e.g., app-abc123.js)."
        default: "`true`"
      - key: "grails.assets.skipNonDigests"
        description: "If true, only digested filenames are generated and non-digested names are served via manifest mapping, reducing storage by 50%."
        default: "`true`"
      - key: "grails.assets.enableGzip"
        description: "Whether to generate gzipped versions of assets (.gz files)."
        default: "`true`"
      - key: "grails.assets.excludesGzip"
        description: "List of GLOB patterns for files to exclude from gzip compression (e.g., ['**/*.png', '**/*.jpg'])."
        default: "`['+++**+++/+++*+++.png', '+++**+++/+++*+++.jpg']`"
      - key: "grails.assets.minifyOptions"
        description: "Map of options passed to Google Closure Compiler with keys languageMode, targetLanguage, and optimizationLevel."
        default: "`{languageMode: 'ES5', targetLanguage: 'ES5', optimizationLevel: 'SIMPLE'}`"
      - key: "grails.assets.excludes"
        description: "List of GLOB patterns (or regex: prefixed) for files to exclude from compilation, excluded files can still be included via require directives."
        default: "`[]`"
      - key: "grails.assets.includes"
        description: "List of GLOB patterns to override excludes and allow specific files to be compiled even if they match an exclude pattern."
        default: "`[]`"
      - key: "grails.assets.enableES6"
        description: "Enable ES6+ transpilation via Babel/SWC where if not set it auto-detects ES6 syntax."
        default: "_(auto-detect)_"
      - key: "grails.assets.commonJs"
        description: "Whether to enable CommonJS module support (require() / module.exports)."
        default: "`true`"
      - key: "grails.assets.nodeEnv"
        description: "Value injected as process.env.NODE_ENV in JavaScript files (used by libraries like React)."
        default: "`development`"
  - name: "Spring Security Plugin"
    properties:
      - key: "grails.plugin.springsecurity.active"
        description: "Whether the security plugin is active."
        default: "`true`"
      - key: "grails.plugin.springsecurity.printStatusMessages"
        description: "Whether to print startup and status messages to the console."
        default: "`true`"
      - key: "grails.plugin.springsecurity.rejectIfNoRule"
        description: "Whether to reject requests if no matching security rule is found."
        default: "`true`"
      - key: "grails.plugin.springsecurity.securityConfigType"
        description: "The security configuration strategy (Annotation, Requestmap, InterceptUrlMap)."
        default: "`Annotation`"
      - key: "grails.plugin.springsecurity.roleHierarchy"
        description: "The role hierarchy definition string."
        default: "`''`"
      - key: "grails.plugin.springsecurity.cacheUsers"
        description: "Whether to cache user details in the user details service."
        default: "`false`"
      - key: "grails.plugin.springsecurity.useHttpSessionEventPublisher"
        description: "Whether to register a HttpSessionEventPublisher bean."
        default: "`false`"
      - key: "grails.plugin.springsecurity.useSecurityEventListener"
        description: "Whether to publish security events to the Grails event system."
        default: "`false`"
      - key: "grails.plugin.springsecurity.userLookup.userDomainClassName"
        description: "The fully qualified name of the user domain class."
        default: "`null` _(must be set)_"
      - key: "grails.plugin.springsecurity.userLookup.usernamePropertyName"
        description: "The property name for the username in the user domain class."
        default: "`username`"
      - key: "grails.plugin.springsecurity.userLookup.enabledPropertyName"
        description: "The property name for the enabled status in the user domain class."
        default: "`enabled`"
      - key: "grails.plugin.springsecurity.userLookup.passwordPropertyName"
        description: "The property name for the password in the user domain class."
        default: "`password`"
      - key: "grails.plugin.springsecurity.userLookup.authoritiesPropertyName"
        description: "The property name for the authorities collection in the user domain class."
        default: "`authorities`"
      - key: "grails.plugin.springsecurity.userLookup.accountExpiredPropertyName"
