plugins {
    id 'groovy'
    id 'java-library'
    id 'project-report'
}

version = projectVersion
group = 'org.apache.grails'

dependencies {

    implementation platform(project(':grails-bom'))

    compileOnly "org.aspectj:aspectjrt", "org.aspectj:aspectjweaver"
    api "jakarta.inject:jakarta.inject-api"
    api "jakarta.persistence:jakarta.persistence-api"
    api "jakarta.annotation:jakarta.annotation-api"

    implementation "com.github.ben-manes.caffeine:caffeine"
    api "org.apache.groovy:groovy:$groovyVersion"
    api("org.springframework.boot:spring-boot")
    api "org.springframework:spring-core"
    api "org.springframework:spring-tx"
    api "org.springframework:spring-beans"
    api "org.springframework:spring-context"
    api "org.springframework.boot:spring-boot-autoconfigure"

    compileOnly "org.springframework:spring-test"
    compileOnly "org.apache.groovy:groovy-templates"

    api project(":grails-bootstrap")
    api project(":grails-spring")

    // This only needs the datastore version property because of how source jars are being created.
    // Build will succeed, but assemble will fail without this because of task ordering in gradle.
    api "org.apache.grails.data:grails-datastore-core:${project['grails-datastore.version']}"

    testImplementation "org.springframework:spring-jdbc"

    testImplementation "org.hamcrest:hamcrest"

    testRuntimeOnly "com.h2database:h2"
    testRuntimeOnly "com.fasterxml.jackson.core:jackson-databind"

    testImplementation 'org.apache.groovy:groovy-test-junit5'
    testImplementation 'org.junit.jupiter:junit-jupiter-api'
    testImplementation 'org.junit.platform:junit-platform-runner'

    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine'

    // Logging
    api 'org.slf4j:slf4j-api'
    api 'org.slf4j:jcl-over-slf4j'

    // Testing
    testImplementation 'org.slf4j:slf4j-simple'
    testImplementation('org.spockframework:spock-core') { transitive = false }
    // Required by Spock's Mocking
    testRuntimeOnly 'net.bytebuddy:byte-buddy'
    testImplementation 'org.objenesis:objenesis'
}

def writeProps = tasks.register('writeGrailsProperties', WriteProperties) {
    outputFile = file("${buildDir}/grails.build.properties")
    property("grails.version", project.version)
}

tasks.named('processResources') {
    from writeProps
}

apply {
    from rootProject.layout.projectDirectory.file('gradle/assemble-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/docs-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/java-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/publish-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/test-config.gradle')
}