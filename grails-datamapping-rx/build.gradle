plugins {
    id 'groovy'
    id 'java-library'
}

version = projectVersion
group = 'org.apache.grails.data'

ext {
    pomTitle = 'Grails GORM'
    pomDescription = 'GORM - Grails Data Access Framework'
    pomDevelopers = [
            'graemerocher': 'Graeme Rocher',
            'jeffscottbrown': 'Jeff Brown',
            'burtbeckwith': 'Burt Beckwith',
            'jameskleeh': 'James Kleeh',
            'puneetbehl': 'Puneet Behl',
            'jamesfredley': 'James Fredley'
    ]
}

dependencies {
    implementation platform(project(':grails-bom'))
    implementation 'org.apache.groovy:groovy'

    api "io.reactivex:rxjava"
    api project(":grails-datamapping-core"), {
        exclude group:"org.apache.grails.async", module:'grails-async'
        exclude group:"org.apache.grails.data", module:'grails-datastore-core'
    }
    api project(":grails-datastore-core")
    implementation "org.javassist:javassist:$javassistVersion"
    api "jakarta.annotation:jakarta.annotation-api"
    implementation "jakarta.validation:jakarta.validation-api"
    compileOnly "org.hibernate.validator:hibernate-validator"

    testImplementation "org.apache.groovy:groovy-test-junit5"
    testImplementation "org.apache.groovy:groovy-test"
    testImplementation "org.junit.jupiter:junit-jupiter-engine"
    testImplementation "org.junit.platform:junit-platform-runner"

    testImplementation "org.junit.jupiter:junit-jupiter-api"
    testImplementation "org.spockframework:spock-core"
}

apply {
    from rootProject.layout.projectDirectory.file('gradle/java-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/code-style-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/test-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/publish-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/docs-config.gradle')
}
