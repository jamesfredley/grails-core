# §5a - build-time and configuration variants that change the security envelope.
config_knobs:
  - name: grails.views.default.codec
    default: html
    security_relevant: true
    if_changed_from_default: OUT-OF-MODEL_non_default_build
    section: "§5a, §8 P2"
  - name: grails.databinding.autoGrowCollectionLimit
    default: 256
    security_relevant: true
    if_changed_from_default: OUT-OF-MODEL_non_default_build
    section: "§5a, §8 P9"
  - name: grails.controllers.upload.maxFileSize
    default: spring_boot_default
    security_relevant: true
    section: "§5a"
  - name: grails.controllers.upload.maxRequestSize
    default: spring_boot_default
    security_relevant: true
    section: "§5a"
  - name: grails.allowedMethods
    default: none_developer_opt_in
    security_relevant: false
    section: "§5a"
  - name: grails.config.locations
    default: empty
    security_relevant: true
    notes: "Operator-trusted input; a non-empty value sourced from an untrusted location is BY-DESIGN_property_disclaimed."
    section: "§5a, §9, §11"
  - name: GRAILS_ENV
    default: production_for_bootjar_development_for_cli
    security_relevant: true
    if_changed_to_development_in_production: OUT-OF-MODEL_non_default_build
    section: "§5a"

# §6 - per-parameter trust (subset; HTTP request boundary is the primary surface).
entry_points:
  - surface: Controller.params
    parameter: any
    attacker_controllable: true
    caller_must_enforce:
      - "type coercion correctness"
      - "no concatenation into HQL/SQL/JPQL/Groovy strings"
      - "no use as redirect target without allow-list"
  - surface: Controller.request.headers
    parameter: any
    attacker_controllable: true
    caller_must_enforce:
      - "verify auth headers via configured auth subsystem"
      - "do not treat presence as evidence"
  - surface: Controller.request.cookies
    parameter: any
    attacker_controllable: true
  - surface: Controller.request.JSON
    parameter: body
    attacker_controllable: true
  - surface: Controller.request.XML
    parameter: body
    attacker_controllable: true
    notes: "XXE hardening is the parser's responsibility (§9 false friend)."
  - surface: bindData
    parameter: source
    attacker_controllable: true
    caller_must_enforce:
      - "use bindable=false, include, or exclude allow-lists"
  - surface: domain_class_constructor_binding
    parameter: params_map
    attacker_controllable: true
    notes: "Mass-assignment risk; prefer command objects."
  - surface: MultipartFile
    parameter: bytes_originalFilename_contentType
    attacker_controllable: true
    caller_must_enforce:
      - "never use originalFilename as filesystem path"
      - "verify contentType against actual bytes"
  - surface: grails.config.locations
    parameter: path
    attacker_controllable: false
    trusted_role: operator
  - surface: application.groovy
    parameter: file_contents
    attacker_controllable: false
    trusted_role: operator
    notes: "Evaluated as Groovy by ConfigSlurper."
  - surface: domain_mapping_closure
    parameter: closure_body
    attacker_controllable: false
    trusted_role: developer
  - surface: MavenProfileRepository
    parameter: profile_coordinates
    attacker_controllable: false
    trusted_role: developer
    notes: "CLI-only; downloaded profiles execute .groovy command scripts."

# §7 - adversary model summary.
adversaries:
  in_scope:
    - id: http_end_user
      description: "Remote unauthenticated HTTP client crafting arbitrary requests against the deployed application."
  out_of_scope:
    - id: local_shell_attacker
    - id: classpath_compromise
    - id: malicious_grails_plugin
    - id: build_environment_compromise
    - id: jvm_co_tenant
    - id: malicious_profile_via_MavenProfileRepository
    - id: GrailsShell_or_GroovyConsole_reachability
    - id: side_channel_observer

# §8 - claimed security properties.
properties_provided:
  - id: P1
    description: "Parameterized GORM queries are SQL/HQL-injection safe."
    violation_symptom: "Reflected data appears unescaped in executed SQL; attacker boolean predicates evaluate."
    severity: security_critical
    provenance: documented
    source: grails-doc/src/en/guide/security/securingAgainstAttacks.adoc
  - id: P2
    description: "Default GSP ${...} expression output is HTML-encoded."
    violation_symptom: "Reflected XSS via value rendered through ${userInput} without raw()."
    severity: security_critical
    provenance: documented
    source: grails-doc/src/en/guide/security/xssPrevention.adoc
  - id: P3
    description: "Grails-supplied link/form/createLink/createLinkTo tag helpers URL-encode parameter values."
    violation_symptom: "Reflected URL or header injection via tag-helper parameter."
    severity: security_critical
    provenance: documented
    source: grails-doc/src/en/guide/security.adoc
  - id: P4
    description: "HTMLCodec, URLCodec, JavaScriptCodec, Base64Codec encode for their stated context."
    violation_symptom: "Output does not match documented encoding for the context."
    severity: security_critical
    provenance: documented
    source: grails-doc/src/en/guide/security/codecs.adoc
  - id: P5
    description: "useToken (synchronizer token) on a form blocks naive CSRF and double-submit."
    violation_symptom: "Token validation accepts missing, reused, or attacker-supplied token."
    severity: security_critical
    provenance: documented
    source: grails-doc/src/en/guide/security/securingAgainstAttacks.adoc
  - id: P6
    description: "Data binding respects bindable=false and explicit include/exclude lists."
    violation_symptom: "Field marked unbindable is set from request input."
    severity: security_critical
    provenance: inferred
  - id: P7
    description: "Compile-time AST transforms act only on developer-authored source."
    violation_symptom: "Transform fires on or is influenced by attacker-supplied input."
    severity: correctness
    provenance: inferred
  - id: P8
    description: "Configuration loading does not evaluate application.groovy from a path the framework chose at runtime."
    violation_symptom: "User request causes evaluation of an unauthorized Groovy file."
    severity: security_critical
    provenance: inferred
  - id: P9
    description: "maxFileSize, maxRequestSize, autoGrowCollectionLimit provide bounded data-binding memory."
    violation_symptom: "Memory growth proportional to input regardless of configured limit."
    severity: resource_bug
    provenance: inferred

# §9 - properties the framework does NOT provide.
properties_disclaimed:
  - id: auth
    description: "Authentication, authorization, session management, password storage."
    delegate_to: spring_security_plugin_or_equivalent
    provenance: documented
  - id: csrf_without_useToken
    description: "CSRF protection on requests not protected by useToken."
    provenance: documented
  - id: xss_with_codec_disabled
    description: "XSS protection when codec is disabled or raw() is used."
    provenance: documented
  - id: hql_concatenation
    description: "Injection protection for queries built by string concatenation."
    provenance: documented
  - id: object_level_authz_guessable_ids
    description: "Authorization for individual domain-object access by ID."
    provenance: documented
  - id: rate_limiting
    description: "Built-in throttling or DoS volume protection."
    provenance: documented
  - id: constant_time_crypto
    description: "Constant-time cryptographic primitives."
    provenance: inferred
  - id: groovy_sandboxing
    description: "Sandboxing of Groovy code on the classpath, in application.groovy, or in plugin closures."
    provenance: inferred
  - id: profile_jar_provenance
    description: "Verification of Maven profile JAR provenance beyond Maven Resolver defaults."
    provenance: inferred
  - id: cross_tenant_isolation
    description: "Process-level isolation between deployed applications sharing a JVM."
    provenance: inferred
  - id: transport_security
    description: "TLS; provided by Spring Boot embedded container or operator proxy."
    provenance: inferred

# False-friend properties - features that look like security guarantees but are not.
false_friends:
  - id: secured_annotation
    looks_like: "Authorization decoration on a method."
    actually_is: "Integration hint for the Spring Security plugin. Inert without the plugin."
  - id: bindable_false
    looks_like: "Field-level access control."
    actually_is: "Data-binding allow-list only; does not prevent code from setting the field or response from including it."
  - id: useToken
    looks_like: "Replay-protection mechanism."
    actually_is: "Synchronizer-token CSRF defense and double-submit guard; not replay protection."
  - id: domain_constraints
    looks_like: "Security boundary."
    actually_is: "Input-validation rules. A constraint failure is a validation error, not an attack signal."
  - id: gsp_html_comments
    looks_like: "Server-side comments stripped on render."
    actually_is: "HTML comments (<!-- ... -->) reach the client. Use GSP comments (<%-- ... --%>) for server-side stripping."
  - id: grails_serverURL
    looks_like: "Authoritative deployment URL declaration."
    actually_is: "Link-generation helper; does not bind the embedded container's listening address."

# §11a - recurring false positives that automated triage should suppress or treat as KNOWN-NON-FINDING.
known_non_findings:
  - pattern: "Dynamic class loading in ClassPathScanner.classLoader.loadClass(name)"
    rationale: "name sourced from operator-controlled classpath (§5, §7)."
  - pattern: "Reflective Class.forName / loadClass in ApplicationClassInjector"
    rationale: "Class names from build/classpath, not attacker-controllable."
  - pattern: "Groovy evaluate() / ConfigSlurper in GroovyConfigPropertySourceLoader and HibernateMappingBuilder"
    rationale: "Inputs are application.groovy and domain mapping {} closures - trusted developer/operator inputs (§6, §9)."
  - pattern: "GroovyShell in grails-console (GrailsShell, GroovyConsoleApplicationContext)"
    rationale: "Developer tools providing arbitrary code execution by design (§3)."
  - pattern: "Mass-assignment warning on domain-class binding with bindable=false or command object"
    rationale: "Heuristic does not see the allow-list; verify allow-list, then suppress."
  - pattern: "GSP ${raw(x)} on a developer-controlled value"
    rationale: "Trusted-input opt-out by developer; verify by trace."
  - pattern: "SimpleDataBinder reflection on target field types"
    rationale: "Target class is developer-authored, not attacker-supplied."
  - pattern: "BeforeValidateHelper Serializable with readObject"
    rationale: "In-model only if application stores instances in attacker-reachable serialized container; out-of-model in default request flow (§14 wave 3 to confirm)."
  - pattern: "MavenProfileRepository without checksum verification"
    rationale: "Build-time CLI tooling on developer workstation, not deployed application."
  - pattern: "@Secured present but no in-method authz logic"
    rationale: "Spring Security plugin wires the check externally."
  - pattern: "Framework-level logging of request data via GString"
    rationale: "Framework's own logging never reflects request data; application code that does so is an application bug."

# §13 - closed set of triage dispositions.
dispositions:
  - label: VALID
    licensed_by: ["§8", "§6", "§7"]
  - label: VALID-HARDENING
    licensed_by: ["§11"]
  - label: "OUT-OF-MODEL: trusted-input"
    licensed_by: ["§6"]
  - label: "OUT-OF-MODEL: adversary-not-in-scope"
    licensed_by: ["§7"]
  - label: "OUT-OF-MODEL: unsupported-component"
    licensed_by: ["§3"]
  - label: "OUT-OF-MODEL: non-default-build"
    licensed_by: ["§5a"]
  - label: "BY-DESIGN: property-disclaimed"
    licensed_by: ["§9"]
  - label: KNOWN-NON-FINDING
    licensed_by: ["§11a"]
  - label: MODEL-GAP
    licensed_by: ["§12"]
    triggers_revision: true

# Provenance counts (must match THREAT_MODEL.md §1 draft confidence).
provenance_counts:
  documented: 46
  maintainer: 0
  inferred: 58
