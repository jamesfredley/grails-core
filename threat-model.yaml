# Machine-readable companion to THREAT_MODEL.md (§15).
#
# This file is a derived index for automated and AI-assisted triage tooling.
# THREAT_MODEL.md is canonical; regenerate this file whenever the prose
# document changes. Schema follows the structure suggested in the
# threat-model-producer rubric (https://gist.github.com/potiuk/da14a826283038ddfe38cc9fe6310573).

project:
  name: apache/grails-core
  version_binding: "8.0.x"
  threat_model: THREAT_MODEL.md
  status: draft
  date: "2026-01"
  disclosure: SECURITY.md

# §2/§3 - component families and their in/out-of-model disposition.
components:
  - name: http_request_ingress
    in_model: true
    representative_files:
      - grails-web-mvc/src/main/groovy/org/grails/web/servlet/mvc/GrailsDispatcherServlet.groovy
      - grails-web-url-mappings/src/main/groovy/org/grails/web/mapping/mvc/UrlMappingsHandlerMapping.groovy
  - name: interceptors_controllers
    in_model: true
    representative_files:
      - grails-interceptors/src/main/groovy/org/grails/plugins/web/interceptors/GrailsInterceptorHandlerInterceptorAdapter.groovy
      - grails-controllers/src/main/groovy/grails/artefact/Controller.groovy
  - name: data_binding
    in_model: true
    representative_files:
      - grails-web-databinding/src/main/groovy/grails/web/databinding/GrailsWebDataBinder.groovy
      - grails-web-databinding/src/main/groovy/org/grails/web/databinding/bindingsource/DefaultDataBindingSourceRegistry.groovy
      - grails-databinding-core/src/main/groovy/grails/databinding/SimpleDataBinder.groovy
  - name: view_rendering
    in_model: true
    representative_files:
      - grails-gsp/core/src/main/groovy/org/grails/gsp/compiler/GroovyPageCompiler.groovy
      - grails-views-core/src/main/groovy/grails/views/ResolvableGroovyTemplateEngine.groovy
      - grails-views-core/src/main/groovy/grails/views/mvc/SmartViewResolver.groovy
  - name: codecs_output_encoding
    in_model: true
    representative_files:
      - grails-encoder/
  - name: gorm_mapping_validation
    in_model: true
    representative_files:
      - grails-datamapping-core/src/main/groovy/org/grails/compiler/gorm/GormEntityTransformation.groovy
      - grails-datamapping-validation/src/main/groovy/grails/gorm/validation/PersistentEntityValidator.groovy
      - grails-data-hibernate5/core/src/main/groovy/org/grails/orm/hibernate/cfg/HibernateMappingBuilder.groovy
  - name: configuration_loading
    in_model: true
    representative_files:
      - grails-core/src/main/groovy/grails/config/external/ExternalConfigRunListener.groovy
      - grails-core/src/main/groovy/org/grails/core/cfg/GroovyConfigPropertySourceLoader.groovy
      - grails-core/src/main/groovy/grails/boot/config/GrailsApplicationPostProcessor.groovy
  - name: plugin_artefact_discovery
    in_model: true
    representative_files:
      - grails-core/src/main/groovy/grails/plugins/PluginManagerLoader.groovy
      - grails-core/src/main/groovy/grails/boot/config/tools/ClassPathScanner.groovy
      - grails-core/src/main/groovy/org/grails/core/io/support/GrailsFactoriesLoader.groovy
  - name: compile_time_ast_transforms
    in_model: true
    notes: "Developer-trusted inputs only; not reachable from HTTP."
    representative_files:
      - grails-core/src/main/groovy/org/grails/compiler/injection/GlobalGrailsClassInjectorTransformation.groovy
      - grails-rest-transforms/src/main/groovy/org/grails/plugins/web/rest/transform/ResourceTransform.groovy
      - grails-views-core/src/main/groovy/grails/views/compiler/ViewsTransform.groovy
  - name: cli_shell_grails_shell_cli
    in_model: true
    notes: "Developer surface; see §7 supply-chain caveats."
    representative_files:
      - grails-shell-cli/src/main/groovy/org/grails/cli/GrailsCli.groovy
      - grails-shell-cli/src/main/groovy/org/grails/cli/profile/repository/MavenProfileRepository.groovy
