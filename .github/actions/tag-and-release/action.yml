name: 'Grails Docs Release Action'
description: 'Update grailsVersion and add release tag'
inputs:
  target_branch:
    description: 'Target Branch'
    required: true
  grails_version:
    description: 'Grails Release Version'
    required: true
runs:
  using: 'docker'
  image: 'Dockerfile'
  args:
    - ${{ inputs.target_branch }}
    - ${{ inputs.grails_version }}
