name: "Release"
on:
  release:
    types: [published]
jobs:
  build:
    name: "Release artifacts to GitHub release and SDKMAN plus publish source & documentation"
    runs-on: ubuntu-latest
    permissions:
      contents: write  #  to create release & upload wrapper
      issues: write  #  to modify milestones
    outputs:
      release_version: ${{ steps.release_version.outputs.value }}
    env:
      GIT_USER_NAME: 'grails-build'
      GIT_USER_EMAIL: 'grails-build@users.noreply.github.com'
    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4
      - name: "☕️ Setup JDK"
        uses: actions/setup-java@v4
        with:
          distribution: 'liberica'
          java-version: '17'
      - name: "🐘 Setup Gradle"
        uses: gradle/actions/setup-gradle@v4
        with:
          develocity-access-key: ${{ secrets.GRAILS_DEVELOCITY_ACCESS_KEY  }}
      - name: '⚙️ Run pre-release'
        id: release_version
        uses: grails/grails-github-actions/pre-release@asf
        env:
          RELEASE_VERSION: ${{ needs.publish.outputs.release_version }}
          RELEASE_SCRIPT_PATH: '.github/scripts/setReleasedGrailsVersion.sh'
      - name: "🔨 Build All"
        run: ./gradlew assemble
      - name: "📦 Generate Docs"
        run: >
          ./gradlew
          docs
      - name: "📤 Upload CLI Zip"
        id: upload-release-asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: grails-cli/build/distributions/grails-cli-${{ steps.release_version.outputs.value }}.zip
          asset_name: grails-cli-${{ steps.release_version.outputs.value }}.zip
          asset_content_type: application/zip
      - name: "🔐 Generate secring file"
        env:
          SECRING_FILE: ${{ secrets.SECRING_FILE }}
        run: echo $SECRING_FILE | base64 -d > ${{ github.workspace }}/secring.gpg
      - name: "📤 Publish to Sonatype OSSRH"
        id: publish
        env:
          GRAILS_PUBLISH_RELEASE: 'true'
          NEXUS_PUBLISH_USERNAME: ${{ secrets.NEXUS_PUBLISH_USERNAME }}
          NEXUS_PUBLISH_PASSWORD: ${{ secrets.NEXUS_PUBLISH_PASSWORD }}
          NEXUS_PUBLISH_URL: ${{ secrets.NEXUS_PUBLISH_RELEASE_URL }}
          NEXUS_PUBLISH_STAGING_PROFILE_ID: ${{ secrets.NEXUS_PUBLISH_STAGING_PROFILE_ID }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSPHRASE: ${{ secrets.SIGNING_PASSPHRASE }}
        run: >
          ./gradlew
          -Psigning.secretKeyRingFile=${{ github.workspace }}/secring.gpg 
          publishToSonatype 
          closeSonatypeStagingRepository
      - name: "🚀 Publish to Github Pages"
        if: success()
        uses: grails/grails-github-actions/deploy-github-pages@asf
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GRADLE_PUBLISH_RELEASE: 'true'
          SOURCE_FOLDER: build/docs
          VERSION: ${{ steps.release_version.outputs.value }}
      - name: '⚙️ Run post-release'
        id: post_release
        uses: grails/grails-github-actions/post-release@asf
        env:
          RELEASE_SCRIPT_PATH: '.github/scripts/setSnapshotGrailsVersion.sh'
  sdkman:
    name: "Release to SDKMAN!"
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.build.outputs.release_version }}
      - name: "☕️ Setup JDK"
        uses: actions/setup-java@v4
        with:
          distribution: 'liberica'
          java-version: '17'
      - name: "🐘 Setup Gradle"
        uses: gradle/actions/setup-gradle@v4
        with:
          develocity-access-key: ${{ secrets.GRAILS_DEVELOCITY_ACCESS_KEY  }}
      - name: "🚀 Grails SDK Minor Release"
        if: contains(needs.build.outputs.release_version, 'M')
        run: ./gradlew sdkMinorRelease
        env:
          GVM_SDKVENDOR_KEY: ${{ secrets.GVM_SDKVENDOR_KEY }}
          GVM_SDKVENDOR_TOKEN: ${{ secrets.GVM_SDKVENDOR_TOKEN }}
      - name: "🚀 Grails SDK Major Release"
        if: startsWith(needs.build.outputs.release_version, '7.') && !contains(needs.build.outputs.release_version, 'M')
        run: ./gradlew sdkMajorRelease
        env:
          GVM_SDKVENDOR_KEY: ${{ secrets.GVM_SDKVENDOR_KEY }}
          GVM_SDKVENDOR_TOKEN: ${{ secrets.GVM_SDKVENDOR_TOKEN }}
