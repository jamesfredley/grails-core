name: "Release"
on:
  release:
    types: [ published ]
permissions: { }
env:
  DIST_NAME: apache-grails
  # to prevent throttling of the github api, include the github token in an environment variable since the build will check for it
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GRAILS_PUBLISH_RELEASE: 'true'
  JAVA_DISTRIBUTION: liberica
  JAVA_VERSION: 17.0.18 # this must be a specific version for reproducible builds, keep it synced with .sdkmanrc and verification container
  PROJECT_DESC: >
    Grails is a powerful Groovy-based web application framework for the JVM,
    built on top of Spring Boot, and supported by a rich ecosystem of plugins
    that extend its functionality.
  PROJECT_NAME: Apache Grails
  REPO_NAME: ${{ github.event.repository.name }}
  REPO_SLUG: ${{ github.repository }}
  SVN_FOLDER: core
  SVN_PROJECT: grails
  TAG: ${{ github.event.release.tag_name }}
  TARGET_BRANCH: ${{ github.event.release.target_commitish }}
  VERSION: will be computed in each job
concurrency:
  group: release-pipeline
  cancel-in-progress: false
jobs:
  publish:
    name: "Stage Jar Files"
    permissions:
      contents: write  #  to create release & upload wrapper
      issues: write  #  to modify milestones
    runs-on: ubuntu-24.04
    steps:
      - name: "📝 Establish release version"
        run: echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"
      - name: "🌐 Output Agent IP" # in the event RAO blocks this agent, this can be used to debug it
        run: curl -s https://api.ipify.org
      - name: "📥 Checkout repository"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # needed for docs release dropdown, (fetch-tags: true with fetch-depth: 1 does not work; https://github.com/actions/checkout/issues/1471)
          filter: tree:0 # limit size, keeping tags for docs release dropdown
          ref: ${{ env.TAG }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: "📅 Store common build date" # to ensure a reproducible build
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)" >> "$GITHUB_ENV"
      - name: "📅 Ensure source files use common date"
        run: find . -depth \( -type f -o -type d \) -exec touch -d "@${SOURCE_DATE_EPOCH}" {} +
      - name: "🔐 Set up GPG" # Use env var to not expose the key
        env:
          GPG_KEY: ${{ secrets.GRAILS_GPG_KEY }}
        run: |
          echo "${GPG_KEY}" | gpg --batch --import
          gpg --list-keys
      - name: "☕️ Setup JDK"
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      - name: "🐘 Setup Gradle"
        uses: gradle/actions/setup-gradle@v5
        with:
          develocity-access-key: ${{ secrets.GRAILS_DEVELOCITY_ACCESS_KEY }}
      - name: "⚙️ Run pre-release"
        uses: apache/grails-github-actions/pre-release@asf
        env:
          RELEASE_VERSION: ${{ env.VERSION }}
          RELEASE_SCRIPT_PATH: '.github/scripts/setReleasedGrailsVersion.sh'
      - name: "🧩 Run grails-core assemble"
        run: ./gradlew assemble -PgithubBranch=${TARGET_BRANCH}
      - name: "🧩 Run grails-forge assemble"
        working-directory: grails-forge
        run: ./gradlew assemble -PgithubBranch=${TARGET_BRANCH}
      - name: "📦 Generate grails-core docs (to assert that is works, before proceeding)"
        run: ./gradlew grails-doc:build -PgithubBranch=${TARGET_BRANCH}
      - name: "🔏 Sign grails-wrapper ZIP"
        run: >
          gpg
          --default-key "${{ secrets.GPG_KEY_ID }}"
          --batch
          --yes
          --pinentry-mode loopback
          --armor
          --detach-sign
          grails-wrapper/build/distributions/${DIST_NAME}-wrapper-${VERSION}-bin.zip
      - name: "📦 Create grails-wrapper checksum"
        run: |
          cd grails-wrapper/build/distributions
          ls
          sha512sum ${DIST_NAME}-wrapper-${VERSION}-bin.zip > ${DIST_NAME}-wrapper-${VERSION}-bin.zip.sha512
          echo "Generated checksum for grails wrapper ZIP:"
          cat ${DIST_NAME}-wrapper-${VERSION}-bin.zip.sha512
      - name: "📤 Upload grails-wrapper ZIP"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: |
            grails-wrapper/build/distributions/${{ env.DIST_NAME }}-wrapper-${{ env.VERSION }}-bin.zip
            grails-wrapper/build/distributions/${{ env.DIST_NAME }}-wrapper-${{ env.VERSION }}-bin.zip.sha512
            grails-wrapper/build/distributions/${{ env.DIST_NAME }}-wrapper-${{ env.VERSION }}-bin.zip.asc
      - name: "🔏 Sign grails-cli ZIP"
        run: >
          gpg
          --default-key "${{ secrets.GPG_KEY_ID }}"
          --batch
          --yes
          --pinentry-mode loopback
          --armor
          --detach-sign
          grails-forge/grails-cli/build/distributions/${DIST_NAME}-${VERSION}-bin.zip
      - name: "📦 Create grails-cli checksum"
        run: |
          cd grails-forge/grails-cli/build/distributions
          ls
          sha512sum ${DIST_NAME}-${VERSION}-bin.zip > ${DIST_NAME}-${VERSION}-bin.zip.sha512
          echo "Generated checksum for grails cli ZIP:"
          cat ${DIST_NAME}-${VERSION}-bin.zip.sha512
      - name: "📤 Upload grails-cli ZIP"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: |
            grails-forge/grails-cli/build/distributions/${{ env.DIST_NAME }}-${{ env.VERSION }}-bin.zip
            grails-forge/grails-cli/build/distributions/${{ env.DIST_NAME }}-${{ env.VERSION }}-bin.zip.sha512
            grails-forge/grails-cli/build/distributions/${{ env.DIST_NAME }}-${{ env.VERSION }}-bin.zip.asc
      - name: "✨ Create Staging Repository"
        env:
          NEXUS_PUBLISH_USERNAME: ${{ secrets.NEXUS_STAGE_DEPLOYER_USER }}
          NEXUS_PUBLISH_PASSWORD: ${{ secrets.NEXUS_STAGE_DEPLOYER_PW }}
          NEXUS_PUBLISH_URL: ${{ vars.STAGING_URL }}
          NEXUS_PUBLISH_STAGING_PROFILE_ID: ${{ secrets.STAGING_PROFILE_ID }}
          NEXUS_PUBLISH_DESCRIPTION: '${{ env.REPO_NAME }}:${{ env.VERSION }}'
        run: ./gradlew initializeSonatypeStagingRepository
      - name: "📤 Publish Gradle Plugins to Staging Repository"
        env:
          NEXUS_PUBLISH_USERNAME: ${{ secrets.NEXUS_STAGE_DEPLOYER_USER }}
          NEXUS_PUBLISH_PASSWORD: ${{ secrets.NEXUS_STAGE_DEPLOYER_PW }}
          NEXUS_PUBLISH_URL: ${{ vars.STAGING_URL }}
          NEXUS_PUBLISH_STAGING_PROFILE_ID: ${{ secrets.STAGING_PROFILE_ID }}
          NEXUS_PUBLISH_DESCRIPTION: '${{ env.REPO_NAME }}:${{ env.VERSION }}'
          SIGNING_KEY: ${{ secrets.GPG_KEY_ID }}
        working-directory: grails-gradle
        run: >
          ./gradlew
          -x initializeSonatypeStagingRepository
          findSonatypeStagingRepository
          publishToSonatype
          aggregateChecksums
          aggregatePublishedArtifacts
      - name: "📤 Publish Grails Core to Staging Repository"
        env:
          NEXUS_PUBLISH_USERNAME: ${{ secrets.NEXUS_STAGE_DEPLOYER_USER }}
          NEXUS_PUBLISH_PASSWORD: ${{ secrets.NEXUS_STAGE_DEPLOYER_PW }}
          NEXUS_PUBLISH_URL: ${{ vars.STAGING_URL }}
          NEXUS_PUBLISH_STAGING_PROFILE_ID: ${{ secrets.STAGING_PROFILE_ID }}
          NEXUS_PUBLISH_DESCRIPTION: '${{ env.REPO_NAME }}:${{ env.VERSION }}'
          SIGNING_KEY: ${{ secrets.GPG_KEY_ID }}
        run: >
          ./gradlew
          -x initializeSonatypeStagingRepository
          findSonatypeStagingRepository
          publishToSonatype
          aggregateChecksums
          aggregatePublishedArtifacts
      - name: "📤 Publish Grails Forge to Staging Repository"
        env:
          NEXUS_PUBLISH_USERNAME: ${{ secrets.NEXUS_STAGE_DEPLOYER_USER }}
          NEXUS_PUBLISH_PASSWORD: ${{ secrets.NEXUS_STAGE_DEPLOYER_PW }}
          NEXUS_PUBLISH_URL: ${{ vars.STAGING_URL }}
          NEXUS_PUBLISH_STAGING_PROFILE_ID: ${{ secrets.STAGING_PROFILE_ID }}
          NEXUS_PUBLISH_DESCRIPTION: '${{ env.REPO_NAME }}:${{ env.VERSION }}'
          SIGNING_KEY: ${{ secrets.GPG_KEY_ID }}
        working-directory: grails-forge
        run: >
          ./gradlew
          -x initializeSonatypeStagingRepository
          findSonatypeStagingRepository
          publishToSonatype
          aggregateChecksums
          aggregatePublishedArtifacts
      - name: "✅ Close Staging Repository"
        env:
          NEXUS_PUBLISH_USERNAME: ${{ secrets.NEXUS_STAGE_DEPLOYER_USER }}
          NEXUS_PUBLISH_PASSWORD: ${{ secrets.NEXUS_STAGE_DEPLOYER_PW }}
          NEXUS_PUBLISH_URL: ${{ vars.STAGING_URL }}
          NEXUS_PUBLISH_STAGING_PROFILE_ID: ${{ secrets.STAGING_PROFILE_ID }}
          NEXUS_PUBLISH_DESCRIPTION: '${{ env.REPO_NAME }}:${{ env.VERSION }}'
        run: >
          ./gradlew
          -x initializeSonatypeStagingRepository
          findSonatypeStagingRepository 
          closeSonatypeStagingRepository
      - name: "🩹 Combine checksums"
        run: |
          combined_file="build/CHECKSUMS.txt"
          cat build/grails-core-checksums.txt > "$combined_file"
          cat grails-gradle/build/grails-gradle-checksums.txt >> "$combined_file"
          cat grails-forge/build/grails-forge-checksums.txt >> "$combined_file"
      - name: "🩹 Combine published artifacts"
        run: |
          combined_file="build/PUBLISHED_ARTIFACTS.txt"
          cat build/grails-core-artifacts.txt > "$combined_file"
          cat grails-gradle/build/grails-gradle-artifacts.txt >> "$combined_file"
          cat grails-forge/build/grails-forge-artifacts.txt >> "$combined_file"
      - name: "📅 Generate build date file"
        run: echo "$SOURCE_DATE_EPOCH" >> build/BUILD_DATE.txt
      - name: "📤 Upload build date, checksums and published artifact files"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: |
            build/BUILD_DATE.txt
            build/CHECKSUMS.txt
            build/PUBLISHED_ARTIFACTS.txt
  source:
    name: "Create Source Distribution"
    needs: publish
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    steps:
      - name: "📝 Establish release version"
        run: echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"
      - name: "📥 Checkout Grails Core repository"
        uses: actions/checkout@v6
        with:
          path: grails
          ref: ${{ env.TAG }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: "🗑️ Remove unnecessary files"
        run: |
          rm -f grails/gradle/wrapper/gradle-wrapper.jar
          rm -f grails/gradle/wrapper/gradle-wrapper.properties
          rm -f grails/gradlew
          rm -f grails/grails-gradle/gradle/wrapper/gradle-wrapper.jar
          rm -f grails/grails-gradle/gradle/wrapper/gradle-wrapper.properties
          rm -f grails/grails-gradle/gradlew
          rm -f grails/grails-forge/gradle/wrapper/gradle-wrapper.jar
          rm -f grails/grails-forge/gradle/wrapper/gradle-wrapper.properties
          rm -f grails/grails-forge/gradlew
          rm -f grails/KEYS
      - name: "📥 Download CHECKSUMS.txt and rename to CHECKSUMS"
        working-directory: grails
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          release_url=$(gh release view "${TAG}" --json assets --repo "${REPO_SLUG}" --jq '.assets[] | select(.name == "CHECKSUMS.txt") | .url')
          curl -f -L -H "Authorization: token $GH_TOKEN" -o CHECKSUMS "$release_url"
      - name: "📥 Download PUBLISHED_ARTIFACTS.txt and rename to PUBLISHED_ARTIFACTS"
        working-directory: grails
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          release_url=$(gh release view "${TAG}" --json assets --repo "${REPO_SLUG}" --jq '.assets[] | select(.name == "PUBLISHED_ARTIFACTS.txt") | .url')
          curl -f -L -H "Authorization: token $GH_TOKEN" -o PUBLISHED_ARTIFACTS "$release_url"
      - name: "📥 Download BUILD_DATE.txt and rename to BUILD_DATE"
        working-directory: grails
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          release_url=$(gh release view "${TAG}" --json assets --repo "${REPO_SLUG}" --jq '.assets[] | select(.name == "BUILD_DATE.txt") | .url')
          curl -f -L -H "Authorization: token $GH_TOKEN" -o BUILD_DATE "$release_url"
      - name: "📅 Ensure source files use common date"
        run: |
          SOURCE_DATE_EPOCH=$(cat grails/BUILD_DATE)
          find . -depth \( -type f -o -type d \) -exec touch -d "@${SOURCE_DATE_EPOCH}" {} +
      - name: "📦 Create source distribution ZIP"
        run: >
          zip -r
          ${DIST_NAME}-${VERSION}-src.zip
          grails
          -x 'grails/.git/*'
          -x 'grails/.github/*'
          -x 'grails/.mailmap'
      - name: "🔐 Set up GPG" # use env var to not expose the key
        env:
          GPG_KEY: ${{ secrets.GRAILS_GPG_KEY }}
        run: |
          echo "${GPG_KEY}" | gpg --batch --import
          gpg --list-keys
      - name: "🔏 Sign source distribution ZIP"
        run: >
          gpg
          --default-key "${{ secrets.GPG_KEY_ID }}"
          --batch
          --yes
          --pinentry-mode loopback
          --armor
          --detach-sign
          ${DIST_NAME}-${VERSION}-src.zip
      - name: "📦 Create source distribution checksum"
        run: sha512sum ${DIST_NAME}-${VERSION}-src.zip > ${DIST_NAME}-${VERSION}-src.zip.sha512
      - name: "🚀 Upload ZIP and Signature to GitHub Release"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: |
            ${{ env.DIST_NAME }}-${{ env.VERSION }}-src.zip
            ${{ env.DIST_NAME }}-${{ env.VERSION }}-src.zip.sha512
            ${{ env.DIST_NAME }}-${{ env.VERSION }}-src.zip.asc
      - name: "🗑️ Remove CHECKSUMS.txt asset from release"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          gh release delete-asset \
          ${TAG} \
          CHECKSUMS.txt \
          --repo ${REPO_SLUG} \
          --yes
      - name: "🗑️ Remove BUILD_DATE.txt asset from release"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          gh release delete-asset \
          ${TAG} \
          BUILD_DATE.txt \
          --repo ${REPO_SLUG} \
          --yes
      - name: "🗑️ Remove PUBLISHED_ARTIFACTS.txt asset from release"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          gh release delete-asset \
          ${TAG} \
          PUBLISHED_ARTIFACTS.txt \
          --repo ${REPO_SLUG} \
          --yes
  upload:
    name: "Upload Distributions to dist.apache.org"
    needs: [ publish, source ]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      SVN_USERNAME: ${{ secrets.SVC_DIST_GRAILS_USERNAME }}
      SVN_PASSWORD: ${{ secrets.SVC_DIST_GRAILS_PASSWORD }}
    steps:
      - name: "📝 Establish release version"
        run: echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"
      - name: "🛠️ Install tools"
        run: sudo apt-get install -y subversion subversion-tools tree gettext-base
      - name: "👀 Ensure dev/${{ env.SVN_PROJECT }} folder exists"
        run: |
          set -e
          if svn ls https://dist.apache.org/repos/dist/dev/${SVN_PROJECT} --username "${SVN_USERNAME}" --password "${SVN_PASSWORD}" --non-interactive; then
            echo "Dev Folder [${SVN_PROJECT}] already exists — skipping creation"
          else
            echo "Dev Folder [${SVN_PROJECT}] does not exist, creating"
            svnmucc --username "${SVN_USERNAME}" --password "${SVN_PASSWORD}" --non-interactive \
              mkdir https://dist.apache.org/repos/dist/dev/${SVN_PROJECT} \
              -m "Create '${SVN_PROJECT}' dev folder"
          fi
      - name: "👀 Ensure dev/${{ env.SVN_PROJECT }}/${{ env.SVN_FOLDER }} folder exists"
        run: |
          set -e
          if svn ls https://dist.apache.org/repos/dist/dev/${SVN_PROJECT}/${SVN_FOLDER} --username "${SVN_USERNAME}" --password "${SVN_PASSWORD}" --non-interactive; then
            echo "Dev Folder [${SVN_PROJECT}/${SVN_FOLDER}] already exists — skipping creation"
          else
            echo "Dev Folder [${SVN_PROJECT}/${SVN_FOLDER}] does not exist, creating"
            svnmucc --username "${SVN_USERNAME}" --password "${SVN_PASSWORD}" --non-interactive \
              mkdir https://dist.apache.org/repos/dist/dev/${SVN_PROJECT}/${SVN_FOLDER} \
              -m "Create '${SVN_PROJECT}/${SVN_FOLDER}' dev folder"
          fi
      - name: "📥 Checkout dev repo"
        run: |
          svn checkout --username "${SVN_USERNAME}" --password "${SVN_PASSWORD}" --non-interactive "https://dist.apache.org/repos/dist/dev/${SVN_PROJECT}/${SVN_FOLDER}" dev-repo
      - name: "🗑️ Remove existing dev version"
        run: |
          cd dev-repo
          if [ -d "${VERSION}" ]; then
            svn delete "${VERSION}"
            svn commit -m "Remove ${SVN_PROJECT} ${SVN_FOLDER} dev version ${VERSION}" --username "${SVN_USERNAME}" --password "${SVN_PASSWORD}" --non-interactive
          else
            echo "No existing dev version ${VERSION} to remove"
          fi
      - name: "📥 Fetch source distributions"
        run: |
          cd dev-repo
          mkdir -p ${VERSION}/sources          
          cd ${VERSION}/sources
          curl -f -LO https://github.com/${REPO_SLUG}/releases/download/${TAG}/${DIST_NAME}-${VERSION}-src.zip
          curl -f -LO https://github.com/${REPO_SLUG}/releases/download/${TAG}/${DIST_NAME}-${VERSION}-src.zip.sha512
          curl -f -LO https://github.com/${REPO_SLUG}/releases/download/${TAG}/${DIST_NAME}-${VERSION}-src.zip.asc
          echo "Downloaded the following files:"
          ls -l
      - name: "📥 Fetch binary distributions"
        run: |
          cd dev-repo
          mkdir -p ${VERSION}/distribution          
          cd ${VERSION}/distribution
          curl -f -LO https://github.com/${REPO_SLUG}/releases/download/${TAG}/${DIST_NAME}-${VERSION}-bin.zip
          curl -f -LO https://github.com/${REPO_SLUG}/releases/download/${TAG}/${DIST_NAME}-${VERSION}-bin.zip.sha512
          curl -f -LO https://github.com/${REPO_SLUG}/releases/download/${TAG}/${DIST_NAME}-${VERSION}-bin.zip.asc
          curl -f -LO https://github.com/${REPO_SLUG}/releases/download/${TAG}/${DIST_NAME}-wrapper-${VERSION}-bin.zip
          curl -f -LO https://github.com/${REPO_SLUG}/releases/download/${TAG}/${DIST_NAME}-wrapper-${VERSION}-bin.zip.sha512
          curl -f -LO https://github.com/${REPO_SLUG}/releases/download/${TAG}/${DIST_NAME}-wrapper-${VERSION}-bin.zip.asc
          echo "Downloaded the following files:"
          ls -l
      - name: "🚀 Upload distributions"
        run: |
          cd dev-repo
          echo "Adding the following files to SVN:"
          tree
          svn add ${VERSION} --force
          svn commit -m "Upload ${PROJECT_NAME} distribution files for ${VERSION}" --username "${SVN_USERNAME}" --password "${SVN_PASSWORD}" --non-interactive
          pwd
      - name: "💾 Store Distribution SVN revision in a file"
        run: |
          cd dev-repo
          svn info ${VERSION} > DIST_SVN_REVISION.txt
      - name: "📤 Upload Distribution SVN revision"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: dev-repo/DIST_SVN_REVISION.txt
      - name: "📥 Checkout repository"
        uses: actions/checkout@v6
        with:
          path: ${{ env.REPO_NAME }}
          ref: ${{ env.TAG }}
      - name: "📝 Fetch new sha for the release tag after pre-prelease commit"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ref_json=$(gh api "repos/${REPO_SLUG}/git/ref/tags/${TAG}")
          type=$(jq -r '.object.type' <<<"$ref_json")
          sha=$(jq -r '.object.sha'  <<<"$ref_json")
          if [ "$type" = "tag" ]; then
            sha=$(gh api "repos/${REPO_SLUG}/git/tags/${sha}" --jq '.object.sha')
          fi
          echo "Found sha: $sha"
          echo "SHA=${sha}" >> "$GITHUB_ENV"
      - name: "📧 Print Grails Vote Email"
        run: |
          export DIST_SVN_REVISION=$(awk '/Last Changed Rev:/ {print $4}' dev-repo/DIST_SVN_REVISION.txt)
          
          echo "::group::Grails PMC Vote Email"
          echo ""
          echo "TO:"
          echo "*************************************************"
          echo "dev@grails.apache.org"
          echo "*************************************************"
          echo ""
          echo "Subject:"
          echo "*************************************************"
          echo "[VOTE] Release ${PROJECT_NAME} ${VERSION}"
          echo "*************************************************"
          echo "Body:"
          echo "*************************************************"
          cat ${REPO_NAME}/.github/vote_templates/staged.txt | envsubst
          echo "*************************************************"
          echo "::endgroup::"
  release:
    environment: release
    name: "VOTE SUCCEEDED - Release Artifacts"
    needs: [ publish, source, upload ]
    runs-on: ubuntu-24.04
    steps:
      - name: "📝 Establish release version"
        run: echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"
      - name: "📥 Checkout repository"
        uses: actions/checkout@v6
        with:
          ref: ${{ env.TAG }}
      - name: "🛠️️ Install tools"
        run: sudo apt-get install -y gettext-base
      - name: "🗳 MANUAL - Confirm Grails PMC Vote succeeded"
        run: |
          echo "::group::Manual Confirmation"
          echo "🔎 Make sure that the vote confirmation on dev@grails.apache.org completed successfully before proceeding."
          echo "::endgroup::"
      - name: "📧 MANUAL - Send Vote Result Email"
        run: |
          echo "::group::Manual Vote Result Email"
          echo ""
          echo "Send a new email or reply to the original vote email by changing the subject."
          echo ""
          echo "TO:"
          echo "*************************************************"
          echo "dev@grails.apache.org"
          echo "*************************************************"
          echo ""
          echo "Subject:"
          echo "*************************************************"
          echo "[RESULT][VOTE] ${PROJECT_NAME} ${VERSION}"
          echo "*************************************************"
          echo ""
          echo "Body:"
          echo "*************************************************"
          cat .github/vote_templates/vote_succeeded.txt | envsubst
          echo "*************************************************"
          echo "::endgroup::"
      - name: "🚀 MANUAL - Release JAR files"
        run: |
          echo "::group::Manual Jar Promotion"
          echo "Run .github/scripts/releaseJarFiles.sh ${REPO_NAME}:${VERSION} <ASF_USER>"
          echo "::endgroup::"
      - name: "🚀 MANUAL - Release distribution artifacts"
        run: |
          echo "::group::Manual ASF Artifact Promotion"
          echo "Run .github/scripts/releaseDistributions.sh ${TAG} ${SVN_FOLDER} <ASF_USER>"
          echo "::endgroup::"
      - name: "✅ MANUAL - Update ASF Reporter"
        run: |
          echo "::group::Manual ASF Reporter Update"
          TODAY=$(date +"%Y-%m-%d")
          echo "Update https://reporter.apache.org/addrelease.html?${SVN_PROJECT} to add"
          echo "${SVN_FOLDER^^}-${VERSION} as complete as of ${TODAY}"
          echo "::endgroup::"
      - name: "🚀 MANUAL - Deploy Grails Forge"
        run: |
          echo "::group::Manual Grails Forge deployment"
          echo "Kick off Forge-* workflow for version ${VERSION} based on the below rules:"
          cat <<'EOF'
          * RELEASE - Full Final Releases - https://github.com/apache/grails-core/actions/workflows/forge-deploy-release.yml
          * NEXT - Milestones and Release Candidate for Next Release (also Next version snapshot prior to Milestone) - https://github.com/apache/grails-core/actions/workflows/forge-deploy-next.yml
          * SNAPSHOT - current or next version snapshot - https://github.com/apache/grails-core/actions/workflows/forge-deploy-snapshot.yml
          * PREV - previous release version - https://github.com/apache/grails-core/actions/workflows/forge-deploy-prev.yml
          * PREV-SNAPSHOT - previous version snapshot - https://github.com/apache/grails-core/actions/workflows/forge-deploy-prev-snapshot.yml
          EOF
          echo "::endgroup::"
  docs:
    environment: docs
    name: "VOTE SUCCEEDED - Publish Documentation"
    needs: [ publish, source, upload, release ]
    runs-on: ubuntu-24.04
    steps:
      - name: "📝 Establish release version"
        run: echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"
      - name: "⚙️ Maximize build space"
        run: |
          echo "-- Dotnet"
          sudo rm -rf /usr/share/dotnet
          echo "-- Android"
          sudo rm -rf /usr/local/lib/android
          echo "-- Haskell"
          sudo rm -rf /opt/ghc
          echo "-- CodeQL"
          sudo rm -rf /opt/hostedtoolcache/CodeQL

          df -h
      - name: "📥 Checkout repository"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # needed for docs release dropdown, (fetch-tags: true with fetch-depth: 1 does not work; https://github.com/actions/checkout/issues/1471)
          filter: tree:0 # limit size, keeping tags for docs release dropdown
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ env.TAG }}
      - name: "📅 Ensure Common Build Date" # to ensure a reproducible build
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)" >> "$GITHUB_ENV"
      - name: "☕️ Setup JDK"
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      - name: "🐘 Setup Gradle"
        uses: gradle/actions/setup-gradle@v5
        with:
          develocity-access-key: ${{ secrets.GRAILS_DEVELOCITY_ACCESS_KEY }}
      - name: "📖 Generate Documentation"
        run: ./gradlew grails-doc:build -PgithubBranch=${TARGET_BRANCH}
      - name: "🚀 Publish to GitHub Pages"
        uses: apache/grails-github-actions/deploy-github-pages@asf
        env:
          GH_TOKEN: ${{ secrets.GRAILS_GHTOKEN }} # To be able to push to grails-website repo
          GRADLE_PUBLISH_RELEASE: 'true'
          SOURCE_FOLDER: grails-doc/build/docs
          TARGET_REPOSITORY: apache/grails-website
          TARGET_FOLDER: docs
          DOCUMENTATION_BRANCH: asf-site-production
  sdkman:
    environment: sdkman
    name: "VOTE SUCCEEDED - Release to SDKMAN!"
    runs-on: ubuntu-24.04
    needs: [ publish, source, upload, release ]
    steps:
      - name: "📝 Establish release version"
        run: echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"
      - name: "📥 Checkout repository"
        uses: actions/checkout@v6
        with:
          ref: ${{ env.TAG }}
      - name: "☕️ Setup JDK"
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
      - name: "🐘 Setup Gradle"
        uses: gradle/actions/setup-gradle@v5
        with:
          develocity-access-key: ${{ secrets.GRAILS_DEVELOCITY_ACCESS_KEY }}
      - name: "🚀 Grails SDK Minor Release"
        if: contains(env.VERSION, 'M') || contains(env.VERSION, 'RC')
        working-directory: grails-forge
        run: ./gradlew sdkMinorRelease
        env:
          GVM_SDKVENDOR_KEY: ${{ secrets.GVM_SDKVENDOR_KEY }}
          GVM_SDKVENDOR_TOKEN: ${{ secrets.GVM_SDKVENDOR_TOKEN }}
      - name: "🚀 Grails SDK Major Release"
        if: startsWith(env.VERSION, '7.') && !contains(env.VERSION, 'M') && !contains(env.VERSION, 'RC')
        working-directory: grails-forge
        run: ./gradlew sdkMajorRelease
        env:
          GVM_SDKVENDOR_KEY: ${{ secrets.GVM_SDKVENDOR_KEY }}
          GVM_SDKVENDOR_TOKEN: ${{ secrets.GVM_SDKVENDOR_TOKEN }}
  close:
    name: "VOTE SUCCEEDED - Close Release"
    environment: release
    needs: [ publish, source, upload, release, docs, sdkman ]
    runs-on: ubuntu-24.04
    permissions:
      contents: write # required for gradle.properties revert
      issues: write # required for milestone closing
      pull-requests: write # to open PR
      actions: write # in case there are pending changes to release.yml in the target branch
    steps:
      - name: "📝 Establish release version"
        run: echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"
      - name: "📥 Checkout repository"
        uses: actions/checkout@v6
        with:
          ref: ${{ env.TAG }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: "⚙️ Run post-release"
        uses: apache/grails-github-actions/post-release@asf
        env:
          RELEASE_SCRIPT_PATH: '.github/scripts/setSnapshotGrailsVersion.sh'
      - name: "🌎 MANUAL - Create Blog Post"
        run: |
          echo "::group::Blog Post Creation - MANUAL"
          echo "Publish a blog post on https://grails.apache.org/blog/ about the new release [${VERSION}] using"
          echo "the repo: https://github.com/apache/grails-static-website"
          echo "::endgroup::"
      - name: "🌎 MANUAL - Merge Close Release PR"
        run: |
          echo "::group::Merge Close Release PR - MANUAL"
          echo "The last step in the grails-core release workflow will create a merge branch for the original tag"
          echo "with version number and then open a PR to merge back into the next branch."
          echo "You will need to merge this PR into the branch after correcting any merge conflict."
          echo "::endgroup::"
      - name: "🌎 MANUAL - deploy the new SNAPSHOT to Forge"
        run: |
          echo "::group::Deploy the new SNAPSHOT to Forge - MANUAL"
          echo "After the Close Release PR is merged, deploy the new SNAPSHOT to Forge via:"
          echo "https://github.com/apache/grails-core/actions/workflows/forge-deploy-snapshot.yml"
          echo "::endgroup::"
      - name: "🌎 MANUAL - Add version to the Grails Website"
        run: |
          echo "::group::Add version to the Grails Website - MANUAL"
          echo "Add the released version [${VERSION}] to the Grails Website by running the Release workflow:"
          echo "https://github.com/apache/grails-static-website/actions/workflows/release.yml"
          echo "Republish Grails Website by running the Publish workflow:"
          echo "https://github.com/apache/grails-static-website/actions/workflows/publish.yml"
          echo "::endgroup::"
      - name: '📧 Announcement Email'
        run: |
          echo "::group::Announcement Email"
          echo ""
          echo "TO:"
          echo "*************************************************"
          echo "announce@apache.org, dev@grails.apache.org, users@grails.apache.org"
          echo "*************************************************"
          echo ""
          echo "Subject:"
          echo "*************************************************"
          echo "[ANNOUNCE] ${PROJECT_NAME} ${VERSION}"
          echo "*************************************************"
          echo ""
          echo "Body:"
          echo "*************************************************"
          cat .github/vote_templates/announce.txt | envsubst
          echo "*************************************************"
          echo "::endgroup::"
