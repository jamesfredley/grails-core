name: "Java CI"
on:
  push:
    branches:
      - '[6-9]+.[0-9]+.x'
  pull_request:
    branches:
      - '[6-9]+.[0-9]+.x'
  workflow_dispatch:
jobs:
  build:
    name: "Build Project"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: ['17', '21']
    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4
      - name: "☕️ Setup JDK"
        uses: actions/setup-java@v4
        with:
          distribution: 'liberica'
          java-version: ${{ matrix.java }}
      - name: "🐘 Setup Gradle"
        uses: gradle/actions/setup-gradle@v4
        with:
          develocity-access-key: ${{ secrets.GRAILS_DEVELOCITY_ACCESS_KEY  }}
      - name: "🔨 Run Build"
        id: build
        run: ./gradlew build
      - name: "✅ Verify Forge CLI"
        if: success()
        run: |
          cp grails-forge-cli/build/distributions/grails-forge-cli-*.zip forge-cli.zip
          unzip forge-cli -d tmp
          mv tmp/grails-forge-cli-* tmp/forge-cli
          ./tmp/forge-cli/bin/grails-forge-cli --version
      - name: "✅ Verify Combined CLI"
        if: success()
        run: |
          cp grails-cli/build/distributions/grails-cli-*.zip cli.zip
          unzip cli -d tmp1
          mv tmp1/grails-cli-* tmp1/cli
          ./tmp1/cli/grails --version
      - name: "📤 Upload CLI Zip to Workflow Summary Page"
        if: ${{ matrix.java == '17' }}
        uses: actions/upload-artifact@v4
        with:
          name: grails-cli-snapshot
          path: |
            tmp1/cli/.grails # include .grails directory
            tmp1/cli
  publish:
    if: github.repository_owner == 'apache' && github.event_name == 'push'
    needs: [ build ]
    runs-on: ubuntu-24.04
    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4
      - name: 'Ensure Common Build Date' # to ensure a reproducible build
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)" >> "$GITHUB_ENV"
      - name: "☕️ Setup JDK"
        uses: actions/setup-java@v4
        with:
          distribution: liberica
          java-version: 17
      - name: "🐘 Setup Gradle"
        uses: gradle/actions/setup-gradle@v4
        with:
          develocity-access-key: ${{ secrets.GRAILS_DEVELOCITY_ACCESS_KEY  }}
      - name: "📤 Publish Grails-Core Snapshot Artifacts"
        env:
          GRAILS_PUBLISH_RELEASE: 'false'
          MAVEN_PUBLISH_URL: ${{ secrets.GRAILS_NEXUS_PUBLISH_SNAPSHOT_URL }}
          MAVEN_PUBLISH_USERNAME: ${{ secrets.NEXUS_USER }}
          MAVEN_PUBLISH_PASSWORD: ${{ secrets.NEXUS_PW  }}
        run: ./gradlew publish
