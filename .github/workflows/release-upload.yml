name: "Release - Upload to dist.apache.org"
on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g., v7.0.0-M4)'
        required: true
        type: string
env:
  SVN_USERNAME: ${{ secrets.SVC_DIST_GRAILS_USERNAME }}
  SVN_PASSWORD: ${{ secrets.SVC_DIST_GRAILS_PASSWORD }}
jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: "Output Agent IP" # in the event RAO blocks this agent, this can be used to debug it
        run: curl -s https://api.ipify.org
      - name: "Extract release version"
        id: release_version
        run: |
          version="${{ github.event.inputs.release_tag }}"
          echo "version=${version#v}" >> $GITHUB_OUTPUT
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4
        with:
          repository: apache/grails-core
          ref: '7.0.x' # TODO: Temporary to minimize having to restage to test this workflow, remove once the input tag is removed
          path: grails-core
      - name: "Setup SVN and Tools"
        run: sudo apt-get install -y subversion subversion-tools tree
      - name: "Ensure grails dev folder exists"
        run: |
          set -e

          if svn ls https://dist.apache.org/repos/dist/dev/incubator/grails --username "$SVN_USERNAME" --password "$SVN_PASSWORD" --non-interactive; then
            echo "Dev Folder 'grails' already exists — skipping creation"
          else
            echo "Dev Folder 'grails' does not exist, creating"
            svnmucc --username "$SVN_USERNAME" --password "$SVN_PASSWORD" --non-interactive \
              mkdir https://dist.apache.org/repos/dist/dev/incubator/grails \
              -m "Create 'grails' dev folder"
          fi
      - name: "Ensure grails core folder exists"
        run: |
          set -e

          if svn ls https://dist.apache.org/repos/dist/dev/incubator/grails/core --username "$SVN_USERNAME" --password "$SVN_PASSWORD" --non-interactive; then
            echo "Dev Folder 'grails/core' already exists — skipping creation"
          else
            echo "Dev Folder 'grails/core' does not exist, creating"
            svnmucc --username "$SVN_USERNAME" --password "$SVN_PASSWORD" --non-interactive \
              mkdir https://dist.apache.org/repos/dist/dev/incubator/grails/core \
              -m "Create 'grails' dev folder"
          fi
      - name: "Checkout dev repo"
        run: |
          svn checkout --username "$SVN_USERNAME" --password "$SVN_PASSWORD" --non-interactive https://dist.apache.org/repos/dist/dev/incubator/grails/core dev-repo
      - name: "Remove existing dev version"
        run: |
          VERSION="${{ steps.release_version.outputs.version }}"
          cd dev-repo
          if [ -d "$VERSION" ]; then
            svn delete "$VERSION"
            svn commit -m "Remove grails dev version $VERSION" --username "$SVN_USERNAME" --password "$SVN_PASSWORD" --non-interactive
          else
            echo "No existing dev version $VERSION to remove"
          fi
      - name: "Fetch source distributions"
        run: |
          TAG=${{ github.event.inputs.release_tag }}
          VERSION=${{ steps.release_version.outputs.version }}
          cd dev-repo
          mkdir -p $VERSION/sources          
          cd $VERSION/sources
          curl -LO https://github.com/apache/grails-core/releases/download/$TAG/apache-grails-$VERSION-incubating-src.zip
          curl -LO https://github.com/apache/grails-core/releases/download/$TAG/apache-grails-$VERSION-incubating-src.zip.sha512
          curl -LO https://github.com/apache/grails-core/releases/download/$TAG/apache-grails-$VERSION-incubating-src.zip.asc
          curl -LO https://github.com/apache/grails-core/releases/download/$TAG/apache-grails-$VERSION-incubating-bin.zip
          curl -LO https://github.com/apache/grails-core/releases/download/$TAG/apache-grails-$VERSION-incubating-bin.zip.sha512
          curl -LO https://github.com/apache/grails-core/releases/download/$TAG/apache-grails-$VERSION-incubating-bin.zip.asc
          curl -LO https://github.com/apache/grails-core/releases/download/$TAG/apache-grails-wrapper-$VERSION-incubating-bin.zip
          curl -LO https://github.com/apache/grails-core/releases/download/$TAG/apache-grails-wrapper-$VERSION-incubating-bin.zip.sha512
          curl -LO https://github.com/apache/grails-core/releases/download/$TAG/apache-grails-wrapper-$VERSION-incubating-bin.zip.asc
          echo "Downloaded the following files:"
          ls -l
      - name: "Fetch binary distributions"
        run: |
          TAG=${{ github.event.inputs.release_tag }}
          VERSION=${{ steps.release_version.outputs.version }}
          cd dev-repo
          mkdir -p $VERSION/distribution          
          cd $VERSION/distribution
          curl -LO https://github.com/apache/grails-core/releases/download/$TAG/apache-grails-$VERSION-incubating-src.zip
          curl -LO https://github.com/apache/grails-core/releases/download/$TAG/apache-grails-$VERSION-incubating-src.zip.sha512
          curl -LO https://github.com/apache/grails-core/releases/download/$TAG/apache-grails-$VERSION-incubating-src.zip.asc
          curl -LO https://github.com/apache/grails-core/releases/download/$TAG/apache-grails-$VERSION-incubating-bin.zip
          curl -LO https://github.com/apache/grails-core/releases/download/$TAG/apache-grails-$VERSION-incubating-bin.zip.sha512
          curl -LO https://github.com/apache/grails-core/releases/download/$TAG/apache-grails-$VERSION-incubating-bin.zip.asc
          curl -LO https://github.com/apache/grails-core/releases/download/$TAG/apache-grails-wrapper-$VERSION-incubating-bin.zip
          curl -LO https://github.com/apache/grails-core/releases/download/$TAG/apache-grails-wrapper-$VERSION-incubating-bin.zip.sha512
          curl -LO https://github.com/apache/grails-core/releases/download/$TAG/apache-grails-wrapper-$VERSION-incubating-bin.zip.asc
          echo "Downloaded the following files:"
          ls -l
      - name: "Upload distributions"
        run: |
          TAG=${{ github.event.inputs.release_tag }}
          VERSION=${{ steps.release_version.outputs.version }}
          cd dev-repo
          echo "Adding the following files to SVN:"
          tree
          svn add $VERSION --force
          svn commit -m "Upload grails distribution files for $VERSION" --username "$SVN_USERNAME" --password "$SVN_PASSWORD" --non-interactive
          pwd