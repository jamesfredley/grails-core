buildscript {
    repositories {
        gradlePluginPortal()
        mavenCentral()
        maven { url = 'https://repo1.maven.org/maven2' }
        maven { url = 'https://repo.grails.org/grails/core' }
        // mavenLocal()  // for local testing, do not commit uncommented
    }
    dependencies {
        classpath platform("org.apache.grails:grails-bom:$grailsVersion")
        classpath "org.apache.grails:grails-gradle-plugins"
    }
}

apply plugin: "org.apache.grails.gradle.grails-profile"

group = 'org.apache.grails.profiles'
version = '1.0.0-SNAPSHOT'

repositories {
    mavenCentral()
    maven { url = 'https://repo1.maven.org/maven2' }
    maven { url = 'https://repo.grails.org/grails/core' }
    // mavenLocal()  // for local testing, do not commit uncommented
}  

dependencies {
    profileRuntimeOnly platform("org.apache.grails:grails-bom:$grailsVersion")
    profileRuntimeOnly "org.apache.grails.profiles:base"
}
