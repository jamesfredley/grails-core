name: Java CI
on:
  push:
    branches:
      - '*[0-9]+.[0-9]+.x'
  pull_request:
    branches:
      - '*[0-9]+.[0-9]+.x'
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: ['17']
    env:
      GRAILS_PUBLISH_RELEASE: 'false'
      WORKSPACE: ${{ github.workspace }}
      GRADLE_OPTS: -Xmx1500m -Dfile.encoding=UTF-8
      MAVEN_PUBLISH_USERNAME: ${{ secrets.NEXUS_USER }}
      MAVEN_PUBLISH_PASSWORD: ${{ secrets.NEXUS_PW  }}
      MAVEN_PUBLISH_URL: ${{ secrets.GRAILS_NEXUS_PUBLISH_SNAPSHOT_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: ${{ matrix.java }}
          distribution: 'liberica'
      - name: "🐘 Setup Gradle"
        uses: gradle/actions/setup-gradle@v4
        with:
          develocity-access-key: ${{ secrets.GRAILS_DEVELOCITY_ACCESS_KEY }}
      - name: Run Assemble
        if: success() && matrix.java == '17'
        run: ./gradlew assemble --refresh-dependencies
      - name: Publish to repo.grails.org
        if: success() && github.event_name == 'push' && matrix.java == '17'
        run: |
          ./gradlew publish
