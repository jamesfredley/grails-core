buildscript {
    repositories {
        mavenCentral()
@buildRepositories@
        maven {
            url = 'https://repository.apache.org/content/groups/snapshots'
            content {
              includeVersionByRegex('org[.]apache[.]grails.*', '.*', '.*-SNAPSHOT')
              includeVersionByRegex('org[.]apache[.]groovy.*', '.*', '.*-SNAPSHOT')
            }
            mavenContent {
                snapshotsOnly()
            }
        }
    }
    dependencies {
        classpath platform("org.apache.grails:grails-bom:$grailsVersion")
@buildDependencies@
    }
}

version = "0.1"
group = "@grails.app.group@"

@buildPlugins@

repositories {
    mavenCentral()
@repositories@
    maven {
       url = 'https://repository.apache.org/content/groups/snapshots'
       content {
          includeVersionByRegex('org[.]apache[.](grails|groovy).*', '.*', '.*-SNAPSHOT')
       }
    }
}

dependencies {
@dependencies@
}

compileJava.options.release = 17

tasks.withType(Test).configureEach {
    useJUnitPlatform()
}
