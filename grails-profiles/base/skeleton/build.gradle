buildscript {
    repositories {
@buildRepositories@
    }
    dependencies {
        classpath platform("org.apache.grails:grails-bom:$grailsVersion")
@buildDependencies@
    }
}

version = "0.1"
group = "@grails.app.group@"

@buildPlugins@

repositories {
@repositories@
}

dependencies {
@dependencies@
}

compileJava.options.release = 17

tasks.withType(Test).configureEach {
    useJUnitPlatform()
}

