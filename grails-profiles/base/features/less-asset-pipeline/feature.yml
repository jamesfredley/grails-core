description: Adds LESS Transpiler Asset Pipeline to a Grails project
build:
    plugins:
        - asset-pipeline
dependencies:
    - scope: build
      coords: "cloud.wondrify:asset-pipeline-gradle"
    - scope: runtimeOnly
      coords: "cloud.wondrify:asset-pipeline-grails"
    - scope: assets
      coords: "cloud.wondrify:less-asset-pipeline"
