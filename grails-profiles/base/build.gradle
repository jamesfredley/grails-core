plugins {
    id 'groovy'
    id 'org.apache.grails.gradle.grails-profile'
}

group = 'org.apache.grails.profiles'
version = projectVersion

ext {
    pomArtifactId = 'base'
    pomTitle = 'Grails Profile - Base'
    pomDescription = 'A profile for other profiles to extend from'
    developers = [graemerocher: 'Graeme Rocher']
}

dependencies {
    profileRuntimeOnly platform(project(':grails-bom'))
    profileRuntimeApi project(':grails-shell-cli')
    profileRuntimeApi 'org.apache.groovy:groovy-jmx' // stop script uses GroovyMBean
}

apply {
    from rootProject.layout.projectDirectory.file('gradle/publish-config.gradle')
}