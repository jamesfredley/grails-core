plugins {
    id 'org.apache.grails.gradle.grails-profile'
}

group = 'org.apache.grails.profiles'
version = projectVersion

ext {
    pomArtifactId = 'base'
    pomTitle = 'Grails Profile - Base'
    pomDescription = 'A profile for other profiles to extend from'
    developers = [graemerocher: 'Graeme Rocher']
}

dependencies {
    implementation platform(project(':grails-bom'))
    api project(':grails-shell-cli')
    api 'org.apache.groovy:groovy-jmx' // stop script uses GroovyMBean
}

TaskProvider<Copy> copyWrapper = tasks.register('copyGrailsWrapperScripts', Copy)
copyWrapper.configure { Copy copy ->
    Project wrapperProject = rootProject.project(':grails-wrapper')
    copy.dependsOn(wrapperProject.tasks.named('installDist'))
    copy.from(wrapperProject.layout.buildDirectory.dir('install/apache-grails-wrapper-incubating-bin')) {
        include '**/grails-wrapper.jar'
        include '**/grailsw.bat'
        include '**/grailsw'
    }
    copy.into(project.layout.projectDirectory.dir('skeleton'))
}

tasks.named('sourcesJar').configure {
    it.dependsOn(copyWrapper)
}

tasks.named('processProfileResources').configure {
    it.dependsOn(copyWrapper)
}

tasks.named('compileProfile').configure {
    it.dependsOn(copyWrapper)
}

apply {
    from rootProject.layout.projectDirectory.file('gradle/publish-config.gradle')
}