import grails.doc.git.FetchTagsTask
import grails.doc.dropdown.CreateReleaseDropDownTask
import grails.doc.gradle.PublishGuideTask
import groovy.json.JsonSlurper

import java.util.zip.ZipFile

plugins {
    id 'base'
    id 'org.asciidoctor.jvm.convert'
    id 'groovy'
    id 'org.apache.grails.buildsrc.properties'
    id 'org.apache.grails.buildsrc.dependency-validator'
}

compileJava.options.release = javaVersion.toInteger()

version = projectVersion

ext {
    grailsCheckOutDir = project.layout.buildDirectory.dir('grails-core/checkout').get().asFile.absolutePath
    grailsTestsCheckOutDir = project.layout.buildDirectory.dir('grails-functional-tests/checkout').get().asFile.absolutePath
    outputDir = layout.buildDirectory.file('docs').get().asFile.absolutePath
    githubBranch = project.findProperty('githubBranch')
    guidePage = '/docs/guide/single.html'
    indexPage = '/docs/index.html'
}

dependencies {
    implementation platform(project(':grails-bom'))
    implementation 'org.apache.grails:grails-docs-core'
    implementation 'org.apache.groovy:groovy'

    // Used to surface versions for groovydoc
    implementation project(':grails-dependencies-starter-web')
    implementation project(':grails-testing-support-core')
    implementation project(':grails-data-hibernate5')
    implementation 'org.apache.grails:grails-gradle-plugins'
    implementation 'org.testcontainers:testcontainers'
    implementation 'org.springframework:spring-core'
    implementation 'org.springframework.boot:spring-boot'
    implementation 'org.apache.groovy.geb:geb-spock'
}

// this task needs to be here instead of the root since bom resolution only occurs when the java / groovy plugins are applied
def combinedGroovydoc = tasks.register('aggregateGroovydoc', Groovydoc)
apply from: rootProject.layout.projectDirectory.file('gradle/docs-dependencies.gradle')
combinedGroovydoc.configure { Groovydoc gdoc ->
    gdoc.windowTitle = "Grails $projectVersion"
    gdoc.docTitle = "Grails $projectVersion"

    def docProjects = rootProject.subprojects
            .findAll { it.findProperty('includeInApiDocs') }

    def sources = docProjects
            .collectMany { Project it ->
                List possibleSources = [it.sourceSets.main]

                def testFixturesSource = it.sourceSets.findByName('testFixtures')
                if (testFixturesSource) {
                    possibleSources.add(testFixturesSource)
                }

                def astSource = it.sourceSets.findByName('ast')
                if (astSource) {
                    possibleSources.add(astSource)
                }
                possibleSources
            }
            .flatten()

    List<File> baseSourceDirs = sources
            .collect { SourceSet it -> it.allSource.srcDirs }
            .flatten()
            .findAll { File srcDir ->
                if (!(srcDir.name in ['java', 'groovy'])) {
                    return false
                }
                srcDir.exists()
            }

    // Collect source directories from included builds (composite builds)
    // Gradle will not provide the included build projects or source sets, so we inspect the file system
    List<File> includedBuildSourceDirs = gradle.includedBuilds
            .collectMany { includedBuild ->
                def sourceDirs = []
                includedBuild.projectDir.eachDir { File dir ->
                    ['src/main/java', 'src/main/groovy'].each { rel ->
                        File sourceDir = new File(dir, rel)
                        if (sourceDir.isDirectory()) {
                            sourceDirs << sourceDir
                        }
                    }
                }
                sourceDirs
            }

    def allSourceDirs = (baseSourceDirs + includedBuildSourceDirs).unique()
    gdoc.source(project.files(allSourceDirs))
    gdoc.ext.groovydocSourceDirs = allSourceDirs

    gdoc.classpath = files(sources.collect { SourceSet it -> it.compileClasspath.filter(File.&isDirectory) }.flatten().unique())
    gdoc.destinationDir = project.layout.buildDirectory.dir('combined-api/api').get().asFile

    gdoc.inputs.files(gdoc.source).withPropertyName("groovyDocSrc").withPathSensitivity(PathSensitivity.RELATIVE)
    gdoc.outputs.dir(gdoc.destinationDir)
}

String getVersion(String artifact) {
    String version = configurations.runtimeClasspath
            .resolvedConfiguration
            .resolvedArtifacts
            .find {
                it.moduleVersion.id.name == artifact
            }?.moduleVersion?.id?.version
    if (!version) {
        throw new GradleException("Could not find ${artifact} version.")
    }
    version
}

def generateBomDocumentation = tasks.register('generateBomDocumentation')
generateBomDocumentation.configure { Task it ->
    it.dependsOn(':grails-bom:extractConstraints')

    it.description = 'Generates an AsciiDoc table listing Group, Artifact, and Version for project dependencies.'
    it.group = 'documentation'

    it.inputs.files(project(':grails-bom').layout.projectDirectory.asFileTree)
    it.outputs.file(project.layout.projectDirectory.file('src/en/ref/Versions/Grails BOM.adoc'))

    def versionsDir = project.layout.projectDirectory.dir('src/en/ref/Versions')
    it.doFirst {
        versionsDir.asFile.mkdirs()
    }

    def bomDocumentFile = project.layout.projectDirectory.file('src/en/ref/Versions/Grails BOM.adoc')
    def grailsBomConstraintFile = project(':grails-bom').layout.buildDirectory.file('grails-bom-constraints.adoc')
    it.doLast {
        def bomDocument = bomDocumentFile.asFile
        bomDocument.withWriter { writer ->
            writer.writeLine '== Grails BOM Dependencies'
            writer.writeLine ''
            writer.writeLine 'This document provides information about the dependencies defined in the Grails BOM - also known as `org.apache.grails:grails-bom`. It includes the artifact coordinates, where in the hierarchy the coordinate was defined, and the maven property that defines the version.'
            writer.writeLine ''
            writer.write(grailsBomConstraintFile.get().asFile.text)
            writer.writeLine ''
        }

        it.logger.lifecycle "BOM Dependency Page generated to: ${bomDocument.absolutePath}"
    }
}

def generateConfigReference = tasks.register('generateConfigReference')
generateConfigReference.configure { Task it ->
    it.dependsOn(
            project(':grails-core').tasks.named('jar'),
            project(':grails-web-core').tasks.named('jar'),
            project(':grails-gsp').tasks.named('jar'),
            project(':grails-databinding').tasks.named('jar'),
            project(':grails-data-hibernate5-core').tasks.named('jar'),
            project(':grails-cache').tasks.named('jar'),
            project(':grails-data-hibernate5-dbmigration').tasks.named('jar'),
            project(':grails-data-mongodb').tasks.named('jar'),
            project(':grails-views-gson').tasks.named('jar')
    )

    it.description = 'Generates the Application Properties reference from configuration metadata.'
    it.group = 'documentation'

    def configDir = project.layout.projectDirectory.dir('src/en/ref/Configuration')
    def outputFile = project.layout.projectDirectory.file('src/en/ref/Configuration/Application Properties.adoc')

    it.inputs.files(
            project(':grails-core').tasks.named('jar').flatMap { task -> task.archiveFile },
            project(':grails-web-core').tasks.named('jar').flatMap { task -> task.archiveFile },
            project(':grails-gsp').tasks.named('jar').flatMap { task -> task.archiveFile },
            project(':grails-databinding').tasks.named('jar').flatMap { task -> task.archiveFile },
            project(':grails-data-hibernate5-core').tasks.named('jar').flatMap { task -> task.archiveFile },
            project(':grails-cache').tasks.named('jar').flatMap { task -> task.archiveFile },
            project(':grails-data-hibernate5-dbmigration').tasks.named('jar').flatMap { task -> task.archiveFile },
            project(':grails-data-mongodb').tasks.named('jar').flatMap { task -> task.archiveFile },
            project(':grails-views-gson').tasks.named('jar').flatMap { task -> task.archiveFile }
    )
    it.outputs.file(outputFile)

    it.doFirst {
        configDir.asFile.mkdirs()
    }

    it.doLast {
        List<File> jarFiles = [
                project(':grails-core').tasks.named('jar').get().archiveFile.get().asFile,
                project(':grails-web-core').tasks.named('jar').get().archiveFile.get().asFile,
                project(':grails-gsp').tasks.named('jar').get().archiveFile.get().asFile,
                project(':grails-databinding').tasks.named('jar').get().archiveFile.get().asFile,
                project(':grails-data-hibernate5-core').tasks.named('jar').get().archiveFile.get().asFile,
                project(':grails-cache').tasks.named('jar').get().archiveFile.get().asFile,
                project(':grails-data-hibernate5-dbmigration').tasks.named('jar').get().archiveFile.get().asFile,
                project(':grails-data-mongodb').tasks.named('jar').get().archiveFile.get().asFile,
                project(':grails-views-gson').tasks.named('jar').get().archiveFile.get().asFile
        ]

        Map<String, String> groupDescriptions = new LinkedHashMap<String, String>()
        List<Map<String, Object>> properties = new ArrayList<Map<String, Object>>()
        JsonSlurper slurper = new JsonSlurper()

        jarFiles.each { File jarFile ->
            if (!jarFile.exists()) {
                return
            }
            ZipFile zipFile = new ZipFile(jarFile)
            try {
                def entry = zipFile.getEntry('META-INF/spring-configuration-metadata.json')
                if (entry == null) {
                    return
                }
                String jsonText = zipFile.getInputStream(entry).getText('UTF-8')
                Map<String, Object> jsonData = (Map<String, Object>) slurper.parseText(jsonText)
                Object groupsObject = jsonData.get('groups')
                if (groupsObject instanceof List) {
                    ((List<Object>) groupsObject).each { Object groupObject ->
                        if (groupObject instanceof Map) {
                            Map<String, Object> groupMap = (Map<String, Object>) groupObject
                            Object nameObject = groupMap.get('name')
                            Object descriptionObject = groupMap.get('description')
                            if (nameObject instanceof String && descriptionObject instanceof String) {
                                groupDescriptions.put((String) nameObject, (String) descriptionObject)
                            }
                        }
                    }
                }
                Object propertiesObject = jsonData.get('properties')
                if (propertiesObject instanceof List) {
                    ((List<Object>) propertiesObject).each { Object propertyObject ->
                        if (!(propertyObject instanceof Map)) {
                            return
                        }
                        Map<String, Object> propertyMap = (Map<String, Object>) propertyObject
                        Object nameObject = propertyMap.get('name')
                        if (!(nameObject instanceof String)) {
                            return
                        }
                        String name = (String) nameObject
                        if (!(name.startsWith('grails.') || name.startsWith('dataSource.') || name.startsWith('hibernate.'))) {
                            return
                        }
                        String description = propertyMap.get('description') instanceof String ? (String) propertyMap.get('description') : ''
                        Object defaultValue = propertyMap.get('defaultValue')
                        String group = propertyMap.get('group') instanceof String ? (String) propertyMap.get('group') : null
                        properties.add([
                                name        : name,
                                description : description,
                                defaultValue: defaultValue,
                                group       : group
                        ])
                    }
                }
            }
            finally {
                zipFile.close()
            }
        }

        Set<String> groupNames = groupDescriptions.keySet()
        Closure<String> fallbackGroup = { String name ->
            int delimiter = name.lastIndexOf('.')
            if (delimiter <= 0) {
                return name
            }
            name.substring(0, delimiter)
        }
        Closure<String> resolveGroup = { String name, String group ->
            if (group) {
                return group
            }
            if (groupNames == null || groupNames.isEmpty()) {
                return fallbackGroup(name)
            }
            String match = groupNames.findAll { String groupName ->
                name == groupName || name.startsWith("${groupName}.")
            }.sort { String left, String right -> right.length() <=> left.length() }
                .find { String groupName -> groupName }
            match ?: fallbackGroup(name)
        }

        Closure<String> escapeAsciidoc = { String value ->
            if (!value) {
                return value
            }
            value.replace('|', '\\|')
        }

        Closure<String> formatDefaultValue = { Object value ->
            if (value == null) {
                return ''
            }
            if (value instanceof List) {
                List<Object> values = (List<Object>) value
                String joined = values.collect { Object item -> "\"${item?.toString()}\"" }.join(', ')
                return "[${joined}]"
            }
            if (value instanceof Map) {
                Map<Object, Object> mapValue = (Map<Object, Object>) value
                if (mapValue.isEmpty()) {
                    return '{}'
                }
                return mapValue.toString()
            }
            value.toString()
        }

        Map<String, List<Map<String, Object>>> categories = new LinkedHashMap<String, List<Map<String, Object>>>()
        properties.each { Map<String, Object> property ->
            String name = (String) property.get('name')
            String resolvedGroup = resolveGroup(name, (String) property.get('group'))
            String category = groupDescriptions.get(resolvedGroup) ?: resolvedGroup
            if (!categories.containsKey(category)) {
                categories.put(category, new ArrayList<Map<String, Object>>())
            }
            categories.get(category).add([
                    name        : name,
                    description : property.get('description') as String,
                    defaultValue: property.get('defaultValue')
            ])
        }

        List<String> preferredOrder = [
                'Core Properties',
                'Web & Controllers',
                'CORS',
                'Views & GSP',
                'Content Negotiation & MIME Types',
                'Data Binding',
                'Internationalization',
                'Static Resources',
                'URL Mappings',
                'Scaffolding',
                'Development & Reloading',
                'Events',
                'JSON & Converters',
                'GORM',
                'DataSource',
                'Hibernate',
                'Database Migration Plugin',
                'Cache Plugin',
                'MongoDB GORM Plugin'
        ]
        List<String> orderedCategories = new ArrayList<String>()
        preferredOrder.each { String category ->
            if (categories.containsKey(category)) {
                orderedCategories.add(category)
            }
        }
        categories.keySet().findAll { String category -> !orderedCategories.contains(category) }.sort().each { String category ->
            orderedCategories.add(category)
        }

        def documentFile = outputFile.asFile
        documentFile.withWriter('UTF-8') { writer ->
            writer.writeLine('////')
            writer.writeLine('Licensed to the Apache Software Foundation (ASF) under one')
            writer.writeLine('or more contributor license agreements.  See the NOTICE file')
            writer.writeLine('distributed with this work for additional information')
            writer.writeLine('regarding copyright ownership.  The ASF licenses this file')
            writer.writeLine('to you under the Apache License, Version 2.0 (the')
            writer.writeLine('"License"); you may not use this file except in compliance')
            writer.writeLine('with the License.  You may obtain a copy of the License at')
            writer.writeLine('')
            writer.writeLine('https://www.apache.org/licenses/LICENSE-2.0')
            writer.writeLine('')
            writer.writeLine('Unless required by applicable law or agreed to in writing,')
            writer.writeLine('software distributed under the License is distributed on an')
            writer.writeLine('"AS IS" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY')
            writer.writeLine('KIND, either express or implied.  See the License for the')
            writer.writeLine('specific language governing permissions and limitations')
            writer.writeLine('under the License.')
            writer.writeLine('////')
            writer.writeLine('')
            writer.writeLine('== Application Properties')
            writer.writeLine('')
            writer.writeLine('A comprehensive reference of all configuration properties specific to Grails and its bundled modules. These properties are set in `grails-app/conf/application.yml` (or `application.groovy`).')
            writer.writeLine('')
            writer.writeLine('Since Grails is built on Spring Boot, all https://docs.spring.io/spring-boot/{springBootVersion}/appendix/application-properties/index.html[Spring Boot Common Application Properties] are also available (for example `server.port`, `logging.*`, `spring.datasource.hikari.*`, and `management.*`). This reference covers only Grails-specific properties.')
            writer.writeLine('')
            writer.writeLine('=== Environment-Specific Configuration')
            writer.writeLine('')
            writer.writeLine('Properties in `application.yml` (or `application.groovy`) are global by default - they apply to all environments. To override a property for a specific environment, nest it under an `environments` block:')
            writer.writeLine('')
            writer.writeLine('[source,yaml]')
            writer.writeLine('----')
            writer.writeLine('# Global (applies to all environments)')
            writer.writeLine('grails:')
            writer.writeLine('    serverURL: https://my.app.com')
            writer.writeLine('')
            writer.writeLine('# Environment-specific overrides')
            writer.writeLine('environments:')
            writer.writeLine('    development:')
            writer.writeLine('        grails:')
            writer.writeLine('            serverURL: http://localhost:8080')
            writer.writeLine('    test:')
            writer.writeLine('        grails:')
            writer.writeLine('            serverURL: http://localhost:8080')
            writer.writeLine('    production:')
            writer.writeLine('        grails:')
            writer.writeLine('            serverURL: https://my.app.com')
            writer.writeLine('----')
            writer.writeLine('')
            writer.writeLine('Or in `application.groovy`:')
            writer.writeLine('')
            writer.writeLine('[source,groovy]')
            writer.writeLine('----')
            writer.writeLine("grails.serverURL = 'https://my.app.com'")
            writer.writeLine('')
            writer.writeLine('environments {')
            writer.writeLine('    development {')
            writer.writeLine("        grails.serverURL = 'http://localhost:8080'")
            writer.writeLine('    }')
            writer.writeLine('    test {')
            writer.writeLine("        grails.serverURL = 'http://localhost:8080'")
            writer.writeLine('    }')
            writer.writeLine('    production {')
            writer.writeLine("        grails.serverURL = 'https://my.app.com'")
            writer.writeLine('    }')
            writer.writeLine('}')
            writer.writeLine('----')
            writer.writeLine('')

            orderedCategories.each { String category ->
                List<Map<String, Object>> categoryProperties = categories.get(category)
                if (categoryProperties == null || categoryProperties.isEmpty()) {
                    return
                }
                writer.writeLine("=== ${category}")
                writer.writeLine('')
                writer.writeLine('[cols="3,5,2", options="header"]')
                writer.writeLine('|===')
                writer.writeLine('| Property | Description | Default')
                writer.writeLine('')
                categoryProperties.sort { Map<String, Object> left, Map<String, Object> right ->
                    (left.get('name') as String) <=> (right.get('name') as String)
                }.each { Map<String, Object> property ->
                    String name = property.get('name') as String
                    String description = property.get('description') as String
                    String defaultValue = formatDefaultValue(property.get('defaultValue'))
                    writer.writeLine("| `${name}`")
                    writer.writeLine("| ${escapeAsciidoc(description)}")
                    if (defaultValue) {
                        writer.writeLine("| `${escapeAsciidoc(defaultValue)}`")
                    }
                    else {
                        writer.writeLine('|')
                    }
                    writer.writeLine('')
                }
                writer.writeLine('|===')
                writer.writeLine('')
            }

            writer.writeLine('== Plugin References')
            writer.writeLine('')
            writer.writeLine('The following plugin documentation covers configuration properties that are not listed above:')
            writer.writeLine('')
            writer.writeLine('- https://apache.github.io/grails-spring-security/snapshot/core-plugin/guide/index.html#_configuration_properties[Spring Security Core Configuration Properties]')
            writer.writeLine('- https://wondrify.github.io/asset-pipeline/[Asset Pipeline Configuration Properties]')
            writer.writeLine('')
        }

        it.logger.lifecycle "Application Properties reference generated to: ${documentFile.absolutePath}"
    }
}

def publishGuideTask = tasks.register('publishGuide', PublishGuideTask)
publishGuideTask.configure { PublishGuideTask publish ->
    publish.dependsOn([generateBomDocumentation, generateConfigReference])

    // No language setting because we want the English guide to be
    // generated with a 'en' in the path, but the source is in 'en'
    // so that it's easy to track with git.
    publish.targetDir = project.layout.buildDirectory.dir('original-guide')
    publish.sourceRepo = "https://github.com/apache/grails-core/edit/$githubBranch/grails-doc/src/en"
    publish.sourceDir = project.layout.projectDirectory.dir('src/en')
    publish.propertiesFiles = project.files(
            rootProject.layout.projectDirectory.file('gradle.properties')
    )

    publish.properties = project.provider {
        def projectVersionForURL = projectVersion.endsWith('-SNAPSHOT') ? 'SNAPSHOT' : projectVersion
        def springVersion = getVersion('spring-core')
        def springBootVersion = getVersion('spring-boot')
        def spockVersion = getVersion("spock-core")
        def spockVersionForURL = getVersion("spock-core")?.split("-")[0]
        def hibernate5Guide = '../grails-data/hibernate5/manual/'
        def api = '../api/'
        def gspTagsRef = '../ref/Tags%20-%20GSP/'
        def controllersRef = '../ref/Controllers/'
        def commandLineRef = '../ref/Command%20Line/'
        def servletApiRef = '../ref/Servlet%20API/'
        def domainClassesRef = '../ref/Domain%20Classes/'
        def constraintsRef = '../ref/Constraints/'
        def groovyVersion = getVersion('groovy') as String
        [
                'api'                      : api,
                'apiFromRef'               : '../' + api,
                'safe'                     : 'UNSAFE', // Make sure any asciidoc security is disabled
                'jakartaee'                : 'https://jakarta.ee/specifications/platform/10/apidocs/',
                'javase'                   : "https://docs.oracle.com/en/java/javase/${javaVersion}/docs/api/",
                'groovyapi'                : "https://docs.groovy-lang.org/${groovyVersion}/html/gapi/",
                'groovyjdk'                : "https://docs.groovy-lang.org/${groovyVersion}/html/groovy-jdk/",
                'groovydocumentation'      : "https://docs.groovy-lang.org/${groovyVersion}/html/documentation/",
                'groovyVersion'            : groovyVersion,
                'springapi'                : "https://docs.spring.io/spring-framework/docs/${springVersion}/javadoc-api/",
                'springdocs'               : "https://docs.spring.io/spring-framework/docs/${springVersion}/",
                'springreference'          : "https://docs.spring.io/spring-framework/reference/${springVersion}/",
                'githubBranch'             : githubBranch,
                'gormApiDocs'              : '../grails-data/api/',
                'gormWebsite'              : '../grails-data/',
                'hibernate5Guide'          : hibernate5Guide,
                'hibernate5GuideFromRef'    : '../' + hibernate5Guide,
                'mongodb5Guide'            : '../grails-data/mongodb/manual/',
                'rxGORMGuide'              : 'https://gorm.grails.org/7.3.4/rx/manual/', // last version released
                'hibernate5Reference'      : 'https://docs.jboss.org/hibernate/orm/5.6/userguide/html_single/Hibernate_User_Guide.html',
                'springbootapi'            : "https://docs.spring.io/spring-boot/${springBootVersion}/api/java/",
                'springBootReference'      : "https://docs.spring.io/spring-boot/${springBootVersion}/reference/",
                'springBootHowTo'          : "https://docs.spring.io/spring-boot/${springBootVersion}/how-to/",
                'springBootVersion'        : springBootVersion,
                'springVersion'            : springVersion,
                'gradleVersion'            : gradle.gradleVersion,
                'GrailsVersion'            : projectVersion,
                'grailsVersionForURL'      : projectVersionForURL,
                'version'                  : projectVersion,
                'gormVersion'              : projectVersion,
                'hibernate5Version'        : getVersion("hibernate-core-jakarta"),
                'spockVersion'             : spockVersion,
                'spockDocs'                : "https://spockframework.org/spock/docs/${spockVersionForURL}/",
                'testingSupportVersion'    : getVersion("grails-testing-support-core"),
                'grailsGradlePluginVersion': getVersion("grails-gradle-plugins"),
                'gparsdocs'                : "https://gpars.org/$gparsVersion/groovydoc",
                'rxjavadocs'               : 'https://reactivex.io/RxJava/1.x/javadoc',
                'rxjava2docs'              : 'https://reactivex.io/RxJava/2.x/javadoc',
                'gspTagsRef'               : gspTagsRef,
                'gspTagsRefFromRef'        : '../' + gspTagsRef,
                'cacheTagsRef'             : '../ref/Tags%20-%20Cache/',
                'tagLibrariesRef'          : '../ref/Tag%20Libraries/',
                'guidePath'                : '../../guide/',
                'controllersRef'           : controllersRef,
                'controllersRefFromRef'    : '../' + controllersRef,
                'commandLineRef'           : commandLineRef,
                'commandLineRefFromRef'    : '../' + commandLineRef,
                'domainClassesRef'         : domainClassesRef,
                'domainClassesRefFromRef'  : '../' + domainClassesRef,
                'servletApiRef'            : servletApiRef,
                'servletApiRefFromRef'     : '../' + servletApiRef,
                'constraintsRef'           : constraintsRef,
                'constraintsRefFromRef'    : '../' + constraintsRef,
                'versionsRef'              : '../ref/Versions/',

        ] as Map<String, String>
    }
    publish.propertiesWithFilePaths = project.provider {
        [
                'cacheExampleSourceDir': rootProject.layout.projectDirectory.dir('grails-test-examples/cache').asFile,
                'sourcedir'            : rootProject.layout.projectDirectory.asFile,
                'functionalSourceDir'  : rootProject.layout.projectDirectory.dir('grails-test-examples').asFile
        ] as Map<String, String>
    }
}

def createReleaseDropdownTask = tasks.register('createReleaseDropdown', CreateReleaseDropDownTask)
createReleaseDropdownTask.configure { CreateReleaseDropDownTask it ->
    it.dependsOn(publishGuideTask)

    it.filesToAddDropdowns = project.layout.buildDirectory.files('modified-guide/guide/single.html', 'modified-guide/index.html')
    it.sourceDocsDirectory = project.layout.buildDirectory.dir('original-guide')
    it.modifiedPagesDirectory = project.layout.buildDirectory.dir('modified-guide')
}

def fetchTagsTask = project.tasks.register('fetchTags', FetchTagsTask)
createReleaseDropdownTask.configure {
    dependsOn(fetchTagsTask)
}

def docsTask = tasks.register('docs', Sync)
docsTask.configure { Sync it ->
    it.dependsOn(combinedGroovydoc, createReleaseDropdownTask, ':grails-data-docs-stage:docs')
    it.group = 'documentation'

    def manualDocsDir = project.layout.buildDirectory.dir('modified-guide')
    def apiDocsDir = project.layout.buildDirectory.dir('combined-api')
    def dataDocsDir = rootProject.layout.projectDirectory.dir('grails-data-docs/stage/build/docs')

    def mergedDocsDir = project.layout.buildDirectory.dir('docs')

    it.inputs.dir manualDocsDir
    it.inputs.dir apiDocsDir
    it.inputs.dir dataDocsDir
    it.inputs.dir project.layout.projectDirectory.dir('src')

    it.outputs.dir mergedDocsDir

    // Exclude page fragments - they have broken links/CSS/JS and are already
    // included in the assembled guide pages (see #14986)
    it.from(manualDocsDir) {
        exclude "guide/pages/**"
    }

    it.from apiDocsDir, dataDocsDir
    it.into mergedDocsDir
}

tasks.register('dist', Zip).configure { Zip it ->
    it.dependsOn(docsTask)
    it.from(outputDir)
}

artifacts {
    archives dist
}

// the groovy plugin is applied to this project, but we do not build a jar file since
// the dependencies are only used for resolving versions from the bom
tasks.withType(Jar).configureEach {
    enabled = false
}
