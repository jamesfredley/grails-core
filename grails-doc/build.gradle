import grails.doc.AddReleaseDropDown
import grails.doc.gradle.PublishGuide
import grails.doc.gradle.PublishPdf

plugins {
    id 'base'
    id 'org.asciidoctor.jvm.convert'
    id 'groovy'
}

compileJava.options.release = javaVersion.toInteger()

version = projectVersion

ext {
    grailsCheckOutDir = project.layout.buildDirectory.dir('grails-core/checkout').get().asFile.absolutePath
    grailsTestsCheckOutDir = project.layout.buildDirectory.dir('grails-functional-tests/checkout').get().asFile.absolutePath
    outputDir = layout.buildDirectory.file('docs').get().asFile.absolutePath
    githubBranch = project.findProperty('githubBranch')
    guidePage = '/docs/guide/single.html'
    indexPage = '/docs/index.html'
}

dependencies {
    implementation platform(project(':grails-bom'))
    implementation 'org.apache.grails:grails-docs-core'
    implementation 'org.apache.groovy:groovy'

    // Used to surface versions for AsciiDoc
    implementation project(':grails-dependencies')
    implementation project(':grails-testing-support-core')
    implementation project(':grails-data-hibernate5')
    implementation 'org.apache.grails:grails-gradle-plugins'
}

// this task needs to be here instead of the root since bom resolution only occurs when the java / groovy plugins are applied
apply from: rootProject.layout.projectDirectory.file('gradle/docs-dependencies.gradle')
tasks.register('aggregateGroovydoc', Groovydoc).configure { Groovydoc gdoc ->
    gdoc.group = 'documentation'
    def srcDirs = rootProject.subprojects
            .findAll { it.findProperty('includeInApiDocs') }
            .collect { it.sourceSets.main.allSource.srcDirs }
            .flatten()
    gdoc.source(srcDirs)
    gdoc.exclude('META-INF/**')
    gdoc.classpath = configurations.documentation
    gdoc.groovyClasspath = configurations.documentation
    gdoc.destinationDir = rootProject.layout.buildDirectory.dir('docs/api').get().asFile
    gdoc.windowTitle = "Grails $projectVersion"
    gdoc.docTitle = "Grails $projectVersion"
    gdoc.access = GroovydocAccess.PROTECTED
    gdoc.includeAuthor = true
    gdoc.includeMainForScripts = false
    gdoc.processScripts = false
    gdoc.inputs.files(srcDirs)
    gdoc.outputs.dir(destinationDir)
    gdoc.doLast {
        delete(rootProject.layout.buildDirectory.dir('tmp'))
    }
}

// use jsoup in PdfBuilder for cleaning input html
System.setProperty('grails.docs.clean.html', 'true')
// creates single.html.before.xml and single.html.after.xml files for debugging pdf input when enabled
//System.setProperty('grails.docs.debug.pdf','true')

asciidoctor {
    resources {
        from('resources')
    }

    options template_dirs: ["${projectDir}/src/docs/templates"]
    attributes 'experimental': 'true',
            'compat-mode': 'true',
            'icons': 'font',
            'linkcss': 'true',
            'docinfo1': '',
            'toc': 'left',
            'version': project.version,
            'sourcedir': rootProject.projectDir.absolutePath
}

asciidoctor.dependsOn('aggregateGroovydoc')

tasks.withType(org.gradle.api.tasks.javadoc.Groovydoc) {
    configure {
        access = GroovydocAccess.PRIVATE
        processScripts = false
        includeMainForScripts = false
    }
}

tasks.register('dist', Zip).configure { Zip it ->
    it.dependsOn 'docs'
    it.from outputDir
}

tasks.register('createReleaseDropdown', AddReleaseDropDown).configure { AddReleaseDropDown it ->
    it.dependsOn 'publishGuide', 'publishPdf'
    def inputFiles = [project.layout.buildDirectory.file('manual/guide/single.html').get().asFile, project.layout.buildDirectory.file('manual/index.html').get().asFile]

    it.inputs.files(inputFiles)
    it.outputs.dir(outputDir)
}

tasks.register('resolveGroovyVersion').configure { Task versionTask ->
    versionTask.group = 'documentation'
    versionTask.description = 'Resolve Groovy Version from the BOM'
    ext.resolved = configurations.compileClasspath
            .resolvedConfiguration
            .resolvedArtifacts
            .find {
                it.moduleVersion.id.group == 'org.apache.groovy' &&
                        it.moduleVersion.id.name.contains('groovy')
            }.moduleVersion.id.version
    logger.lifecycle('Resolved Groovy version for Guide links: {}', ext.resolved)
}

String getVersion(String artifact) {
    configurations.runtimeClasspath
            .resolvedConfiguration
            .resolvedArtifacts
            .find {
                it.moduleVersion.id.name == artifact
            }?.moduleVersion?.id?.version
}

tasks.register('publishGuide', PublishGuide).configure { PublishGuide publish ->
    publish.dependsOn(['generateBomDocumentation', 'aggregateGroovydoc', 'jar', 'resolveGroovyVersion', 'processTestResources', 'compileTestJava', 'compileTestGroovy', 'test'])
    publish.targetDir = project.layout.buildDirectory.dir('manual').get().asFile

    publish.doFirst {
        def searchDirs = rootProject.projectDir.listFiles().findAll {
            new File(it, 'src/main/groovy/org/grails').exists()
        }.collect {
            new File(it, 'src/main/groovy/org/grails')
        }

        // No language setting because we want the English guide to be
        // generated with a 'en' in the path, but the source is in 'en'
        // so that it's easy to track with git.
        sourceRepo = "https://github.com/apache/grails-core/edit/$githubBranch/grails-doc/src/en"
        sourceDir = project.layout.projectDirectory.dir('src/en').asFile
        propertiesFiles = [rootProject.layout.projectDirectory.file('gradle.properties').asFile]
        asciidoc = true

        def springVersion = getVersion('spring-core')
        def springBootVersion = getVersion('spring-boot')
        def gspVersion = getVersion('grails-gsp')
        def gormVersion = getVersion('grails-datamapping-core')

        properties = [
                'api'                      : '../../api',
                'safe'                     : 'UNSAFE', // Make sure any asciidoc security is disabled
                'jakartaee'                : 'https://jakarta.ee/specifications/platform/10/apidocs/',
                'javase'                   : "https://docs.oracle.com/en/java/javase/${javaVersion}/docs/api/",
                'groovyapi'                : "https://docs.groovy-lang.org/${resolveGroovyVersion.resolved}/html/gapi/",
                'groovyjdk'                : "https://docs.groovy-lang.org/${resolveGroovyVersion.resolved}/html/groovy-jdk/",
                'groovyVersion'            : resolveGroovyVersion.resolved,
                'springapi'                : "https://docs.spring.io/spring/docs/${springVersion}/javadoc-api/",
                'springdocs'               : "https://docs.spring.io/spring/docs/${springVersion}/",
                'githubBranch'             : githubBranch,
                'gspdocs'                  : "https://gsp.grails.org/${gspVersion}",
                'gspApiDocs'               : "https://gsp.grails.org/${gspVersion}/api/",
                'gormApiDocs'              : "https://gorm.grails.org/${gormVersion}/api/",
                'hibernateReference'       : 'https://docs.jboss.org/hibernate/orm/5.6/userguide/html_single/Hibernate_User_Guide.html',
                'springapi'                : "https://docs.spring.io/spring/docs/${springVersion}/javadoc-api/",
                'springbootapi'            : "https://docs.spring.io/spring-boot/docs/${springBootVersion}/api",
                'springBootReference'      : "https://docs.spring.io/spring-boot/docs/${springBootVersion}/reference",
                'springBootVersion'        : springBootVersion,
                'springVersion'            : springVersion,
                'gradleVersion'            : gradle.gradleVersion,
                'GrailsVersion'            : projectVersion,
                'version'                  : projectVersion,
                'gormVersion'              : gormVersion,
                'cacheExampleSourceDir'    : rootProject.layout.projectDirectory.dir('grails-test-examples/cache').asFile,
                'hibernate5Version'        : getVersion("hibernate-core-jakarta"),
                'spockVersion'             : getVersion("spock-core"),
                'testingSupportVersion'    : getVersion("grails-testing-support-core"),
                'grailsGradlePluginVersion': getVersion("grails-gradle-plugins"),
                'sourcedir'                : rootProject.layout.projectDirectory.asFile,
                'functionalSourceDir'      : rootProject.layout.projectDirectory.asFile,
                'gparsdocs'                : "https://gpars.org/$gparsVersion/groovydoc",
                'rxjavadocs'               : 'https://reactivex.io/RxJava/1.x/javadoc',
                'rxjava2docs'              : 'https://reactivex.io/RxJava/2.x/javadoc',
                'tags'                     : '../ref/Tags'
        ]
        macros = [new grails.doc.macros.GspTagSourceMacro(searchDirs)]
    }
}

tasks.register('generateBomDocumentation').configure { Task it ->
    it.dependsOn(':grails-bom:extractConstraints')

    it.description = 'Generates an AsciiDoc table listing Group, Artifact, and Version for project dependencies.'
    it.group = 'Reporting'

    it.inputs.files(project(':grails-bom').layout.projectDirectory.asFileTree)
    it.outputs.file(project.layout.projectDirectory.file('src/en/ref/Dependency Versions/Grails BOM.adoc'))

    it.doFirst {
        project.layout.projectDirectory.dir('src/en/ref/Dependency Versions').asFile.mkdirs()
    }

    it.doLast {
        def bomDocument = project.layout.projectDirectory.file('src/en/ref/Dependency Versions/Grails BOM.adoc').asFile
        bomDocument.withWriter { writer ->
            writer.writeLine '== Grails BOM Dependency Documentation'
            writer.writeLine ''
            writer.writeLine 'This document provides information about the dependencies mentioned in the Grails BOM categorized into Group ID, Artifact, and Version. Since the `grails-bom` imports other BOMs, the last column indicates the source of the dependency.'
            writer.writeLine ''
            writer.write(project(':grails-bom').layout.buildDirectory.file('grails-bom-constraints.adoc').get().asFile.text)
            writer.writeLine ''
        }

        project.logger.lifecycle "BOM Dependency Page generated to: ${bomDocument.absolutePath}"
    }
}

tasks.register('publishPdf', PublishPdf).configure { PublishPdf pTask ->
    pTask.dependsOn 'publishGuide'
    pTask.outputDirectory = project.layout.buildDirectory.dir('manual')
}

tasks.register('docs', Copy).configure {Copy it ->
    it.dependsOn 'aggregateGroovydoc', 'publishGuide', 'createReleaseDropdown', 'publishPdf'

    def manualDocsDir = publishGuide.targetDir
    def apiDocsDir = rootProject.layout.buildDirectory.dir('docs')
    // This is the output directory of the groovydoc task in the grails project.
    def modifiedPagesDir = createReleaseDropdown.outputDir
    def mergedDocsDir = project.layout.buildDirectory.dir('docs')

    it.inputs.dir manualDocsDir
    it.inputs.dir apiDocsDir
    it.inputs.dir modifiedPagesDir
    it.inputs.dir project.layout.projectDirectory.dir('src')

    it.outputs.dir mergedDocsDir

    it.from manualDocsDir, apiDocsDir, modifiedPagesDir
    it.into mergedDocsDir

    it.duplicatesStrategy = DuplicatesStrategy.INCLUDE
}

artifacts {
    archives dist
}

