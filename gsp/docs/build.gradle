ext {
    guideTitle = 'Groovy Server Pages (GSP)'
    guideSubtitle = 'GSP (Groovy Server Pages) - A server-side view rendering technology based on Groovy'

    apiDocsProjects = [
            'grails-gsp-core',
            'grails-gsp',
            'grails-sitemesh3',
            'grails-taglib',
            'grails-web-gsp',
            'grails-web-gsp-taglib',
            'grails-web-jsp',
            'grails-web-taglib',
            'grails-testing-support-web'
    ]
    apiDocTitle = "Groovy Server Pages (GSP) API - ${projectVersion}"
