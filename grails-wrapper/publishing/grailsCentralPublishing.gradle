publishing {
    publications {
        maven(MavenPublication) {
            pom.withXml {
                def xml = asNode()
                xml.children().last() + pomInfo
                try {
                    xml.dependencyManagement.replaceNode {}
                } catch (Throwable e) {
                    // ignore
                }

                // simply remove dependencies without a version
                // version-less dependencies are handled with dependencyManagement
                // see https://github.com/spring-gradle-plugins/dependency-management-plugin/issues/8 for more complete solutions
                xml.dependencies.dependency.findAll {
                    it.version.text().isEmpty()
                }.each {
                    try {
                        it.replaceNode {}
                    } catch (Throwable e) {
                        // ignore
                    }
                }
            }
            artifactId project.name
            from components.java
            artifact sourcesJar
            artifact javadocJar
        }
    }

    repositories {
        if (isSnapshot) {
            maven {
                credentials {
                    username = System.getenv('MAVEN_PUBLISH_USERNAME')
                    password = System.getenv('MAVEN_PUBLISH_PASSWORD')
                }
                url = System.getenv('MAVEN_PUBLISH_URL') ?: 'https://repository.apache.org/content/repositories/snapshots'
            }
        }
    }
}

task install(dependsOn: project.tasks.withType(PublishToMavenLocal))
