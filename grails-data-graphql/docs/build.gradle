plugins {
    id 'org.asciidoctor.jvm.convert' version '4.0.5'
}

repositories {
    mavenCentral()
}

asciidoctorj {
    version = '3.0.0'
}

asciidoctor {
    baseDirFollowsSourceFile()
    sourceDir = file('src/main/docs')
    sources {
        include 'index.adoc'
    }
    outputDir = layout.buildDirectory.dir('docs/manual').get().asFile

    attributes 'toc'                : 'left',
               'toclevels'          : 3,
               'icons'              : 'font',
               'source-highlighter' : 'coderay',
               'sectanchors'        : '',
               'idprefix'           : '',
               'idseparator'        : '-',
               'project-version'    : project.version,
               'grails-version'     : grailsVersion,
               'gorm-version'       : gormVersion,
               'sourcedir'          : rootDir.absolutePath.replace('\\', '/')
}

tasks.register('docs') {
    group = 'documentation'
    description = 'Builds the reference guide.'
    dependsOn tasks.named('asciidoctor')
}
