buildscript {
    repositories {
        mavenCentral()
        maven { url "https://repo.grails.org/grails/restricted" }
    }
    dependencies {
        classpath "org.apache.grails:grails-gradle-plugins:$grailsGradlePluginVersion"
    }
}

repositories {
    mavenCentral()
    maven { url "https://repo.grails.org/grails/restricted" }
}

version project.projectVersion

ext {
    commonBuild = 'https://raw.githubusercontent.com/grails/grails-common-build/v2.0.3'
}

subprojects {

    version project.projectVersion

    ext {
        userOrg = "grails"
        isGrailsPlugin = name.startsWith('grails-plugin')
        isBuildSnapshot = version.toString().endsWith("-SNAPSHOT")
    }

    repositories {
        mavenCentral()
        maven { url "https://repo.grails.org/grails/restricted" }
    }

    tasks.withType(GroovyCompile).configureEach {
        configure(groovyOptions) {
            forkOptions.jvmArgs = ['-Xmx1024m']
        }
    }

    tasks.withType(Test).configureEach {
        testLogging {
            events "failed"
            exceptionFormat "full"
            showStandardStreams true
        }
    }

    if (project.name.startsWith("examples-")) {
        if (project.name.startsWith("examples-grails-")) {
            apply plugin: 'org.apache.grails.gradle.grails-web'
        }
        return
    }

    group "org.apache.grails"

    apply plugin: 'groovy'
    apply plugin: 'eclipse'
    apply plugin: 'idea'
    apply plugin: 'java-library'
    apply plugin: 'maven-publish'

    if (isGrailsPlugin) {
        apply plugin: 'org.apache.grails.gradle.grails-plugin'
    }

    java {
        sourceCompatibility = JavaVersion.toVersion(javaVersion)
        targetCompatibility = JavaVersion.toVersion(javaVersion)
    }

    // Groovy 4 moved from org.codehaus.groovy → org.apache.groovy.
    // Redirect any legacy coordinate that leaks in via transitive dependencies
    // or the grails-plugin Gradle plugin. groovy-bom is excluded outright because
    // it's pulled in as a "library" (wrong) by legacy build scripts, conflicting
    // with the platform declared by spring-boot-dependencies / grails-bom.
    configurations.configureEach {
        exclude group: 'org.codehaus.groovy', module: 'groovy-bom'
        resolutionStrategy.eachDependency { details ->
            if (details.requested.group == 'org.codehaus.groovy' && details.requested.name != 'groovy-bom') {
                details.useTarget(group: 'org.apache.groovy', name: details.requested.name, version: groovyVersion)
            }
        }
    }

    dependencies {
        implementation platform("org.apache.grails:grails-bom:$grailsBomVersion")
        testImplementation platform("org.apache.grails:grails-bom:$grailsBomVersion")
        api "org.apache.groovy:groovy:$groovyVersion"
        implementation "com.graphql-java:graphql-java:$graphqlJavaVersion"
        testImplementation "org.apache.groovy:groovy-test"
        testImplementation "io.projectreactor:reactor-test"
        testImplementation("org.spockframework:spock-core:$spockVersion")
    }

    tasks.withType(Test).configureEach {
        useJUnitPlatform()
    }
}

// Publishing is handled by the grails-gradle-plugins `grails-plugin` plugin and the
// root monorepo release pipeline. The legacy grails-common-build/common-publishing.gradle
// script used Gradle 7 APIs (Jar.classifier) that were removed in Gradle 8.
// apply from: "${commonBuild}/common-publishing.gradle"
