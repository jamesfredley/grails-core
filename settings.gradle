plugins {
    id 'com.gradle.develocity' version '3.19.2'
    id 'com.gradle.common-custom-user-data-gradle-plugin' version '2.2.1'
}

def isCI = System.getenv().containsKey('CI')
def isLocal = !isCI
def isAuthenticated = System.getenv().containsKey('GRAILS_DEVELOCITY_ACCESS_KEY')

develocity {
    server = 'https://ge.grails.org'
    buildScan {
        tag('grails')
        tag('grails-core')
        publishing.onlyIf { isAuthenticated }
        uploadInBackground = isLocal
    }
}

buildCache {
    local { enabled = isLocal }
    remote(develocity.buildCache) {
        push = isCI && isAuthenticated
        enabled = true
    }
}

rootProject.name = 'grails.core.ROOT'

include (
        'grails-bootstrap',
        'grails-codecs-core',
        'grails-codecs',
        'grails-console',
        'grails-controllers',
        'grails-converters',
        'grails-core',
        'grails-databinding-core',
        'grails-databinding',
        'grails-datasource',
        'grails-docs-core',
        'grails-domain-class',
        'grails-encoder',
        'grails-i18n',
        'grails-interceptors',
        'grails-logging',
        'grails-mimetypes',
        'grails-rest-transforms',
        'grails-services',
        'grails-shell-cli',
        'grails-spring',
        'grails-test-core',
