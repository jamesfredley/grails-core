plugins {
    id 'java-library'
    id 'groovy'
    id 'org.apache.grails.gradle.grails-plugin'
}

version = projectVersion
group = 'org.apache.grails'

ext {
    pomDescription = 'Grails JSON Views'
    pomDevelopers = [ 'graemerocher': 'Graeme Rocher', 'puneetbehl': 'Puneet Behl' ]
}

dependencies {
    implementation platform(project(':grails-bom'))

    api project(':grails-views-core') // Used in public API
    api project(':grails-rest-transforms') // Used in public API

    implementation project(':grails-encoder')
    implementation 'org.apache.groovy:groovy'
    implementation 'org.apache.groovy:groovy-json'
    implementation 'jakarta.validation:jakarta.validation-api'

    testImplementation project(':grails-testing-support-views-gson')
    testImplementation project(':grails-testing-support-core')
    testImplementation project(':grails-testing-support-datamapping')
    testImplementation project(':grails-data-hibernate5-core')
    testImplementation 'org.spockframework:spock-core'
    testImplementation 'com.fasterxml.jackson.core:jackson-databind'
    testImplementation 'jakarta.servlet:jakarta.servlet-api'

    testRuntimeOnly 'org.slf4j:slf4j-nop' // Get rid of warning about missing slf4j implementation during test task
}

def testArtifacts = ['*.gson', 'circular/**']

tasks.named('jar', Jar).configure {
    it.exclude testArtifacts
}
tasks.named('sourcesJar', Jar).configure {
    it.exclude testArtifacts
}

apply {
    // java-configuration must be applied first since tasks are now lazy registered
    from rootProject.layout.projectDirectory.file('gradle/java-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/assemble-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/docs-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/publish-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/test-config.gradle')
}