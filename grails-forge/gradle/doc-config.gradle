apply plugin: 'org.apache.grails.buildsrc.groovydoc'

groovydocEnhancer {
    javaVersionEnabled = false
}

dependencies {
    documentation "org.apache.groovy:groovy-templates:$groovyVersion"
    documentation "org.apache.groovy:groovy-dateutil:$groovyVersion"
    documentation "org.apache.groovy:groovy-ant:$groovyVersion"
    documentation "org.apache.groovy:groovy-groovydoc:$groovyVersion"
}

tasks.withType(Groovydoc).configureEach { Groovydoc gdoc ->
    gdoc.classpath += project.configurations.documentation
    gdoc.windowTitle = "${project.findProperty('pomArtifactId') ?: project.name} - $projectVersion"
    gdoc.docTitle = "${project.findProperty('pomArtifactId') ?: project.name} - $projectVersion"
}
