compileJava.options.release = javaVersion.toInteger()

extensions.configure(JavaPluginExtension) {
    // Explicit `it` is required here
    it.withJavadocJar()
    it.withSourcesJar()
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    options.compilerArgs.add('-parameters')
}

tasks.withType(Javadoc).configureEach { Javadoc it ->
    it.options.noTimestamp true // prevent the file header with the date
    it.options.bottom "Generated ${formattedBuildDate} (UTC)"
}

tasks.withType(GroovyCompile).configureEach {
    groovyOptions.encoding = 'UTF-8' // encoding needs to be the same since it's different across platforms
    // Preserve method parameter names in Groovy classes for IDE parameter hints.
    groovyOptions.parameters = true
    options.encoding = 'UTF-8' // encoding needs to be the same since it's different across platforms
    options.fork = true
    options.forkOptions.jvmArgs = ['-Xms128M', '-Xmx1G']
}

// Grails determines the grails version via the META-INF/MANIFEST.MF file
// Note: we exclude attributes such as Built-By, Build-Jdk, Created-By to ensure the build is reproducible.
tasks.withType(Jar).configureEach {
    manifest.attributes(
            'Implementation-Title': 'Apache Grails',
            'Implementation-Version': projectVersion,
            'Implementation-Vendor': 'grails.apache.org'
    )
    duplicatesStrategy = DuplicatesStrategy.INCLUDE

    from(rootProject.layout.projectDirectory.file('../DISCLAIMER')) {
        into('META-INF')
    }

    def projectLicense = layout.projectDirectory.file('src/main/resources/META-INF/LICENSE')
    if (!projectLicense.asFile.exists()) {
        def basicLicense = rootProject.layout.projectDirectory.file('../licenses/LICENSE-Apache-2.0.txt')
        from(basicLicense) {
            into('META-INF')
            rename { 'LICENSE' }
        }
    }

    def projectNotice = layout.projectDirectory.file('src/main/resources/META-INF/NOTICE')
    if (!projectNotice.asFile.exists()) {
        def basicNotice = rootProject.layout.projectDirectory.file('../grails-core/src/main/resources/META-INF/NOTICE')
        from(basicNotice) {
            into('META-INF')
        }
    }
}

// Any jar, zip, or archive should be reproducible
// No longer needed after https://github.com/gradle/gradle/issues/30871
tasks.withType(AbstractArchiveTask).configureEach {
    preserveFileTimestamps = false // to prevent timestamp mismatches
    reproducibleFileOrder = true // to keep the same ordering
    // to avoid platform specific defaults, set the permissions consistently
    filePermissions { permissions ->
        permissions.unix(0644)
    }
    dirPermissions { permissions ->
        permissions.unix(0755)
    }
}

