# Forcing JGit classes to --initialize-at-build-time was needed in older
# GraalVM releases (and predates the GraalVM Reachability Metadata Repository
# entry for org.eclipse.jgit:org.eclipse.jgit). It is now actively harmful:
# org.eclipse.jgit.transport.Transport (and the other Transport* classes)
# declare a static final Logger field, so initializing them at build time
# transitively runs LoggerFactory.<clinit> and the entire ch.qos.logback
# class graph at build time. With logback 1.5.x that triggers
# "ch.qos.logback.* the class was requested to be initialized at run time
# ... got initialized during image building" failures during
# dockerBuildNative. The GRM repo (>= 0.3.35) ships reflection and
# resource metadata for jgit 6.5.0+ that covers our 6.10.x runtime, so we
# can safely let jgit fall back to the default (run-time) class
# initialization and only keep the one explicit run-time entry below.
Args = --initialize-at-run-time=org.eclipse.jgit.lib.internal.WorkQueue
