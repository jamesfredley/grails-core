import org.apache.grails.buildsrc.WriteGrailsVersionInfoTask

plugins {
    id 'groovy'
    id 'java-library'
    id 'org.apache.grails.buildsrc.properties'
    id 'org.apache.grails.buildsrc.dependency-validator'
    id 'org.grails.forge.rocker'
    id 'org.apache.grails.buildsrc.compile'
    id 'org.apache.grails.buildsrc.publish'
    id 'org.apache.grails.buildsrc.sbom'
}

version = projectVersion
group = 'org.apache.grails.forge'

sourceSets {
    main {
        rocker {
            srcDir('src/main/java')
        }
    }
}

dependencies {
    annotationProcessor platform("io.micronaut.platform:micronaut-platform:$micronautVersion")
    implementation platform("io.micronaut.platform:micronaut-platform:$micronautVersion")
    annotationProcessor 'io.micronaut:micronaut-inject-java'
    testAnnotationProcessor platform("io.micronaut.platform:micronaut-platform:$micronautVersion")
    testAnnotationProcessor 'io.micronaut:micronaut-inject-java'

    api platform("io.micronaut.platform:micronaut-platform:$micronautVersion") // TODO: Should this be api?
    api 'com.fasterxml.jackson.core:jackson-databind'
    api 'jakarta.validation:jakarta.validation-api'
    api "com.fizzed:rocker-runtime:$rockerVersion"
    api "io.github.java-diff-utils:java-diff-utils:$javaDiffUtils"
    api 'io.micronaut:micronaut-http'
    api 'io.micronaut:micronaut-http-client'
    api 'io.micronaut:micronaut-inject'
    api "org.eclipse.jgit:org.eclipse.jgit:$jgitVersion"

    implementation "com.typesafe:config:$typesafeConfigVersion"
    implementation "org.apache.commons:commons-compress:$commonsCompressVersion"
    implementation "org.yaml:snakeyaml:$snakeyamlVersion"

    compileOnly 'com.google.code.findbugs:jsr305'

    testImplementation 'org.apache.groovy:groovy-yaml'

    testCompileOnly 'io.micronaut:micronaut-inject-groovy'

    testImplementation 'org.apache.groovy:groovy'
    testImplementation "org.spockframework:spock-core:$spockVersion", {
        exclude group: 'org.apache.groovy', module: 'groovy-all'
    }

    testImplementation "cglib:cglib-nodep:$cglibVersion"
    testImplementation "org.objenesis:objenesis:$objenesisVersion"
    testRuntimeOnly "ch.qos.logback:logback-classic:$logbackClassicVersion"
    testImplementation 'org.apache.groovy:groovy-test'
}


def grailsVersionsPath = layout.buildDirectory.dir('version-info')
def grailsVersionInfoTask = tasks.register('grailsVersionInfo', WriteGrailsVersionInfoTask)
grailsVersionInfoTask.configure { WriteGrailsVersionInfoTask it ->
    def bomPublicationTask = gradle.includedBuild('grails-core').task(':grails-bom:generatePomFileForMavenPublication')
    it.dependsOn(bomPublicationTask)
    it.bomPublicationFile = rootProject.layout.projectDirectory.file('../grails-bom/default/build/publications/maven/pom-default.xml')
    it.versionsDirectory = grailsVersionsPath
}
sourceSets.main.resources.srcDir(grailsVersionsPath)

tasks.named('build').configure {
    it.dependsOn(grailsVersionInfoTask)
}

rocker {
    postProcessing = ['org.grails.forge.rocker.plugin.WhitespaceProcessor']
}

// profile base
TaskProvider<Sync> copyGrailsWrapper = tasks.register('copyGrailsWrapper', Sync)
copyGrailsWrapper.configure { Sync it ->
    it.dependsOn(gradle.includedBuild('grails-core').task(':grails-wrapper:installDist'))

    def wrapperFiles = rootProject.layout.projectDirectory.dir('../grails-wrapper/build/install/apache-grails-wrapper-bin')
    it.inputs.files(wrapperFiles)
    it.includeEmptyDirs = false

    it.from(wrapperFiles) {
        include(
                'grailsw',
                'grailsw.bat',
                'grails-wrapper.jar'
        )
        eachFile { details -> details.path = details.name } // flatten
    }
    it.into(layout.projectDirectory.dir('src/main/resources/grails-wrapper'))
}

apply {
    from rootProject.layout.projectDirectory.file('gradle/code-style-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/test-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/doc-config.gradle')
}

nohttp {
    source.exclude('**/pom.rocker.raw')
}

['processResources', 'sourcesJar', 'spotlessJavaMisc', 'checkstyleNohttp'].each { name ->
    tasks.named(name).configure {
        it.dependsOn(copyGrailsWrapper, grailsVersionInfoTask)
    }
}

configurations.configureEach {
    resolutionStrategy {
        eachDependency { DependencyResolveDetails details ->
            if (details.requested.name == 'spock-core') {
                details.useVersion(spockVersion)
            }
        }
    }
}
