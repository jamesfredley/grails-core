import java.time.Instant
import java.time.LocalDate
import java.time.ZoneOffset
import java.time.format.DateTimeFormatter

Properties props = new Properties()
file('../gradle.properties').withInputStream {
    props.load(it)
}

ext {
    buildInstant = java.util.Optional.ofNullable(System.getenv('SOURCE_DATE_EPOCH'))
            .map(Long::parseLong)
            .map(Instant::ofEpochSecond)
            .orElseGet(Instant::now) as Instant
    formattedBuildDate = System.getenv("SOURCE_DATE_EPOCH") ?
            DateTimeFormatter.ISO_INSTANT.format(buildInstant) :
            DateTimeFormatter.ISO_DATE.format(LocalDate.ofInstant(buildInstant as Instant, ZoneOffset.UTC))
    buildDate = (buildInstant as Instant).atZone(ZoneOffset.UTC) // for reproducible builds
    isCiBuild = System.getenv().containsKey('CI')
}

allprojects {
    props.forEach { k, v ->
        if(!project.hasProperty(k as String)) {
            project.ext.set(k as String, v)
        }
    }

    repositories {
        // mavenLocal() // Keep, this will be uncommented and used by CI (groovy-joint-workflow)
        mavenCentral()
        maven { url = 'https://repo.grails.org/grails/restricted' }
        maven {
            url = 'https://repository.apache.org/content/groups/snapshots'
            content {
                includeVersionByRegex('org[.]apache[.](grails|groovy).*', '.*', '.*SNAPSHOT')
            }
        }
        maven {
            url = 'https://repository.apache.org/content/groups/staging'
            content {
                includeGroupByRegex('org[.]apache[.]grails.*')
            }
        }
    }

    tasks.withType(Test).configureEach { Task testTask ->
        testTask.dependsOn(
                gradle.includedBuild('grails-core').task(':publishAllPublicationsToTestCaseMavenRepoRepository'),
                gradle.includedBuild('grails-gradle').task(':publishAllPublicationsToTestCaseMavenRepoRepository')
        )
    }
}

apply {
    // we must apply the publish configuration first or the docs config will not work
    from layout.projectDirectory.file('gradle/publish-root-config.gradle')
    from layout.projectDirectory.file('gradle/gradle-wrapper-root-config.gradle')
    from layout.projectDirectory.file('gradle/doc-root-config.gradle')
}