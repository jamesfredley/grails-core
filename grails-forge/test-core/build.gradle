plugins {
    id 'groovy'
    id 'java-library'
    id 'org.grails.forge.rocker'
}

version = projectVersion
group = 'org.apache.grails.forge'

sourceSets {
    test {
        rocker {
            srcDir('src/test/groovy')
        }
    }
}

configurations.register('generateConfig')
configurations.configureEach {
    resolutionStrategy {
        // prevent fatJar result containing multiple versions of picocli
        force("info.picocli:picocli:$picocliVersion")
    }
}

dependencies {
    implementation gradleTestKit()
    generateConfig "info.picocli:picocli-codegen:$picocliVersion"

    implementation "io.micronaut:micronaut-inject-groovy:$micronautVersion"

    testImplementation project(':grails-forge-cli')
    testImplementation project(':grails-forge-core')
    testImplementation "ch.qos.logback:logback-classic:$logbackClassicVersion"
    testImplementation 'io.micronaut.picocli:micronaut-picocli'

    if (project.hasProperty('micronautVersion')) {
        testCompileOnly "io.micronaut:micronaut-inject-groovy:$micronautVersion"
    }

    testImplementation "org.codehaus.groovy:groovy:$groovyVersion"
    testImplementation "org.spockframework:spock-core:$spockVersion", {
        exclude group: 'org.codehaus.groovy', module: 'groovy-all'
    }

    testImplementation "cglib:cglib-nodep:$cglibVersion"
    testImplementation "org.objenesis:objenesis:$objenesisVersion"
    testRuntimeOnly "ch.qos.logback:logback-classic:$logbackClassicVersion"
    testImplementation "org.codehaus.groovy:groovy-test:$groovyVersion"
}

apply {
    from rootProject.layout.projectDirectory.file('gradle/java-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/test-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/style-enforcement-config.gradle')
}