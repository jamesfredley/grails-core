plugins {
    id 'org.apache.grails.buildsrc.properties'
    id 'org.apache.grails.buildsrc.dependency-validator'
    id 'io.micronaut.application' version "$micronautApplicationPluginVersion"
}

version = projectVersion
group = 'org.apache.grails.forge'

dependencies {

    implementation project(':grails-forge-api')
    implementation 'io.micronaut.gcp:micronaut-gcp-http-client'

    runtimeOnly 'ch.qos.logback:logback-classic'
    // Forge's grails-forge-api DTO classes (VersionDTO, ApplicationTypeDTO,
    // FeatureDTO, SelectOptionsDTO, Linkable, ...) are annotated with
    // @Introspected only. micronaut-serde-jackson requires @Serdeable on
    // each serializable type and rejects @Introspected-only classes at
    // runtime, which surfaces in the deployed native image as
    //   "Internal Server Error: Error encoding object [VersionDTO@..] to
    //    JSON: No serializable introspection present for type VersionDTO."
    // and breaks every JSON endpoint behind start.grails.org / next.grails.org
    // / prev-snapshot.grails.org. The rest of the forge stack (forge-api,
    // forge-core, analytics-postgres) still depends on
    // io.micronaut:micronaut-jackson-databind, so keep the netty service on
    // the same JSON runtime to match. If forge ever migrates to Serde end-
    // to-end, every DTO needs @Serdeable / @SerdeImport at the same time.
    runtimeOnly 'io.micronaut:micronaut-jackson-databind'

    testImplementation 'io.micronaut:micronaut-http-client'
    testImplementation 'io.micronaut.test:micronaut-test-spock'

    testCompileOnly 'io.micronaut:micronaut-inject-groovy'
}
tasks.named('test', Test) {
    useJUnitPlatform()
    classpath += configurations.developmentOnly
}
application {
    mainClass = 'org.grails.forge.netty.Application'
}
tasks.named('run') {
    classpath += configurations.developmentOnly
}
graalvmNative.toolchainDetection = false
graalvmNative {
    // Pin to GraalVM Reachability Metadata Repository 0.3.35 (released 2026-03-06).
    // The version bundled by Micronaut Gradle Application Plugin 4.6.2 selects the
    // ch.qos.logback:logback-classic 1.4.9 metadata for our 1.5.17 runtime, whose
    // --initialize-at-build-time=ch.qos.logback directive collides with the
    // additional classes introduced in logback 1.5.x and produces "* the class
    // was requested to be initialized at run time ... got initialized during
    // image building" failures during dockerBuildNative.
    //
    // GRM 0.3.35 ships a 1.5.7 metadata directory for ch.qos.logback:logback-classic
    // that covers 1.5.7-1.5.29 and contains only reachability-metadata.json (no
    // native-image.properties / no --initialize-at-build-time directive), so the
    // conflict goes away and reflection metadata is still provided. GRM 1.x
    // releases use a new repository layout that is incompatible with the
    // GraalVMReachabilityMetadataService bundled with this plugin, so we stay
    // on the last 0.x release that contains the updated logback metadata.
    metadataRepository {
        version = '0.3.35'
    }
}
micronaut {
    runtime('netty')
    testRuntime('junit5')
    processing {
        incremental(true)
        annotations('org.grails.forge.*')
    }
}
tasks.named('dockerfileNative') {
    // https://www.graalvm.org/latest/docs/getting-started/container-images/
    // The GraalVM Native Image Community image bundles the `native-image` tool and matches the
    // Java 21 baseline used to compile the Forge modules. The previous Java 17 image caused
    // dockerBuildNative to fail with `UnsupportedClassVersionError` (class file version 65.0).
    // Pin to a specific patch + OS so dockerBuildNative is reproducible (21.0.2 is the final
    // GraalVM Community release for JDK 21; later GraalVM Community releases target JDK 22+).
    //
    // NOTE: On Micronaut Gradle Plugin 3.7.10, `baseImage(...)` only controls the final runtime
    // stage of the generated Dockerfile. The builder stage (`FROM ... AS graalvm`), which is
    // where `native-image` actually runs against our Java 21 bytecode, is controlled by the
    // separate `graalImage` property. Its default is derived from `jdkVersion`, which the
    // plugin silently clamps to Java 17 (see NativeImageDockerfile.SUPPORTED_JAVA_VERSIONS =
    // [17, 11]). Without the explicit `graalImage` override below the builder would still use
    // `ghcr.io/graalvm/native-image:ol7-java17-22.3.2` and fail with class file version 65.0.
    def nativeImageContainer = 'ghcr.io/graalvm/native-image-community:21.0.2-ol9'
    graalImage = nativeImageContainer
    baseImage(nativeImageContainer)
}

tasks.named('dockerBuildNative') {
    images = [findProperty('dockerImageName') ?: 'grailsforge']
}

tasks.named('dockerBuild') {
    images = [findProperty('dockerImageName') ?: 'grailsforge']
}

apply from: rootProject.layout.projectDirectory.file('gradle/code-style-config.gradle')
