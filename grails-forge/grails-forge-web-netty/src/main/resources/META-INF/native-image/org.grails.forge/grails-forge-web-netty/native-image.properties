# https://www.graalvm.org/latest/docs/reference-manual/native-image/optimizations-and-performance/ClassInitialization/
#
# The Micronaut Gradle Application Plugin 4.6.2 transitively pulls the
# GraalVM Reachability Metadata Repository entry for ch.qos.logback at
# metadata-version 1.4.9, whose --initialize-at-build-time directive does
# not match the additional classes introduced in logback 1.5.x. With the
# logback-classic 1.5.17 and slf4j 2.0.17 versions used by Forge, the
# bundled metadata causes dockerBuildNative to fail with
# "ch.qos.logback.* / org.slf4j.LoggerFactory was unintentionally
# initialized at build time" errors during native-image analysis.
#
# Override the bundled build-time initialization for the affected
# packages so logback 1.5.x and slf4j 2.x classes initialize at run time,
# matching what oracle/graalvm-reachability-metadata#993 ships in its
# 1.5.7 metadata entry.
Args = -H:Name=grails-forge \
       -H:Class=org.grails.forge.netty.Application \
       --initialize-at-run-time=ch.qos.logback,org.slf4j
