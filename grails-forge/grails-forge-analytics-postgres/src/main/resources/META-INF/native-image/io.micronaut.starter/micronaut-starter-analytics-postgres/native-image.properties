# https://www.graalvm.org/latest/docs/reference-manual/native-image/optimizations-and-performance/ClassInitialization/
#
# Forcing org.postgresql.Driver to initialize at build time also caused
# java.sql.DriverManager.<clinit> to run at build time, conflicting with
# the runtime registration of DriverManager performed by Micronaut SQL
# and producing "java.sql.DriverManager was unintentionally initialized
# at build time" failures during dockerBuildNative.
#
# PostgreSQL 42.7.5 (and the rest of the 42.7.x line) is officially
# covered by the GraalVM Reachability Metadata Repository
# (oracle/graalvm-reachability-metadata, metadata-version 42.7.3, tested
# through 42.7.11), and Micronaut's micronaut-jdbc artefact already
# ships --add-modules=java.sql.rowset, so we no longer need to set any
# class-initialization flags for the postgres driver here - the default
# (run-time initialization) is correct.
#
# The Micronaut Gradle Application Plugin 4.6.2 transitively pulls the
# GraalVM Reachability Metadata Repository entry for ch.qos.logback at
# metadata-version 1.4.9, whose --initialize-at-build-time directive
# does not match the additional classes introduced in logback 1.5.x.
# Because this analytics service uses logback-classic 1.5.17 and slf4j
# 2.0.17 at runtime, override the bundled build-time initialization for
# those packages so they initialize at run time instead.
Args = --initialize-at-run-time=ch.qos.logback,org.slf4j
