plugins {
    id 'java-library'
    id 'org.grails.grails-plugin'
}

version = projectVersion
group = 'org.grails.plugins'

ext {
    apiDocs = true
    pomArtifactId = 'hibernate6'
    snapshotPublishUrl = 'https://repo.grails.org/grails/plugins3-snapshots-local'
}

dependencies {
    // TODO: Clarify and clean up dependencies
    implementation platform("org.grails:grails-bom:$grailsVersion")

    api "org.springframework.boot:spring-boot"
    api "org.springframework:spring-orm"
    api "org.hibernate.orm:hibernate-core:$hibernate6Version"
    api "org.hibernate:hibernate-jcache:$hibernate6Version"
    api "org.grails:grails-datastore-web"
    api "org.grails:grails-datastore-gorm-support"
    api project(":grails-datastore-gorm-hibernate6"), {
        exclude group:'org.springframework', module:'spring-context'
        exclude group:'org.springframework', module:'spring-core'
        exclude group:'org.springframework', module:'spring-beans'
        exclude group:'org.springframework', module:'spring-tx'
        exclude group:'org.grails', module:'grails-bootstrap'
        exclude group:'org.codehaus.groovy', module:'groovy-all'
        exclude group:'org.grails', module:'grails-core'
        exclude group:'javax.transaction', module:'jta'
    }

    compileOnly "org.grails:grails-bootstrap"
    compileOnly "org.grails:grails-core"

    compileOnly "org.spockframework:spock-core", {
        exclude group: "junit", module: "junit-dep"
        exclude group: 'org.codehaus.groovy', module: 'groovy-all'
        exclude group: 'org.hamcrest', module: 'hamcrest-core'
    }

    testImplementation "org.grails:grails-gorm-testing-support"
    testImplementation "org.spockframework:spock-core"

    testRuntimeOnly "com.h2database:h2"
    testRuntimeOnly "org.apache.tomcat:tomcat-jdbc"
    testRuntimeOnly "org.springframework:spring-aop"
    testRuntimeOnly "org.springframework:spring-expression"
    testRuntimeOnly "org.yaml:snakeyaml"
}

apply {
    from rootProject.layout.projectDirectory.file('gradle/java-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/test-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/publish-config.gradle')
}