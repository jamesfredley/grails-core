import io.github.gradlenexus.publishplugin.InitializeNexusStagingRepository
import io.github.gradlenexus.publishplugin.NexusPublishExtension

ext {
    grailsVersion = projectVersion
    isCiBuild = System.getenv().get('CI') as Boolean
    isGitHubRepoPublish = System.getenv('GITHUB_PUBLISH') == 'true'
    isGrailsRepoPublish = grailsVersion.endsWith('-SNAPSHOT') && !isGitHubRepoPublish
    isReleaseVersion = !isGrailsRepoPublish && !isGitHubRepoPublish

    // Directories created during the build which are related
    // to turning the workspace root into a GRAILS_HOME
    distInstallDir = layout.buildDirectory.dir('dist-tmp')
    homeDistDir = layout.projectDirectory.dir('dist')
    homeBinDir = layout.projectDirectory.dir('bin')
    homeConfDir = layout.projectDirectory.dir('conf')
    homeLibDir = layout.projectDirectory.dir('lib')
    homeSrcDir = layout.projectDirectory.dir('src')
}
ext.set('signing.keyId', System.getenv('SIGNING_KEY') ?: findProperty('signing.keyId'))
ext.set('signing.password', System.getenv('SIGNING_PASSPHRASE') ?: findProperty('signing.password'))
ext.set('signing.secretKeyRingFile', findProperty('signing.secretKeyRingFile'))

version = projectVersion
group = 'org.grails'

if (isReleaseVersion) {
    apply plugin: 'maven-publish'
    apply plugin: 'io.github.gradle-nexus.publish-plugin'
    extensions.configure(NexusPublishExtension) {
        repositories {
            sonatype {
                nexusUrl.set(uri('https://s01.oss.sonatype.org/service/local'))
                username.set(System.getenv('SONATYPE_USERNAME') ?: findProperty('sonatypeOssUsername') as String)
                password.set(System.getenv('SONATYPE_PASSWORD') ?: findProperty('sonatypeOssPassword') as String)
                stagingProfileId.set(System.getenv('SONATYPE_STAGING_PROFILE_ID') ?: findProperty('sonatypeOssStagingProfileId') as String)
            }
        }
    }
}

allprojects {
    if (name == 'grails-bom') return
    repositories {
        mavenCentral()
        maven { url = 'https://repo.grails.org/grails/core' }
        maven { url = 'https://oss.sonatype.org/content/repositories/snapshots' }
        // mavenLocal() // Keep, this will be uncommented and used by CI (groovy-joint-workflow)
    }

    configurations.configureEach {
        resolutionStrategy {
            def cacheHours = isCiBuild ? 0 : 24
            cacheDynamicVersionsFor(cacheHours, 'hours')
            cacheChangingModulesFor(cacheHours, 'hours')
            eachDependency { DependencyResolveDetails details ->
                if (details.requested.group == 'org.apache.groovy') {
                    details.useVersion(groovyVersion)
                }
                if (details.requested.group == 'org.spockframework') {
                    details.useVersion(findProperty('spock.version') as String)
                }
            }
        }
    }

    // This is added to prevent a remote cache misses, because the project JAR include a manifest
    // file with Built-By and Created-By properties which might be different for CI vs Local.
    normalization {
        runtimeClasspath {
            metaInf {
                ignoreAttribute('Built-By')
                ignoreAttribute('Created-By')
            }
        }
    }
    apply from: rootProject.layout.projectDirectory.file('gradle/dependency-licenses.gradle')
}

subprojects {

    def activeProject = it // Used for referencing the active project in closures
    def pluginsGroupProjects = [
            // These projects use the 'org.grails.plugins' group
            'grails-async-plugin',
            'grails-events-plugin',
            'grails-plugin-converters'
    ]
    def mappedArtifactIds = ext.mappedArtifactIds = [
            // Historically async mapped the core libraries to different artifact ids
            'grails-async-core'       : 'grails-async',
            'grails-async-plugin'     : 'async',
            'grails-events-core'      : 'grails-events',
            'grails-events-plugin'    : 'events',
            'grails-plugin-converters': 'converters'
    ]
    def pomDescription = name == 'grails-testing-support' ?
            'Support for writing concise expressive tests for Grails artifacts' :
            'Grails Web Application Framework'
    def pomDevelopers = name == 'grails-testing-support' ?
            [jeffscottbrown: 'Jeff Brown', jameskleeh: 'James Kleeh'] :
            [graemerocher: 'Graeme Rocher']


    ext.pomInfo = {
        delegate.name 'Grails® framework'
        delegate.description pomDescription
        delegate.url 'https://grails.org/'
        delegate.licenses {
            delegate.license {
                delegate.name 'The Apache Software License, Version 2.0'
                delegate.url 'https://www.apache.org/licenses/LICENSE-2.0.txt'
                delegate.distribution 'repo'
            }
        }
        delegate.scm {
            delegate.url 'scm:git@github.com:grails/grails-core.git'
            delegate.connection 'scm:git@github.com:grails/grails-core.git'
            delegate.developerConnection 'scm:git@github.com:grails/grails-core.git'
        }
        delegate.developers {
            for(def dev in pomDevelopers) {
                delegate.developer {
                    delegate.id dev.key
                    delegate.name dev.value
                }
            }
        }
    }

    if (!isTestSuite) {
        apply plugin: 'maven-publish'
        apply plugin: 'signing'
        extensions.configure(PublishingExtension) {
            if (isGrailsRepoPublish || isGitHubRepoPublish) {
                repositories {
                    maven {
                        credentials {
                            if (isGrailsRepoPublish) {
                                username = findProperty('artifactoryPublishUsername') ?: System.getenv('ARTIFACTORY_USERNAME')
                                password = findProperty('artifactoryPublishPassword') ?: System.getenv('ARTIFACTORY_PASSWORD')
                            } else {
                                username = System.getenv('GITHUB_USERNAME')
                                password = System.getenv('GITHUB_PASSWORD')
                            }
                        }
                        if (isGrailsRepoPublish) {
                            url = isPluginsGroupProject ?
                                    'https://repo.grails.org/grails/plugins3-snapshots-local' :
                                    'https://repo.grails.org/grails/libs-snapshots-local'
                        } else {
                            url = 'https://maven.pkg.github.com/grails/grails-core'
                        }
                    }
                }
            }

            if (name == 'grails-dependencies') return

            def javaComponent = name != 'grails-bom' ? components.named('java') : null
            it.publications {
                register('maven', MavenPublication) {
                    artifactId = mappedArtifactIds[activeProject.name] ?: activeProject.name
                    pom.withXml {
                        def pomNode = asNode()
                        pomNode.children().last() + pomInfo
                        // dependency management shouldn't be included
                        try { pomNode.dependencyManagement.replaceNode({}) } catch (Throwable ignore) {}
                    }
                    if (javaComponent) {
                        from javaComponent.get()
                    }
                }
            }
        }

        afterEvaluate {
            extensions.configure(SigningExtension) {
                it.required = { (isReleaseVersion || isGitHubRepoPublish) && gradle.taskGraph.hasTask('publish') }
                it.sign(extensions.findByType(PublishingExtension).publications)
            }
        }

        tasks.withType(Sign).configureEach {
            onlyIf { isReleaseVersion || isGitHubRepoPublish }
        }

        // do not generate extra load on Nexus with new staging repository if signing fails
        if (isReleaseVersion) {
            tasks.withType(InitializeNexusStagingRepository).configureEach {
                shouldRunAfter(tasks.withType(Sign))
            }
        }
    }

}

tasks.register('clean', Delete) {
    group = 'build'
    delete layout.buildDirectory, homeBinDir, homeConfDir, homeDistDir, homeLibDir, homeSrcDir
}

apply {
    from layout.projectDirectory.file('gradle/docs-root-config.gradle')
    from layout.projectDirectory.file('gradle/assemble.gradle')
}

// compile with the Groovy version provided by Gradle
// to ensure build compatibility with Gradle, currently Groovy 3.0.x
// when used by grails-gradle-plugin
// see: https://docs.gradle.org/current/userguide/compatibility.html#groovy
static boolean compiledByGradleGroovyVersion(Project currentProject) {
    currentProject.name in ['grails-bootstrap', 'grails-gradle-model', 'grails-shell']
    from layout.projectDirectory.file('gradle/assemble-root-config.gradle')
}