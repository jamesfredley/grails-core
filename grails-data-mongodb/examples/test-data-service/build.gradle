version = projectVersion
group = 'examples'

apply plugin: 'groovy'
apply plugin: 'org.apache.grails.gradle.grails-web'

dependencies {

    implementation platform("org.apache.grails:grails-bom:$grailsVersion")

    implementation project(':mongodb-grails-plugin')

    implementation 'org.apache.grails:grails-core', {
        exclude group: 'org.grails', module: 'grails-datastore-core' // TODO: Remove after gorm published & core updated
    }
    implementation 'org.apache.grails:grails-rest-transforms', {
        exclude group: 'org.grails', module: 'grails-datastore-core'  // TODO: Remove when views published
        exclude group: 'org.grails', module: 'grails-datastore-gorm'  // TODO: Remove when views published
        exclude group: 'org.grails', module: 'grails-datastore-gorm-support'  // TODO: Remove when views published
        exclude group: 'org.grails', module: 'grails-datastore-gorm-validation'  // TODO: Remove when views published
    }
    implementation 'org.apache.grails:grails-services'
    implementation 'org.apache.grails.web:grails-web-boot'
    implementation "org.grails.plugins:spring-security-core:$grailsSpringSecurityVersion", {
        exclude group: 'org.grails.plugins', module: 'async' // TODO: remove when spring security is updated
        exclude group: 'org.grails', module: 'grails-web-common' // TODO: remove when spring security is updated
        exclude group: 'org.grails', module: 'grails-web-url-mappings' // TODO: remove when spring security is updated
        exclude group: 'org.grails', module: 'grails-events-transform' // TODO: remove when spring security is updated
        exclude group: 'org.grails', module: 'grails-plugin-mimetypes' // TODO: remove when spring security is updated
    }
    implementation 'org.apache.grails.events:grails-events-transforms' // TODO: Remove when spring security is updated
    implementation 'org.apache.grails:grails-async' // TODO: Remove when spring security is updated
    implementation 'org.apache.grails.web:grails-web-common' // TODO: Remove when spring security is updated
    implementation 'org.apache.grails:grails-mimetypes', { // TODO: Remove when views published
        exclude group: 'org.grails', module: 'grails-datastore-core'  // TODO: Remove when views published
        exclude group: 'org.grails', module: 'grails-datastore-gorm'  // TODO: Remove when views published
        exclude group: 'org.grails', module: 'grails-datastore-gorm-support'  // TODO: Remove when views published
        exclude group: 'org.grails', module: 'grails-datastore-gorm-validation'  // TODO: Remove when views published
    }
    implementation 'org.apache.grails.web:grails-web-url-mappings', { // TODO: Remove spring security is published published
        exclude group: 'org.grails', module: 'grails-datastore-core'  // TODO: Remove when gorm published
        exclude group: 'org.grails', module: 'grails-datastore-gorm'  // TODO: Remove when gorm published
        exclude group: 'org.grails', module: 'grails-datastore-gorm-support'  // TODO: Remove when gorm published
        exclude group: 'org.grails', module: 'grails-datastore-gorm-validation'  // TODO: Remove when gorm published
    }

    implementation "org.grails.plugins:spring-security-rest:$grailsSpringSecurityVersion", {
        exclude group: 'org.grails.plugins', module: 'async' // TODO: remove when spring security is updated
        exclude group: 'org.grails', module: 'grails-web-common' // TODO: remove when spring security is updated
        exclude group: 'org.grails', module: 'grails-web-url-mappings' // TODO: remove when spring security is updated
        exclude group: 'org.grails', module: 'grails-events-transform' // TODO: remove when spring security is updated
        exclude group: 'org.grails', module: 'grails-plugin-mimetypes' // TODO: remove when spring security is updated
    }
    implementation 'org.grails.plugins:views-json', {
        exclude group: 'org.grails', module: 'grails-datastore-core'  // TODO: Remove when views published
        exclude group: 'org.grails', module: 'grails-plugin-rest' // TODO: remove when views published
        exclude group: 'org.grails', module: 'grails-plugin-mimetypes' // TODO: remove when views published
        exclude group: 'org.grails', module: 'grails-web-url-mappings' // TODO: remove when views published
    }
    implementation 'org.apache.grails:grails-rest-transforms', { // TODO: Remove when views published
        exclude group: 'org.grails', module: 'grails-datastore-core'  // TODO: Remove when views published
        exclude group: 'org.grails', module: 'grails-datastore-gorm'  // TODO: Remove when views published
        exclude group: 'org.grails', module: 'grails-datastore-gorm-support'  // TODO: Remove when views published
        exclude group: 'org.grails', module: 'grails-datastore-gorm-validation'  // TODO: Remove when views published
    }

    runtimeOnly 'org.apache.grails:grails-i18n'
    runtimeOnly 'org.apache.grails:grails-url-mappings'
    runtimeOnly 'org.apache.grails:grails-events'
    runtimeOnly 'org.springframework.boot:spring-boot-autoconfigure'
    runtimeOnly 'org.springframework.boot:spring-boot-starter-logging'
    runtimeOnly 'org.springframework.boot:spring-boot-starter-tomcat'

    integrationTestImplementation project(':grails-testing-support-datamapping')
    integrationTestImplementation 'org.spockframework:spock-core'
}

apply from: rootProject.layout.projectDirectory.file('gradle/java-config.gradle')
apply from: rootProject.layout.projectDirectory.file('gradle/mongodb-test-config.gradle')
