plugins {
    id 'groovy'
    id 'java-library'
}

version = projectVersion
group = 'org.apache.grails'

ext {
    pomTitle = 'Grails MongoDB JSON Views'
    pomDescription = 'Provides JSON Views for MongoDB to the Grails framework.'
    pomDevelopers = ['puneetbehl': 'Puneet Behl']
}

dependencies {

    implementation(platform(project(':grails-bom')))

    api project(':grails-views-gson')

    implementation project(':grails-data-mongodb-core')
    implementation project(':grails-data-mongodb-bson')

    compileOnly 'org.slf4j:slf4j-nop' // Get rid of warning about missing slf4j implementation during compileGsonViews task
}

def templateSourceDir = layout.projectDirectory.dir('src/templates')
def compilationOutputDir = layout.buildDirectory.dir('classes/groovy/main')
sourceSets {
    main {
        groovy {
            // Add templates as source dir
            srcDirs = [templateSourceDir]
        }
    }
}

tasks.register('compileViews', JavaExec).configure {JavaExec it ->
    it.inputs.dir(templateSourceDir)
    it.outputs.dir(compilationOutputDir)
    it.mainClass = 'grails.plugin.json.view.JsonViewCompiler'
    it.classpath = configurations.compileClasspath
    it.args(templateSourceDir.asFile, compilationOutputDir.get().asFile, '17', ' ', ' ', 'none', 'UTF-8')
}

// This is needed to trigger compilation of the views
tasks.named('classes').configure {
    it.dependsOn 'compileViews'
}

apply {
    from rootProject.layout.projectDirectory.file('gradle/java-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/mongodb-test-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/publish-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/docs-config.gradle')
}
