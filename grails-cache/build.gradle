plugins {
    id 'groovy'
    id 'java-library'
    id 'project-report'
}

version = projectVersion
group = 'org.apache.grails'

apply plugin: 'org.apache.grails.gradle.grails-plugin'

ext {
    pomTitle = 'Grails Cache Plugin'
    pomDescription = 'Provides AST transformations for caching method calls'
    pomDevelopers = [jeffbrown: 'Jeff Scott Brown', 'puneetbehl': 'Puneet Behl']
}

dependencies {
    implementation platform(project(':grails-bom'))

    api project(':grails-core')
    api project(':grails-web-boot')
    api project(':grails-services')

    api project(':grails-gsp')
    api "org.codehaus.gpars:gpars:$gparsVersion"
    api "com.googlecode.concurrentlinkedhashmap:concurrentlinkedhashmap-lru:$concurrentlinkedhashmapLruVersion"

    compileOnly project(':grails-domain-class')

    console project(':grails-console')

    testImplementation project(':grails-testing-support-datamapping')
    testImplementation project(':grails-testing-support-web')
    testImplementation 'org.spockframework:spock-core', {
        exclude group: 'org.apache.groovy'
    }
    testImplementation 'org.mockito:mockito-core' // to allow for correct mocking with Mock()
}

apply {
    // java-configuration must be applied first since tasks are now lazy registered
    from rootProject.layout.projectDirectory.file('gradle/java-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/assemble-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/docs-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/publish-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/test-config.gradle')
}
