plugins {
    id 'groovy'
    id 'java-library'
    id 'project-report'
}

version = projectVersion
group = 'org.apache.grails.testing'

dependencies {
    implementation platform(project(':grails-bom'))
    testImplementation platform(project(':grails-bom'))
    testImplementation project(':grails-codecs')

    testImplementation project(':grails-test-suite-base'),
                project(':grails-domain-class'),
                project(':grails-datasource'),
                project(':grails-i18n'),
                project(':grails-url-mappings'),
                project(':grails-databinding'),
                project(':grails-services'),
                project(':grails-controllers'),
                project(':grails-bootstrap'),
                project(':grails-spring')

    testImplementation 'org.apache.grails.data:grails-datamapping-validation'
    testImplementation 'org.apache.grails.data:grails-data-hibernate5-core'

    api 'org.apache.tomcat:tomcat-jdbc'
    api 'org.apache.groovy:groovy'

    testRuntimeOnly 'com.h2database:h2'

    //    // Required for AspectJ support
    testRuntimeOnly 'org.springframework:spring-aspects'
    testRuntimeOnly 'org.aspectj:aspectjrt', 'org.aspectj:aspectjweaver'

    testImplementation project(':grails-async-plugin')
    testImplementation 'org.apache.grails:grails-testing-support-datamapping', {
        exclude module:'grails-testing-support-core'
    }
    testImplementation project(':grails-testing-support-core')

    compileOnly 'jakarta.servlet:jakarta.servlet-api'
    compileOnly 'org.springframework:spring-test', {
        // MockHttpServletRequest/Response/Context used in many classes
    }

    testImplementation 'com.h2database:h2'
    testImplementation 'jakarta.servlet:jakarta.servlet-api'
    testImplementation 'org.springframework:spring-test'

    testImplementation 'org.apache.groovy:groovy-test-junit5'
    testImplementation 'org.junit.jupiter:junit-jupiter-api'
    testImplementation 'org.junit.platform:junit-platform-runner'

    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine'

    // Logging
    api 'org.slf4j:slf4j-api'
    api 'org.slf4j:jcl-over-slf4j'

    // Testing
    testImplementation 'org.slf4j:slf4j-simple'
    testImplementation('org.spockframework:spock-core') { transitive = false }
    // Required by Spock's Mocking
    testRuntimeOnly 'net.bytebuddy:byte-buddy'
    testImplementation 'org.objenesis:objenesis'
}

test {
    maxParallelForks = 2
    forkEvery = isCiBuild ? 25 : 100
    if(!isCiBuild) {
        maxHeapSize = '2048m'
    }
    excludes = ['**/GrailsDomainBinderTests.class',
                '**/ComponentValidationTests.class',
                '**/HibernateMappingUniqueConstraintTests.class']
}

task testGrailsDomainBinder(type: Test) { includes = [
        '**/GrailsDomainBinderTests.class'
    ] }


task testIsolatedPersistentOne(type: Test) {
    includes = ['**/ComponentValidationTests.class']
    includes = ['**/HibernateMappingUniqueConstraintTests.class']
}

test.dependsOn testGrailsDomainBinder, testIsolatedPersistentOne

apply {
    // java-configuration must be applied first since tasks are now lazy registered
    from rootProject.layout.projectDirectory.file('gradle/java-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/test-config.gradle')
}