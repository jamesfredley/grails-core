pluginManagement {
    repositories {
        if (System.getenv('GRAILS_INCLUDE_MAVEN_LOCAL')) {
            mavenLocal()
        }
        mavenCentral()
        gradlePluginPortal()
        maven {
            url = 'https://repository.apache.org/content/groups/snapshots'
            content {
                includeVersionByRegex('org[.]apache[.]grails[.]gradle.*', '.*', '.*-SNAPSHOT')
            }
            mavenContent {
                snapshotsOnly()
            }
        }
        maven {
            url = 'https://central.sonatype.com/repository/maven-snapshots'
            content {
                includeVersionByRegex('cloud[.]wondrify.*', '.*', '.*-SNAPSHOT')
            }
            mavenContent {
                snapshotsOnly()
            }
        }
        maven {
            url = 'https://repository.apache.org/content/groups/staging'
            content {
                includeModuleByRegex('org[.]apache[.]grails[.]gradle', 'grails-publish')
                includeModuleByRegex('org[.]apache[.]groovy', 'groovy.*')
            }
            mavenContent {
                releasesOnly()
            }
        }
    }
}

plugins {
	id 'com.gradle.develocity' version '4.1.1'
	id 'com.gradle.common-custom-user-data-gradle-plugin' version '2.3'
}

def isCI = System.getenv().containsKey('CI')
def isLocal = !isCI
def isReproducibleBuild = System.getenv('SOURCE_DATE_EPOCH') != null
if (isReproducibleBuild) {
    gradle.settingsEvaluated {
        logger.warn('*************** Remote Build Cache Disabled due to Reproducible Build ********************')
        logger.warn("Build date will be set to (SOURCE_DATE_EPOCH=${System.getenv("SOURCE_DATE_EPOCH")})")
    }
}

develocity {
	server = 'https://ge.grails.org'
	buildScan {
		publishing.onlyIf { it.authenticated }
		uploadInBackground = isLocal
	}
}

buildCache {
    local { enabled = (isLocal && !isReproducibleBuild) || (isCI && isReproducibleBuild) }
    remote(develocity.buildCache) {
        push = isCI
        enabled = !isReproducibleBuild
    }
}

dependencyResolutionManagement {
    repositories {
        if (System.getenv('GRAILS_INCLUDE_MAVEN_LOCAL')) {
            mavenLocal()
        }
        mavenCentral()
        gradlePluginPortal()
        // publish plugin
        maven {
            url = 'https://repository.apache.org/content/groups/snapshots'
            content {
                includeVersionByRegex('org[.]apache[.]grails[.]gradle.*', '.*', '.*-SNAPSHOT')
            }
            mavenContent {
                snapshotsOnly()
            }
        }
        maven {
            url = 'https://repository.apache.org/content/groups/staging'
            content {
                includeModuleByRegex('org[.]apache[.]grails[.]gradle', 'grails-publish')
            }
            mavenContent {
                releasesOnly()
            }
        }
    }
}

rootProject.name = 'build-logic-root'

include 'build-logic'
project(':build-logic').projectDir = file('plugins')

include 'grails-docs-core'
project(':grails-docs-core').projectDir = file('docs-core')
