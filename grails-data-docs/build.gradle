import org.codehaus.groovy.groovydoc.GroovyDoc

apply plugin: 'groovy'

configurations.register('documentation')

dependencies {
    documentation platform("org.apache.grails:grails-bom:$projectVersion")
    documentation 'org.apache.groovy:groovy-groovydoc'
    documentation 'org.apache.groovy:groovy-ant'
}

tasks.register('cleanDocs', Delete).configure {Delete it ->
    it.group = 'documentation'
    it.delete(rootProject.layout.buildDirectory.dir('grails-data-docs'))
}

// grails-data-mapping api
tasks.register('data-mapping-groovydoc', Groovydoc).configure { Groovydoc task ->
    task.group = 'documentation'
    task.description = 'Copies Groovy API Documentation for all supporting projects'
    Set<Project> docProjects = rootProject.subprojects.findAll {
        it.name in [
                'grails-datastore-async',
                'grails-datastore-core',
                'grails-datamapping-core',
                'grails-datamapping-async',
                'grails-datamapping-support',
                'grails-datamapping-validation',
                'grails-datastore-web',

                // These are test api docs that aren't typically included in the runtime classpath of applications.
                // for now include them in the groovy doc unless we want to call out that documentation separately later.
                'grails-datamapping-core-test',
                'grails-testing-support-datamapping'
        ]
    }

    for (Project docProject : docProjects) {
        docProject.sourceSets.main.allSource.srcDirs.each { File srcDir -> if(srcDir.exists()) task.inputs.dir(srcDir) }
    }

    task.docTitle = "Grails Data Mapping API - ${projectVersion}"
    task.source = docProjects.collect { it.sourceSets.main.allSource }.flatten()
    task.classpath = files(configurations.documentation + docProjects.configurations.compileClasspath)

    task.access = GroovydocAccess.PROTECTED
    task.includeAuthor = true
    task.includeMainForScripts = false
    task.processScripts = false
    task.destinationDir = project.layout.buildDirectory.dir('docs/api').get().asFile

    task.dependsOn([':cleanDocs'] + docProjects.collect { "$it.name:classes" })

    task.outputs.dir(project.layout.buildDirectory.dir('docs/api').get().asFile)
    task.doLast {
        delete(rootProject.layout.buildDirectory.dir('tmp'))
    }
}

tasks.register('copyMongodbDocs', Copy).configure { Copy it ->
    it.dependsOn(':grails-data-mongodb-docs:docs')

    def mongodbSourceDir =  project(':grails-data-mongodb-docs').layout.buildDirectory.dir('docs')
    def targetDir = rootProject.layout.buildDirectory.dir('grails-data-docs/mongodb')

    it.from(mongodbSourceDir)
    it.into(targetDir)

    it.inputs.dir(mongodbSourceDir)
    it.outputs.dir(targetDir)
}

tasks.register('copyHibernate5Docs', Copy).configure {Copy it ->
    it.dependsOn(':grails-data-hibernate5-docs:docs')

    def hibernate5SourceDir =  project('::grails-data-hibernate5-docs').layout.buildDirectory.dir('docs')
    def targetDir = rootProject.layout.buildDirectory.dir('grails-data-docs/hibernate5')

    it.from(hibernate5SourceDir)
    it.into(targetDir)

    it.inputs.dir(hibernate5SourceDir)
    it.outputs.dir(targetDir)
}

tasks.register('grails-data-docs').configure { Task it ->
    it.group = 'documentation'
    it.dependsOn(':data-mapping-groovydoc')
    it.finalizedBy('copyRootWebsite','copyGuides', 'copyMongodbDocs', 'copyHibernate5Docs')
}

tasks.register('copyRootWebsite', Copy).configure { Copy it ->
    it.group = 'documentation'
    it.from rootProject.layout.projectDirectory.dir('grails-data-docs/data-mapping-website/src/main/resources')
    it.into rootProject.layout.buildDirectory.dir('grails-data-docs')
}

tasks.register('copyGuides', Copy).configure {Copy it ->
    it.group = 'documentation'

    for (Project subproject : subprojects.findAll { it.name.startsWith('grails-data-docs-guide-') }) {
        it.dependsOn(subproject.tasks.named('asciidoctor'))
        def guideDirectory = subproject.layout.buildDirectory.dir('docs')
        it.from(guideDirectory) { CopySpec fromSpec ->
            fromSpec.includeEmptyDirs = false
            fromSpec.into ("${subproject.name.substring('grails-data-docs-guide-'.length())}/manual")
        }
    }
    it.into rootProject.layout.buildDirectory.dir('grails-data-docs')
}
