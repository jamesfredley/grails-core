import org.apache.tools.ant.filters.ReplaceTokens

plugins {
    id 'groovy'
    id 'java-library'
    id 'project-report'
}

version = projectVersion
group = 'org.apache.grails.bootstrap'

dependencies {
    implementation platform(project(':grails-bom'))

    implementation 'org.springframework:spring-context'
    implementation 'org.springframework.boot:spring-boot-autoconfigure'

    api 'org.apache.grails.gradle:grails-gradle-model', {
        exclude group: 'org.codehaus.groovy'
    }

    compileOnly 'org.apache.groovy:groovy'
    compileOnly 'org.apache.groovy:groovy-templates'
    compileOnly 'org.apache.groovy:groovy-xml'
    compileOnly 'org.apache.groovy:groovy-ant'

    compileOnly 'io.methvin:directory-watcher'
    compileOnly 'org.fusesource.jansi:jansi'
    compileOnly 'jline:jline'
    compileOnly 'net.java.dev.jna:jna'

    api 'org.yaml:snakeyaml'

    testImplementation 'org.apache.groovy:groovy-xml'
    testImplementation 'org.apache.groovy:groovy-templates'
    testImplementation 'org.fusesource.jansi:jansi'
    testImplementation 'jline:jline'

    testImplementation 'org.apache.groovy:groovy-test-junit5'
    testImplementation 'org.junit.jupiter:junit-jupiter-api'
    testImplementation 'org.junit.platform:junit-platform-runner'

    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine'

    // Logging
    api 'org.slf4j:slf4j-api'
    api 'org.slf4j:jcl-over-slf4j'

    // Testing
    testImplementation 'org.slf4j:slf4j-simple'
    testImplementation('org.spockframework:spock-core') { transitive = false }
    // Required by Spock's Mocking
    testRuntimeOnly 'net.bytebuddy:byte-buddy'
    testImplementation 'org.objenesis:objenesis'
}

processResources {
    inputs.property 'version', version
    filter(ReplaceTokens, tokens: [version: version])
}

apply {
    // java-configuration must be applied first since tasks are now lazy registered
    from rootProject.layout.projectDirectory.file('gradle/java-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/docs-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/publish-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/test-config.gradle')
}