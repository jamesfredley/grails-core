plugins {
    id 'groovy-gradle-plugin'
}

file('../gradle.properties').withInputStream {
    Properties props = new Properties()
    props.load(it)
    project.ext.gradleProperties = props
}

repositories {
    // mavenLocal()
    mavenCentral()
    maven { url = 'https://repo.grails.org/grails/core' }
    maven { url = 'https://repository.apache.org/content/repositories/snapshots' }
}

dependencies {
    implementation "gradle.plugin.com.hierynomus.gradle.plugins:license-gradle-plugin:$gradleProperties.gradleLicensePluginVersion", {
        // Due to https://github.com/hierynomus/license-gradle-plugin/issues/161, spring must be excluded
        exclude group: 'org.springframework', module: 'spring-core'
    }
    implementation "io.github.gradle-nexus:publish-plugin:$gradleProperties.gradleNexusPublishPluginVersion"
    implementation "org.apache.grails:grails-gradle-plugins:${gradleProperties['grails-gradle-plugins.version']}"
}