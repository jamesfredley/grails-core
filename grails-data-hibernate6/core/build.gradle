plugins {
    id 'groovy'
    id 'java-library'
}

version = projectVersion
group = 'org.apache.grails.data'

ext {
    gormApiDocs = true
    pomTitle = 'Grails GORM'
    pomDescription = 'GORM - Grails Data Access Framework'
    pomDevelopers = [
            'graemerocher'  : 'Graeme Rocher',
            'jeffscottbrown': 'Jeff Brown',
            'burtbeckwith'  : 'Burt Beckwith',
            'puneetbehl'    : 'Puneet Behl',
            'borinquenkid'  : 'Walter Duque de Estrada'
    ]
}

dependencies {
    // TODO: Clarify and clean up dependencies
    implementation platform(project(':grails-bom'))

    api 'org.slf4j:slf4j-api'

    api 'org.apache.groovy:groovy'
    api project(':grails-datamapping-core')
    api 'org.springframework:spring-orm'
    api 'org.hibernate.orm:hibernate-core', { // 6.6.13.Final vs 6.6.4.Final originally
        exclude group:'commons-logging', module:'commons-logging'
        exclude group:'com.h2database', module:'h2'
        exclude group:'commons-collections', module:'commons-collections'
        exclude group:'org.slf4j', module:'jcl-over-slf4j'
        exclude group:'org.slf4j', module:'slf4j-api'
        exclude group:'org.slf4j', module:'slf4j-log4j12'
        exclude group:'xml-apis', module:'xml-apis'
    }
    api 'org.hibernate.validator:hibernate-validator', {
        exclude group:'commons-logging', module:'commons-logging'
        exclude group:'commons-collections', module:'commons-collections'
        exclude group:'org.slf4j', module:'slf4j-api'
    }
    api ('org.checkerframework:checker-qual:3.48.4')

   api( 'org.jboss:jandex:3.2.3')

    compileOnly 'org.hibernate.orm:hibernate-jcache', {
        exclude group:'commons-collections', module:'commons-collections'
        exclude group:'commons-logging', module:'commons-logging'
        exclude group:'com.h2database', module:'h2'
        exclude group:'net.sf.ehcache', module:'ehcache'
        exclude group:'net.sf.ehcache', module:'ehcache-core'
        exclude group:'org.hibernate', module:'hibernate-core'
        exclude group:'org.slf4j', module:'jcl-over-slf4j'
        exclude group:'org.slf4j', module:'slf4j-api'
        exclude group:'org.slf4j', module:'slf4j-log4j12'
        exclude group:'xml-apis', module:'xml-apis'
    }

    testImplementation 'org.postgresql:postgresql:42.7.5'
    testImplementation 'org.testcontainers:postgresql'
    testImplementation 'org.testcontainers:spock'
    testImplementation 'org.jsr107.ri:cache-ri-impl:1.1.1'

    testImplementation 'com.h2database:h2'
    testImplementation 'org.junit.platform:junit-platform-suite', {
        // api: SelectClasses, Suite
    }

    testImplementation 'org.apache.groovy:groovy-test-junit5'
    testImplementation 'org.apache.groovy:groovy-sql'
    testImplementation 'org.apache.groovy:groovy-json'
    testImplementation 'org.hibernate.orm:hibernate-jcache'
    testImplementation 'org.spockframework:spock-core'

    // groovy proxy fixes bytebuddy to be a bit smarter when it comes to groovy metaClass
    testImplementation "org.yakworks:hibernate-groovy-proxy:$yakworksHibernateGroovyProxyVersion", {
        exclude group: 'org.codehaus.groovy', module: 'groovy'
    }

    testImplementation 'org.apache.tomcat:tomcat-jdbc'
    testImplementation 'org.spockframework:spock-core'

    testRuntimeOnly 'org.slf4j:slf4j-simple'
    testRuntimeOnly 'org.slf4j:jcl-over-slf4j'
    testRuntimeOnly 'org.springframework:spring-aop'
}


apply {
    from rootProject.layout.projectDirectory.file('gradle/java-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/hibernate6-test-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/publish-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/grails-data-tck-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/docs-config.gradle')
}
