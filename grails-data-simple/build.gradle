plugins {
    id 'groovy'
    id 'java-library'
}

version = projectVersion
group = 'org.apache.grails.data'

ext {
    pomTitle = 'Grails GORM'
    pomDescription = 'GORM - Grails Data Access Framework'
    pomDevelopers = [
            'graemerocher': 'Graeme Rocher',
            'jeffscottbrown': 'Jeff Brown',
            'burtbeckwith': 'Burt Beckwith',
            'jameskleeh': 'James Kleeh',
            'puneetbehl': 'Puneet Behl',
            'jamesfredley': 'James Fredley'
    ]
}

dependencies {

    implementation platform(project(':grails-bom'))

    api project(':grails-datastore-core'), {
        // api: AbstractDatastore, AbstractKeyValueEntityPersister, AbstractSession, AssociationIndexer,
        //      ConfigurationException, ConnectionSourceSettings, ConnectionSources, ConnectionSourcesProvider,
        //      Datastore, EntityAccess, IdentityGenerationException, InMemoryConnectionSources, KeyValueMappingContext,
        //      MappingContext, MultipleConnectionSourceCapableDatastore, MultiTenancySettings,
        //      OptimisticLockingException, Persister, Property, PropertyValueIndexer, SchemaMultiTenantCapableDatastore,
        //      Session, TenantResolver, Transaction, TransactionCapableDatastore
        // impl: DatastoreTransactionManager, DatastoreUtils, EntityPersister, PersistentEntity, Settings
        if (excludeUnusedTransDeps) {
            // API dependencies in grails-datastore-core
            //exclude group: 'jakarta.persistence', module: 'jakarta.persistence-api' // JoinType
            //exclude group: 'org.javassist', module: 'javassist' // activate JavassistProxyFactory
            exclude group: 'org.springframework', module: 'spring-context'
            exclude group: 'org.springframework', module: 'spring-core'
            exclude group: 'org.springframework', module: 'spring-tx'
        }
    }
    api project(':grails-datamapping-core'), {
        // api: ConfigurableApplicationEventPublisher, GormEnhancer, GormInstanceApi, GormStaticApi, GormValidationApi
        // impl: MultiTenantEventListener, ClasspathEntityScanner
        if (excludeUnusedTransDeps) {
            // API dependencies in grails-datamapping-core
            //exclude group: 'jakarta.annotation', module: 'jakarta.annotation-api' // PostConstruct
            exclude group: 'jakarta.persistence', module: 'jakarta.persistence-api'
            exclude group: 'org.apache.grails.data', module: 'grails-datastore-core'
            exclude group: 'org.apache.grails.data', module: 'grails-datamapping-validation'
            exclude group: 'org.springframework', module: 'spring-context'
            exclude group: 'org.springframework', module: 'spring-jdbc'
            exclude group: 'org.springframework', module: 'spring-tx'
        }
    }
    api 'org.springframework:spring-context', {
        // api: ApplicationEventPublisher, ConfigurableApplicationContext
    }
    api 'org.springframework:spring-core', {
        // api: PropertyResolver
    }
    api 'org.springframework:spring-tx', {
        // api: PlatformTransactionManager
    }

    // RemovalListener (caffeine)
    implementation "com.github.ben-manes.caffeine:caffeine"

    compileOnly 'org.apache.groovy:groovy', {
        // comp: CompileStatic
    }
}

apply {
    from rootProject.layout.projectDirectory.file('gradle/java-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/publish-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/test-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/docs-config.gradle')
}
