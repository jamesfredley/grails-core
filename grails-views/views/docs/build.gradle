ext {
    guideTitle = 'Grails Views'
    guideSubtitle = 'Grails Views - Additional View Technologies for Grails'

    apiDocsProjects = [
            'views-core',
            'views-json',
            'grails-testing-support-views-gson',
            'views-markup'
    ]
    apiDocTitle = "Grails Views API - ${projectVersion}"
    apiWindowTitle = "Grails Views API - ${projectVersion}"

    asciidoctorAttributes = [
            copyright           : 'Apache License, Version 2.0',
            docinfo1            : 'true',
            doctype             : 'book',
            encoding            : 'utf-8',
            icons               : 'font',
            id                  : name + ':' + projectVersion,
            idprefix            : '',
            idseparator         : '-',
            lang                : 'en',
            linkattrs           : true,
            numbered            : '',
            producer            : 'Asciidoctor',
            revnumber           : projectVersion,
            setanchors          : true,
            'source-highlighter': 'prettify',
            'version'           : projectVersion
    ]

}

apply from: rootProject.layout.projectDirectory.file('gradle/docs-config.gradle')