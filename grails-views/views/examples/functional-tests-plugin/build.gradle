plugins {
    id 'groovy'
    id 'java-library'
    id 'org.apache.grails.gradle.grails-plugin'
    id 'org.apache.grails.gradle.grails-gson'
}

version = "0.0.1"
group = 'functional.tests.plugin'

dependencies {
    implementation platform("org.apache.grails:grails-bom:${grailsVersion}"), {
        // as a safeguard, exclude projects in this repo that included transitively to ensure we pick the right version
        exclude group: 'org.apache.grails.views', module: 'grails-views-core'
    }

    implementation project(':grails-gson')
    implementation 'org.apache.grails:grails-rest-transforms'
    compileOnly 'org.slf4j:slf4j-nop' // Used for getting rid of warning about missing slf4j implementation during compileGsonViews task
}

java  {
    sourceCompatibility = JavaVersion.toVersion(javaVersion)
}

tasks.withType(Test).configureEach {
    useJUnitPlatform()
    testLogging { events 'passed', 'skipped', 'failed', 'standardOut', 'standardError' }
}