plugins {
    id 'application'
    id 'groovy'
    id 'org.apache.grails.gradle.grails-gsp'
    id 'org.apache.grails.gradle.grails-web'
}

version = "0.0.1"
group = 'functional.tests'

dependencies {
    implementation platform("org.apache.grails:grails-bom:$grailsVersion"), {
        // as a safeguard, exclude projects in this repo that included transitively to ensure we pick the right version
        exclude group: 'org.apache.grails.views', module: 'grails-views-core'
        exclude group: 'org.apache.grails', module: 'grails-testing-support-views-gson'
        exclude group: 'org.apache.grails', module: 'grails-scaffolding'
        exclude group: 'org.apache.grails', module: 'grails-gsp'
    }

    implementation project(':views-examples-functional-tests-plugin')
    implementation project(':grails-gson')
    implementation project(':grails-markup')

    implementation 'org.apache.grails:grails-core'
    implementation 'org.apache.grails:grails-logging'
    implementation 'org.apache.grails.web:grails-web-boot'

    implementation 'org.apache.grails:grails-databinding'
    implementation 'org.apache.grails:grails-i18n'
    implementation 'org.apache.grails:grails-interceptors'
    implementation 'org.apache.grails:grails-rest-transforms'
    implementation 'org.apache.grails:grails-services'
    implementation 'org.apache.grails:grails-url-mappings'
    implementation 'org.apache.grails:grails-validation'

    implementation project(':grails-gsp')
    implementation 'org.apache.grails:grails-data-hibernate5'

    implementation 'org.springframework.boot:spring-boot-autoconfigure'
    implementation 'org.springframework.boot:spring-boot-starter-logging'
    implementation 'org.springframework.boot:spring-boot-starter-tomcat'

    compileOnly 'org.slf4j:slf4j-api' // Provided by Tomcat

    runtimeOnly 'com.h2database:h2'
    runtimeOnly 'org.apache.tomcat:tomcat-jdbc'
    runtimeOnly 'com.bertramlabs.plugins:asset-pipeline-grails'

    testImplementation project(':grails-testing-support-views-gson')
    testImplementation 'org.apache.grails.testing:grails-testing-support-core'

    integrationTestImplementation 'com.fasterxml.jackson.core:jackson-databind'
    integrationTestImplementation  "io.micronaut:micronaut-http-client:$micronautVersion"
    integrationTestImplementation "io.micronaut:micronaut-jackson-databind:$micronautVersion"
}

java {
    sourceCompatibility = JavaVersion.toVersion(javaVersion)
}

tasks.withType(Test).configureEach {
    useJUnitPlatform()
    testLogging { events 'passed', 'skipped', 'failed', 'standardOut', 'standardError' }
}