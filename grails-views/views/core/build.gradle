plugins {
    id 'groovy'
    id 'java-library'
}

version = projectVersion
group = 'org.apache.grails.views'

ext {
    pomArtifact='grails-views-core'
    pomDescription = 'Grails Views Core'
}

dependencies {
    implementation platform("org.apache.grails:grails-bom:$grailsVersion"), {
        // as a safeguard, exclude projects in this repo that included transitively to ensure we pick the right version
        exclude group: 'org.apache.grails.views', module: 'grails-views-core'
        exclude group: 'org.apache.grails', module: 'grails-testing-support-views-gson'
        exclude group: 'org.apache.grails', module: 'grails-scaffolding'
    }

    api 'com.github.ben-manes.caffeine:caffeine' // Used in public API
    api 'org.apache.grails.data:grails-datastore-core' // MappingContext is used in public API
    api 'org.apache.grails:grails-mimetypes' // MimeUtility is used in public API
    api 'org.apache.grails:grails-rest-transforms' // Used in public API
    api 'org.apache.grails.web:grails-web-url-mappings' // LinkGenerator is used in public API
    api 'org.springframework:spring-context' // MessageSource is used in public API

    implementation 'org.apache.grails.bootstrap:grails-bootstrap'
    implementation 'org.apache.grails:grails-core'
    implementation 'org.apache.grails.data:grails-datamapping-support'
    implementation 'org.slf4j:slf4j-api'
    implementation 'org.springframework:spring-beans'

    testImplementation 'org.spockframework:spock-core'
    testRuntimeOnly 'org.slf4j:slf4j-nop' // Get rid of warnings about missing slf4j implementation during test task
}

apply from: rootProject.layout.projectDirectory.file('gradle/java-config.gradle')
apply from: rootProject.layout.projectDirectory.file('gradle/test-config.gradle')
apply from: rootProject.layout.projectDirectory.file('gradle/publish-config.gradle')