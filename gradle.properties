projectVersion=7.0.0-SNAPSHOT

javaVersion=17

# when updating gradle version, be sure to update the functional-tests-plugin as well
grailsVersion=7.0.0-M3
asciidoctorVersion=4.0.3
micronautVersion=4.6.5

# This prevents the Grails Gradle Plugin from unnecessarily excluding slf4j-simple in the generated POMs
# https://github.com/grails/grails-gradle-plugin/issues/222
slf4jPreventExclusion=true

org.gradle.caching=true
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.jvmargs=-Dfile.encoding=UTF-8 -Xmx1536M -XX:MaxMetaspaceSize=512M
