plugins {
    id 'groovy'
    id 'java-library'
    id 'project-report'
}

version = projectVersion
group = 'org.apache.grails.testing'

ext {
    pomDescription = 'Support for writing concise expressive tests for Grails artifacts'
    pomDevelopers = [
            jeffscottbrown: 'Jeff Brown',
            jameskleeh: 'James Kleeh'
    ]
}

dependencies {
    implementation platform(project(':grails-bom'))

    api 'org.apache.groovy:groovy'
    api 'org.springframework:spring-test'
    api project(':grails-codecs'), {
        exclude module:'grails-mimetypes'
        exclude module: 'grails-converters'
        exclude module: 'grails-web'
    }

    api project(':grails-databinding')
    api project(':grails-datamapping-core')
    api project(':grails-test-core')
    api 'org.springframework.boot:spring-boot-test'
    api('org.spockframework:spock-spring') { transitive = false }
    api 'org.junit.jupiter:junit-jupiter-api'
    api 'org.junit.platform:junit-platform-runner'
    runtimeOnly 'org.junit.jupiter:junit-jupiter-engine'

    testImplementation 'org.apache.groovy:groovy-test-junit5'
    testImplementation 'org.junit.jupiter:junit-jupiter-api'
    testImplementation 'org.junit.platform:junit-platform-runner'

    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine'

    // Logging
    api 'org.slf4j:slf4j-api'
    api 'org.slf4j:jcl-over-slf4j'

    // Testing
    testImplementation 'org.slf4j:slf4j-simple'
    testImplementation('org.spockframework:spock-core') { transitive = false }
    // Required by Spock's Mocking
    testRuntimeOnly 'net.bytebuddy:byte-buddy'
    testImplementation 'org.objenesis:objenesis'
}

apply {
    // java-configuration must be applied first since tasks are now lazy registered
    from rootProject.layout.projectDirectory.file('gradle/java-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/docs-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/publish-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/test-config.gradle')
}