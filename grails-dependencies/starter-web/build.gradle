plugins {
    // Needed for the dependency configurations
    id 'java-library'
    id 'org.apache.grails.buildsrc.properties'
    id 'org.apache.grails.buildsrc.compile'
    id 'org.apache.grails.buildsrc.publish'
    id 'org.apache.grails.buildsrc.sbom'
}

version = projectVersion
group = 'org.apache.grails'

ext {
    pomDescription = 'A meta-project that aggregates all web, non-test, non-database Grails dependencies.'
}

def configurations = [
        'api': [
                // minimum dependencies that include critical APIs or ASTs
                ':grails-async',
                ':grails-cache',
                ':grails-codecs',
                ':grails-console',
                ':grails-controllers',
                ':grails-converters',
                ':grails-core',
                ':grails-databinding',
                ':grails-domain-class', // grails-controllers exports this, but include it here for completeness
                ':grails-encoder',
                ':grails-events',
                ':grails-gsp',
                ':grails-interceptors',
                System.getenv('SITEMESH3_TESTING_ENABLED') == 'true' ? ':grails-sitemesh3' : ':grails-layout',
                ':grails-logging',
                ':grails-rest-transforms',
                ':grails-services',
                ':grails-url-mappings',
                ':grails-web-boot',
                // Minimum dependencies for spring boot
                'org.springframework.boot:spring-boot-autoconfigure',
                'org.springframework.boot:spring-boot-starter',
                'org.springframework.boot:spring-boot-starter-actuator',
                'org.springframework.boot:spring-boot-starter-logging',
                'org.springframework.boot:spring-boot-starter-validation',
                'org.springframework.boot:spring-boot-starter-tomcat',
        ]
]

dependencies {
    implementation platform(project(':grails-bom'))
    configurations.each { String configuration, List<String> deps ->
        deps.each {
            if (it.startsWith(':')) {
                add(configuration, project(it))
            } else {
                add(configuration, it)
            }
        }
    }
}

tasks.named('javadocJar').configure {
    it.enabled = false
}

tasks.named('sourcesJar').configure {
    it.enabled = false
}