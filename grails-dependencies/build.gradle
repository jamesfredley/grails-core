plugins {
    // Needed for the dependency configurations
    id 'java-library'
}

version = projectVersion
group = 'org.apache.grails'

ext {
    skipJavaComponent = true
}

def configurations = [
        'api': [
                "org.apache.grails.bootstrap:grails-bootstrap:$version",
                "org.apache.grails:grails-rest-transforms:$version",
                "org.apache.grails:grails-databinding:$version",
                "org.apache.grails:grails-i18n:$version",
                "org.apache.grails:grails-services:$version",
                "org.apache.grails:grails-url-mappings:$version",
                "org.apache.grails:grails-interceptors:$version",
                "org.apache.grails:grails-async:$version",
                "org.apache.grails:grails-events:$version",
                "org.apache.grails:grails-gsp:${property('gsp.version')}",
        ],
        'runtimeOnly': [
                "com.h2database:h2:${property('h2.version')}",
        ]
]

dependencies {
    configurations.each { String configuration, List<String> deps ->
        deps.each {
            add(configuration, it)
        }
    }
}

apply {
    from rootProject.layout.projectDirectory.file('gradle/java-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/publish-config.gradle')
}