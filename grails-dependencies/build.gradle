plugins {
    // Needed for the dependency configurations
    id 'java-library'
}

version = projectVersion
group = 'org.apache.grails'

ext {
    skipJavaComponent = true
}

def configurations = [
        'api'        : [
                ':grails-core',
                ':grails-rest-transforms',
                ':grails-databinding',
                ':grails-i18n',
                ':grails-services',
                ':grails-url-mappings',
                ':grails-interceptors',
                ':grails-async',
                ':grails-events',
                ':grails-gsp',
        ],
        'runtimeOnly': [
                'com.h2database:h2',
        ]
]

dependencies {
    implementation platform(project(':grails-bom'))
    configurations.each { String configuration, List<String> deps ->
        deps.each {
            if (it.startsWith(':')) {
                add(configuration, project(it))
            } else {
                add(configuration, it)
            }
        }
    }
}

apply {
    // java-configuration must be applied first since tasks are now lazy registered
    from rootProject.layout.projectDirectory.file('gradle/java-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/publish-config.gradle')
}

// these must be after the above applies because they opt out of the defaults created in those files
tasks.named('javadocJar').configure {
    it.enabled = false
}

tasks.named('sourcesJar').configure {
    it.enabled = false
}