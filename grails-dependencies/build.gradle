plugins {
    // Needed for the dependency configurations
    id 'java-library'
}

version = projectVersion
group = 'org.grails'

ext {
    skipJavaComponent = true
}

def configurations = [
        'api': [
                "org.grails:grails-bootstrap:$version",
                "org.grails:grails-plugin-rest:$version",
                "org.grails:grails-plugin-databinding:$version",
                "org.grails:grails-plugin-i18n:$version",
                "org.grails:grails-plugin-services:$version",
                "org.grails:grails-plugin-url-mappings:$version",
                "org.grails:grails-plugin-interceptors:$version",
                "org.grails.plugins:async:$version",
                "org.grails.plugins:events:$version",
                "org.grails.plugins:gsp:${property('gsp.version')}",
        ],
        'runtimeOnly': [
                "com.h2database:h2:${property('h2.version')}",
        ]
]

dependencies {
    configurations.each { String configuration, List<String> deps ->
        deps.each {
            add(configuration, it)
        }
    }
}

apply {
    from rootProject.layout.projectDirectory.file('gradle/java-config.gradle')
    from rootProject.layout.projectDirectory.file('gradle/publish-config.gradle')
}